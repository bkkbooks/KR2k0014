所見多異由是寖聞元立乃作室於山之左脅力田種藥奉香火焉巃嵸山在東北二十九里周二十五里其山四合中有官道趨寧國縣亦與寧國分界立柵於此今人謂之叢山大獒山在縣北六十里高四百仞周百里舊說以為上排層漢前壓澄潭蹲形矯首如獒猛犬焉郎山在東北十五里髙二百三十仞周三里亦謂之郎㟳山下有郎溪驛路在焉兩旁有石道長數百步直下數百尺名翡翠巖不生草木有類石洞云徣溪山在東北八十里髙五百五十仞周百四十里西連巃嵸山有水流入縣界凛山在西北三十里髙四百五十仞周十五里古塘山在西北五十三里髙三十五仞周十五里西至黃石坑與旌德分界蒿山在西北五十三里髙四十五仞周十五里東至黃石坑與旌德分界植山在縣北四十里髙五百五十仞周八十里有水西北流十三里入黃石坑石照山在縣東五里有石髙二丈光可以鑑泉味尤甘旁有石照院徽嶺在西北十里髙四百五十仞周三十里舊名大尖山其上為官道走旌德道也凌曉常行雲氣中王荆公為江東提刑時有度麾嶺詩用此旌麾字又有詩云曉度藤溪霜落後夜過翬嶺月明中則又用此翬雉字然太平廣記載績溪有大徽村又宣和中改州為徽說者以為取此嶺為名則徽字近是佛論嶺在西北四十里髙四百五十仞周四十里祥符經云昔嘗有髙僧講論於此故名水源臨溪水源出縣北三十里又名乳溪西南流七十八里合揚之水方輿記云臨溪石在縣北三里溪岸上其万二丈其平如砥溪水甚宜浣紗數里婦人悉來浣紗去家既逺遂績其旁以守之春時多麗服羣績於此雖不浣紗者亦㑹績焉縣名亦兼取此義徽溪水出徽嶺水分為二其東北流者入旌德界此水入縣經修仁鄉詰曲四十里南入常溪合揚之水入歙縣界登水出徣溪山南流九十里合揚之水入歙縣界溉田二頃常水出黃蘖山南流五十里合揚之水入歙縣界溉田一頃三十三畝蒼龍洞在縣北十五里山峻拔回顧如立壁中有怪石瀑水如簾其下為龍池遇旱禱之有應亦有石可鑑慈雲院在其側祠廟忠顯廟有二一在縣側一在東七里越國公故城宅井在焉梓山廟在東南一里方輿記云初於山下置良安縣舊有方白石忽化為雙白烏飛向山遂於山下烏棲處立廟邑人敬之行立種殖皆不敢背又有將軍廟吳山太婆廟茆司徒廟歸善廟溪口廟郎㟳廟並在縣東僧寺太平興國禪院在良安鄉新合里舊名華嚴院太平興國五年二月敕改光相院在良安鄉寧泰里舊名寧泰院治平元年十月勑改清福禪院在惟新下鄉咸化里舊名清塘院治平元年十二月勑改普照院在仁慈鄉義興里治平元年十二月勑改慈雲院在仁慈鄉龍泉里舊名慈恩院治平元年十二月敕改求安院在新安鄉龍興里舊名新恩院治平元年十二月敕改石門廣福院在遵化鄉石門里舊名石門院熙寧四年三月敕改為夀聖院隆興中夀聖例改廣福有三廣福故還以石門别之按五朝隆平集治平三年詔一應無額寺院屋宇及三十間以上者並賜夀聖為額以英宗誕聖日號夀聖節故也廣化院在宣政鄉斜溪里舊名宣化院治平元年十二月敕改覺乘院在宣政鄉斜溪里舊名釋迦院治平元年十二月敕改靈鷲院在新華鄉幽山里舊名幽山院治平元年十二月敕改清隱院在楊山鄉髙峰村舊名髙峰院治平元年十二月敕改盧山廣福院在楊山鄉修仁里舊名盧山院其改夀聖及廣福與石門廣福院同時兜率院在修仁鄉常溪里舊名彌勒院治平元年十二月敕改正覺院在修仁鄉常溪里舊名菩提院治平元年十二月敕改天王廣福院在仁慈鄉義興里舊名天王院改夀聖及廣福如石門盧山同時崇福院在修仁鄉常溪里唐光化二年建興福院在修仁鄉守節里唐天寶二年建新興院在惟新上鄉新安里唐乾符五年建藥師院在新安鄉永寧里唐天祐二年建前山院在宣政鄉歸化里唐咸通五年建義林院在惟新下鄉麟福里天禧三年建賢宰蘇轍字子由眉山人自簽書南京判官謫監筠州鹽酒稅元豐八年以奉議郎知縣事適有朝㫖江東諸郡市廣西戰馬江東素乏馬每縣不過十餘匹而諸縣括民馬吏緣為姦有馬之家為之騷然公謂尉郭惇願曰廣西取馬使臣未至事忌太遽徐為之備可也吾邑孰為有馬者尉曰邑有遞馬簿歲月逺矣然有無之實尚得其半也即取簿封之又曰何從得馬牙人乎曰召諸牙詰之則馬牙出矣果得曽為人賣馬者辭以不能曰吾不責汝以馬但為我供文書耳曰諾州符日至縣督責買馬乃以夏稅過期為名召諸鄉保正副問之曰汝保誰為有及格馬者相顧辭不知曰保正副不知誰當知者苐勿以有為無無為有則免罪矣汝等所具吾將使衆人訴其不實而陳其脫略者不可不實也人知不免皆以實告復喻之曰買馬事止此矣廣西取馬者至郡則馬出若不至則已矣皆再拜曰邑人幸矣然取馬者卒不至哲宗即位除祕書省校書郎終門下侍郎崔鶠字德符雍丘人父毗有聞於時自雍丘徙陽翟鶠能文工於詩貌瘁氣剛登進士第元符末以頻年四月日蝕詔求直言鶠上書辨司馬溫公力抵時相宰相蔡京使以邪正二等差定上書者列鶠邪下坐廢三十年政和中為績溪縣令後嘗召為殿中侍御史不果拜靖康初擢右正言力疾就職凡三疏論列諫官馮澥及請斬蔡京病甚乞解官除直龍圖閣管幹西京嵩山崇福宫卒京師有婆娑集三十卷行於世中書舍人朝說之以為前世黃叔度元魯山本朝王子野江鄰幾之流說之頃與鶠同書邪籍者也黟縣沿革黟緊縣自秦以為縣屬鄣郡縣居黟山之陽故名或曰黟與䃜同以縣南墨嶺出石墨故也此據水經及舊唐書而寰宇志又言置在黟川因名漢改鄣為丹陽郡縣屬如故成帝鴻嘉二年以黟為廣德王國立中山憲王弟孫雲客於此立三年而絶平帝元始二年復以故國立廣川惠王曽孫倫為廣德王傳至子赤王莽篡位明年廢而改縣曰訴鹵及漢建安之亂縣人陳僕祖山以二萬戶屯林歷吳使賀齊攻之僅免遂以歙分五縣與黟為六置新都郡晉太康元年更郡為新安而割故廣德王國為廣德縣𨽻宣城郡隋開皇十一年歙州治黟大業中州復為新安郡治休寧唐永泰元年平方清因其壘析本縣地及饒州之浮梁置祁門縣又析本縣及浮梁池州之秋浦置石埭縣及國朝以宣州廣德縣置軍又自析出為建平縣大抵今黟縣祁門池之石埭廣德之廣德建平凡五縣皆秦漢黟縣之故境而今黟則狹矣元和六年九月與婺源皆稱上縣國朝為緊縣縣境縣在州西百五十五里東西廣長五十三里南北百十二里東至休寧界五十里西至祁門界二十五里南至休寧界四十五里北至寧國府太平界五十里東南到休寧界四十五里西南到祁門界五十里東北到太平界百五里西北到石埭界八十里鄉里其鄉四其里二十㑹昌鄉在縣西北其里連城嘉祥歷陽延福蜀里敦義順仁鄉在東北其里古城長寧懷仁順化新政鄉在東南其里清德明德魚亭東亭雲巖懷逺鄉在西南其里升平靖節安寧新城豐樂戶口天禧中主戶六千二百一十六口萬七千九百七十四客戶四百三十三口五百三十七未經界戶萬二千三百六十五經界九千四十一乾道主戶五千九百有一客戶一千八百六十八田畝田畝舊九萬二千一百三十五畝經界為三十三萬四千四百三十畝二角五十八步今增十畝堨一百九十處租賦夏稅紬二百二十七匹一丈七尺五寸七分絹二千八百二十七匹二丈五尺八寸二分布六百一十匹六寸一分綿二萬四千二百七十三兩二錢四分小麥五百九十八石一斗一升九合錢二千二貫五百二十三文軍衫布三百四匹二丈一尺秋稅糙米萬三千二百三十五石三斗七升鹽錢五百四十二貫一百三十七文和買紬一千八百七十五匹絹四千六百八十八匹酒稅酒以紹興二年所收為額計九千六百七十五貫三百三十六文商稅熙寧十年收一千二百七十九貫五百八十四文今以紹興十三年所收為額計二千一百貫九百七十二文城社縣城周二里三百五十步社在西南學在南官廨縣㕔在城正北主簿㕔在其東尉㕔在西南省倉常平倉在縣門之內酒務稅務在㕔東鎮場西武鎮在縣西二十里廂口鎮在西北二十里縣今無西武只有廂口鎮在縣內坊場二處驛道臨黟驛在縣城內魚亭驛在縣東三十五里道路東南各通休寧西通祁門北通太平界山阜牛泉山在縣北五十七里髙九百五十仞東接太平界輿地志云牛泉嶠自山下至頂九里一頓凡有九頓並山為路狹處才七八寸臨不測之深上嘗風木雖合抱而長不至丈南向乃有之雖盛夏亦須衣襦頂有水方廣丈許冬夏不增減名牛泉相傳舊無水牛以足跑土成池山上往往有古人纍石為路處蓋昔往丹陽郡之道也武亭山在西南十八里接祁門界髙二百仞周五十里有水東流入縣界魚亭山在縣南三十五里髙二百五十仞周三十里水東流入休寧界方輿記云每歲西江魚船至祁門縣捨舟登陸上此山東水次淹流待船故曰魚亭按黟縣舊有四亭八墅魚亭其一也方輿所說似以為停留之停未知果否復扶又切山在縣南三十六里髙二百六十仞周二十九里方輿記云山甚孤峻石壁四絶亦謂之五硠二礫兩邊皆石壇中央有溝才五六尺許水甚懸迅捫蘿挽葛時有至者山翠激流為羣峰之秀東南水流入休寧界硠音痕礫音樂林厯山又名頂游山在縣西南十里髙三百仞周三十里漢末陳僕祖山所屯戢兵山在縣北十五里髙百仞周十里舊名石鼓山有石鼓石人石驢俗傳石鼓鳴即驢鳴長官不利後鑿其鼓破之遂不復鳴天寶六年改名戢兵三姑山一名吉陽山在東北十五里髙二百五十仞周三十里其山三峰地輿志云三姑山多石二年一遇野火自然燒盡故老相傳號三姑磨云若非磨年百姓放火輒有雨中峰有瀑布新安記云天將雨此山先有鼓角之音靄山在縣南十里孤峰如削水源吉陽水出吉陽山東流至白茆渡入縣界屈曲九十里經黎陽口合南當水東流三十五里下黃墩村北流四十五里出歙浦合揚之水通舟船溉田四十四頃章水出縣北十八里章山東南流二十七里至縣界又東南流五里合橫江水溉田十一頃橫江水出武亭山東南流二十八里合章水入魚亭口溉田八頃魚亭水出魚亭山東流二十里至魚亭口合吉陽橫江水東流入休寧界牛泉水出牛泉山東南流八十里至魚亭口合吉陽水溉田三頃釣灘在縣南十八里亦名潯陽臺相傳李太白游新安嘗釣於此作詩云磨盡石嶺墨潯陽釣赤魚靄峰尖似筆堪盡不堪書古跡石墨井在縣南十六里方輿記云墨嶺上出石墨土人採之以書採處成井今為水所淙其井轉深寰宇記云墨嶺上有石特起十餘丈峰若劒峙有靈鼓潛發令長每以為候鳴則不利嶺旁竇出石墨可書又新安圖經云歲貢柿心墨木黟之字縣職此之由據寰宇記有石鼓則是前戢兵山矣又云墨嶺山上有穴中有墨石軟膩土人取為墨色甚鮮明可以記文字按今石墨嶺墨極麋爛乃未聞採以書者用以染皂色深而香不假他物也樵貴谷方輿地志云黟縣北緣嶺行得樵貴谷昔有人山行七日至一斜穴入穴廓然周三十里土甚平沃中有十餘家云是秦時離亂入此避地又按邑圖有潛氏村事已見第一卷僕城里在林厯山下以陳僕所屯為名俗說每社日僕則遣人掠酒肉村人苦之遂以社之明日為社至今猶然獨母柴在縣南十五里昔有寡婦死無以葬村人為覆以薪後人行經其處者皆以一枝草投之迄今不絶祠廟土地廟石將軍廟頂遊廟在縣西橫江廟靄山廟復山廟在縣南城隍廟戢嶽廟五郎廟在縣北石盂廟在西北祥符經所載今又有吉陽廟在縣東噎潭廟在東南道觀靈虛觀在西南一里舊名洞靈觀崇寧四年九月敕改僧寺廣安寺在㑹昌鄉嘉祥里舊名永寧寺梁大同元年建大中祥符元年敕改遵孝寺在㑹昌鄉延福里舊名石盂崇福院唐天復三年後改延慶院在新政鄉魚亭里舊名阜口院唐大中三年建大中祥符四年敕改子路院在順仁鄉懷仁里唐㑹昌三年建霞山院在新政鄉明德里唐大中三年建精林院在㑹昌鄉厯陽里唐乾寧五年建石鼓院在順仁鄉順化里唐㑹昌五年建間居尼寺在縣城內梁大同元年建縣令吳茹公者宋黟縣令泰始二年輔國將軍行㑹稽郡事孔凱與潯陽內史行江州事鄧琬等謀反琬先遣新安太守陽伯子及軍主任獻子襲茹公茹公固守力不敵棄城走伯子等屯據縣城茹公與臺軍主丘敬文李靈賜蕭伯夀等攻圍彌時八月乃克斬伯子獻子二人首何思澄字元靜東海郯人梁天監中遷治書侍御史時始重此選車前依尚書二丞給三騶執盛印青囊舊事糾官印綬在前故也久之遷秣陵令入兼東宫通事舍人昭明太子薨出為黟縣令庾仲容字仲容潁川鄢陵人除尚書左丞坐推糾不直免仲容博學少有盛名頗任氣使酒好危言髙論唯與王籍謝幾卿情好相得二人時亦不調遂相追誕縱謀飲不復持檢操久之復為咨議參軍出為黟縣令薛稷蒲州汾隂人唐文學館學士收之從孫少擢進士入官後坐法左遷稍轉黟令今有薛公祠廣德二年所立其文可辨者贄賦平而邑里有革苦窳息而山谷知謹云稷官至太子少保又有李子稱者汝陽王璡之孫袁藹者東郡陽夏人皆唐世為令者汪澥字仲容涇縣人汪氏系本黟歙而宣城相去為近不知其先於黟歙何别也幼從安定先生質易中疑義又從王荆公遊首傳其經說太學初成選為録神宗書其名屏間年四十餘始登第後知黟縣專用靜治教條可法常摘僞劵及築長堤除水害至今為邑人所紀終大司成顯謨閣待制新安志卷五
