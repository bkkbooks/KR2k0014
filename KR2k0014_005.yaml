body:
  text: 新安志卷五宋羅願撰婺源沿革婺源望縣本休寧西南之回玉鄉唐開元二十八年正月九日置以為縣治今清化鎮寰宇志及祥符經皆言有婺水繞城三靣故以為名今有古縣記言有開元二十八年庚辰置縣在清化凡百四十三歲中和二年壬寅汪武始於潰州之右㴗灘蚺蛇港旁為營至天祐三年乙丑即營為縣號新縣而舊縣改為清化鎮然則縣雖以婺水為名至新縣始繞三靣耳以縣旁婺水為名按東湯記云東湯上應婺女舊與黟歙接境隋文帝嘗廢黟歙二縣併入海寧以屬婺州海寧即今休寧是嘗與婺州通封壤因以水流入其州者為名也此縣直以婺水流入婺州故曰婺源耳而寰宇志云縣又為婺女星之津與婺州同義恐未必然元和六年九月升上縣咸通六年刺史盧肇奏於縣界內置弦髙五福二鎮中和二年弦髙鎮將汪武率百姓於㴗灘立營决遣鎮事天復元年就立婺源都鎮天祐三年武死以朱環為新縣制置巡轄婺源浮梁德興祁門四縣改舊縣為清化鎮吳南唐因之國朝不領三縣而因新縣為治所既又升望縣縣境縣在州西南二百二十里東西廣長百六十里南北百三十里東至衢州常山界八十五里西至饒州樂平界百一十里南至饒州德興界百三十五里北至休寧界百三十里東南到衢州開化界三十五里一西南到樂平界百一十里東北到休寧界百三十里西北到浮梁界百一十里鄉里其鄉六其里三十萬安鄉在東北其里松巖千秋靈屬長城大鱅來蘇鄉在西北其里安豐長夀何暮苪平來蘇浙源鄉在縣北其里川臨城大安嘉福孝弟懷金鄉在西舊曰懷玉其里懷金黃岡游汀三溪福臨丹陽鄉在西南其里瑞亭雲亭環石還珠新定游汀鄉在西其里杭溪延賔符溪婺安鳳亭戶口天禧中主戶萬三千五百二十三口二萬九千六百七十七客戶千九十一口千六百六十四未經界前戶三萬五千一百五經界二萬六千二百二十二乾道主戶四萬一千九百五十五客戶九百有九田畝田園舊六十七萬九千七百七畝二角經界為七十九萬有竒今為七十九萬五千七百八十七畝二角五十五步陂百五十七處堨十有七處租賦夏稅錢萬八千四百七十二貫四百一十九文絹四匹七寸布三匹二丈六尺綿九十七兩八錢租課百二十七貫七百一文片茶錢六十九貫九百三十七文秋稅糙米萬九千五百六十四石九斗七升七合鹽錢千一百三十三貫九百五十五文租課糙米五百三十八石一斗五合和買紬四千九百八十八匹絹萬四千八百一十三匹酒稅酒以紹興九年所收為額萬七千五十五貫七百四文商稅按㑹要熙寧十年縣務四干七百八十二貫七百五十文清化鎮二百四十四貫五十九文今縣務以紹興五年所收為額千八百七貫八百九文清化鎮不復收稅城社縣城周九里三十步髙一丈八尺自中和二年弦髙鎮將汪武為山營於此判鎮事天復初就立婺源都鎮建鼓角樓并挾城樓自是不復還舊縣南唐升元二年檢校司空劉津為都制置使乃集所轄四縣增築新城津作記云爰選三農之隙㸦音互招諸縣之衆同其力役全此邊郵其西建衝山一營添新壘一里其北則築平蛟穴接出蛇城周環十里以來斧鍤半年之內閭閻盡易雉堞皆新啓升元二門建東南兩市終聞悅辦略不告勞蓋其規模略見於此蛟穴者上北湖是蛇城者舊名蚺蛇港今埂城下是社在縣西北廟學廟學在縣東先是熙寧中祕書丞鄱陽劉定為縣從學者率常百餘人以舊學之庳相與請於州即縣治西為屋百二十楹乾道中知縣彭烜又請於部使者以迎恩驛更為之而縣之先進王允恭李知已皆助以地至後政洪邦直成之官廨縣㕔在城正中丞㕔在東主簿尉㕔並在西倉在東酒稅務在西祥符經有鹽倉都茶倉今無坊場七處河渡一處鎮寨唐有弦髙五福二鎮皆咸通六年置五福鎮還珠里是也弦髙鎮後以為縣今縣治是也而唐開元中舊縣自天祐至國朝為清化鎮在縣西北六十里其營寨之制天祐中刺史陶雅遣朱環為縣制置時有衝山營左右威武兩指揮見於古縣記按楊行密初起廬州以陶雅為左衝山將今州烏聊山下亦有地名衝山營者是皆因雅為名國家承平縣治不置兵今有中平巡檢寨在縣東七十里館驛新安驛在縣東七里舊曰來安新定驛在西八十里舊曰太白道路陸路東通常山西通樂平南通德興北通休寧水行自縣東婺水通鄱陽江勝船二百石山阜浙源山在縣北七十里亦曰浙嶺髙三百五十仞周二十五里北連黟縣魚亭山舊有石英鍾乳大廣山在西北五十八里舊名大尖山髙四百一十仞周三十里斜山在東北七十里髙二百仞周八里由浙嶺東北分為此山大鱅山在縣東百三十里髙三百三十仞東南接衢州界方輿記云堯時洪水溪谷皆滿有大鱅上至此及水涸而斃鱗骨鰭鬛積如山阜小斂山在東南七十里髙九十八仞周十五里南接衢州界有水西流入縣界梅源山在縣西百二十里髙三百二十仞西北連浮梁界舊名梅山天寶中加源字山産楊梅梁任昉為太守罷不復采濬源山在西南百里髙三百一十仞西南接浮梁樂平界舊名游山天寶六年改西連梅源山有水南流入吳溪倚衡山在縣南百三十里髙八十五仞西南連樂平縣山西連回嶺有水流入樂平張公山在縣西北七十里髙四百餘仞周十五里昔有張公隱此山采藥合丹數十年後忽不知所之善山在縣南五十里髙百五十仞周十里又有惡山隔溪對聳祥符經云善山神為王惡山為夫人若兩處致祭則為災居人迎惡山神就善山祭祀俗謂之妻壻山三靈山在縣西九十里髙二百八十仞周五十里晉時有三人此山修鍊後不知所之大連山在西北百二十里髙四百仞周九十里昔因冦亂鄉人相與保聚於此甘子嶺在縣西七十八里四十二仞周二十五里舊云縣無甘子唯此嶺有株芙蓉嶺在縣東七十五里髙二百仞周三十五里對鏡嶺在東八十五里髙三十仞周十里羊鬬嶺在東九十五里髙三十仞周二十里塌嶺在東北百五里髙二十八仞周九里自芙蓉以下皆中通驛路接休寧之新嶺凡號五嶺縣走郡之道也舊由大坂趨郡數苦水潦後更從此五嶺幾及百年或亦自浙嶺往來山川之名歲久不可强通而新經每山之下輒為臆說解之今皆不取龍尾山在縣東南百里髙二百仞周三十里西連武溪開元中獵人葉氏見石瑩潔鐫粗成研子孫持以獻令令訪匠琢之由是世始傳一名羅文山以石理所似為名靈巖三洞在西北百二十里中有洞靈觀觀之東北曰慶雲洞巖竇皆五色兩崖瀑流之上有真人鸞鶴雲霞之象泝流秉燭而入者行可四五十步則芝田靈草羅列左右遇春雨暴漲有破帆爛槳流出西曰蓮華洞入百步有大石室廣十丈有像髙丈八尺旁有羽蓋幡節獅子樽罍還丹芝草皆乳石所成遇拜章投龍往往有仙樂慶雲或珍禽竒獸致花果於像前又有天井深不可測南昌含虛洞洞有二重外狹而內平有積雪臺沈香峰及唐神仙所盡龍是為三洞皆襟帶浙嶺聯連率山舊說者以為三天子都在率東豈謂是耶又有洞曰靈磨集仙魚龍張公垂鍾㑹仙合前為九大厯初有武姓者自黃山為旋風所吹入石龍洞因傍行入至此洞聞空中語笑之聲開成中浮梁鄭全福好游獵深入窮谷與其徒相失暮有老人導游諸洞及出有鹿引上山之半坡自是結茅居之因修鍊為道士後徙居蓮華洞之石室將游天井乃求麻為緶轆轤而下中極寬廣徐步桃花溪上有老人乘鐡船其中全福揖之願借船還老人曰已渡上須還耶曰欲傳之人間耳老人曰如是速濟虎豹且至後三年當復來至岸循緶而上已七日矣又三歲至開成九年年百餘歲語門人曰必葬我浮梁自水鄉及卒弟子二百餘人與鹿俱送至夕陽嶺上覺棺空發之唯履杖而已羣鶴翔引鹿亦失所在山有研石紫色如肝産巖之左右無定處瑩者可擬端溪然絶少大率燥慢而多瑕石龍洞在縣西百十七里石龍山上東北髙丈二尺廣五尺中有石室容數十人西南復有門髙四尺廣二尺兩石對聳有如鑿成嘗有人入數里懼而復反下有池水焉青苓洞在縣西八十里南北門相通中有物象如靈巖水源婺水出大廣山南流五十八里還繞縣城又南流四十里合斜水舟行通鄱陽江溉田二十二頃六十畝武溪水出浙山南流五十里至縣西北合婺水溉田十三頃四十三畝益陽水今符溪源也出浙山西南流百八十三里至三溪村合流入樂平界溉田三十五頃三十四畝斜水出斜山南流九十里合婺水南入樂平界通舟行溉田三十九頃十一畝大鱅水出大鱅山西北流十七里合斜水溉田九頃二畝小斂水出小斂山西南流四十里入樂平界溉田十八頃七十一畝梅源水出梅源山東流三十七里合浙水溉田八十頃七十六畝濬源水出濬源山南流合吳溪水溉田三十二頃二十二畝吳溪在樂平界杭溪水出石龍山南流至杭口入樂平界溉田三十八頃四十一畝石牛潭在縣南十里岸旁有巨石如牛歲旱塗其背則雨石門灘在婺水中兩石夾溪踊起如闕中間通流昔人以其險比灧澦古跡吳村在縣北七十里有吳太子墓方輿記云昔吳王為越滅勾踐流其三子長子鴻逃於此死因葬焉遂名其葬處為吳山里按三國吳時嘗徙太子和於新都郡尋遣使賜死今歙縣有階村是其謫居處此亦當是太子和音轉而為鴻既不可考因以勾踐附㑹之耳唐中和年中改延賔里寰宇志及新經皆言改為婺安里今從祥符經祠廟東嶽廟城隍廟在縣東婺女廟在縣西北忠顯廟在縣南五龍廟在縣東南靈順廟在縣西其神五人舊號五通廟大觀三年三月賜廟額宣和五年正月封通貺通佑通澤通惠通濟侯紹興二年五月並加封四字十五年九月封六字乾道三年九月封八字淳熙元年進封顯應顯濟顯祐顯靈顯寧公汪司空廟在縣東南唐汪武始遷今縣者也斂溪廟在縣南祥符經又有髙溪中雲并敕封龎史君廟道觀紫虛觀在東北五十步舊名棲真觀南唐保大五年置政和四年敕改通元觀在靈巖舊名洞靈觀僧寺報恩光孝禪院在游汀鄉舊名中峰寺唐中和二年置崇寧四年閏二月改天寧萬夀禪院後改今額大起禪院在萬安鄉唐乾寧二年置智林禪院在縣城唐乾符二年置保安禪院在縣城吳順義三年置雲興禪院在丹陽鄉唐咸通元年置普濟院在縣城舊名萬安崇福院唐中和三年置大中祥符六年十月敕改隆興院在萬安鄉舊名永泰院大中祥符元年敕改如意院在浙源鄉舊名荷恩寺唐開元二十八年置大中祥符元年十月敕改靈隱禪院在浙源鄉唐天祐元年置荷恩院在縣城唐光啓二年置鳳林院在萬安鄉唐大中元年置天王院在丹陽鄉唐乾符元年置天復二年賜額州新經云天福二年建非天福是後晉年號南唐不以為稱此自唐昭宗天復耳感恩院在萬安鄉唐中和五年置資福院在游汀鄉建隆二年置金剛般若院在浙源鄉唐天祐二年置香嚴院在丹陽鄉舊名西千院慶厯二年七月敕改􅰔崌院在丹陽鄉吳順義年中置大田院在西南七十里唐大和元年置龍泉院在游汀鄉吳順義七年置湖田院在懷金鄉唐中和二年置湖山院在丹陽鄉吳順義三年置沙門院在游汀鄉開寶七年置白塔院在縣西八十里吳乾正三年置龍祥院在游汀鄉唐中和元年置山房院在懷金鄉吳大和元年置靈仙院在萬安鄉南唐天祚二年置王提刑總角時每游戲寺中或指之曰君若登第者此井欄亦爛也及得官歸作詩云鄉人笑我無官分爛却靈仙石井欄里人至今誦之松溪院在萬安鄉唐景福元年置黃蓮院在萬安鄉唐咸通中置院記咸通創基光化四年賜名靈河院在縣西