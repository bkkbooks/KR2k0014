body:
  text: 新安志巻十宋羅願撰叙雜説厯有歸餘筮則歸竒雜説不齊末篇總之前人所録八以區分耳目所得别為記聞亦可以汎觀人事山隂朱育仕郡門下書佐太守濮陽興問以人士育曰近者太守上虞陳業絜身清行志懐霜雪正亮之信同操柳下遭漢中微委官棄禄遁迹黟歙以求其志髙邈妙蹤天下所聞故桓文遣之尺牘之書此竟三髙㑹稽典録宣武既廢太宰晞父子仍上表曰應割近情以存逺計若除太宰父子可無後憂簡文帝荅表曰所不忍言况過於言宣武又重表辭轉苦切簡文更答曰若晉室靈長明公便宜奉行此詔如大運去矣請避賢路公讀詔手戰流汗於此乃止太宰父子逺徙新安晞字道升元帝第四子初封武陵王拜太宰晞未敗四五年中喜為挽歌自搖大鈴使左右習和之又燕會倡伎作新安人歌舞離别之辭其聲甚悲後果徙新安出世説并注按晉書倡歌事作庾晞非也崔日知為京兆尹處分長安萬年及諸縣左降流移人不許暫停有違晷刻所由决杖後貶歙縣丞為縣家催逼求與妻子别不可得人以為報應朝野僉載李涵為御史大夫京畿觀察使徳宗即位以涵和易無剸割之才除涵太子少傅充山陵副使涵判官殿中侍御史呂渭上言涵父名少康今官名犯諱恐乖禮典宰相崔祐甫奏曰若朝廷事有乖舛羣臣悉能如此實太平之道除渭司門員外郎尋有人言涵昔為中正少卿此時無言今以少傅為慢官故妄有奏議詔曰呂渭僭陳章奏為其本使簿訴官名朕以宋有司城之嫌晉有詞曹之諱歎其忠於所事亦謂確以上聞乃加殊恩俾膺厚賞近聞所陳少字往嵗巳任少卿昔是今非罔我何甚豈得謬當朝典更厠周行宜佐遐藩用戒薄俗可歙州司馬同正由是改涵為檢校工部尚書兼光禄卿仍充山陵副使舊唐書元和三年秋以右庶子盧坦為宣歙觀察使坦到官值旱饑榖價日増或請抑其價坦曰宣歙土狹榖少所仰四方之來者若價賤則商船不復來民益困矣既而米斗二百商旅輻凑民賴以生資治通鑑江南偽中書舍人徐善幼孤家於豫章楊呉之尅豫章善之妺為一軍校所擄既定軍校求得善請以禮聘之善自以舊族不當與戎士為婚因不許乃强納幣焉悉擲棄之臨以白刃亦不懼然竟擄之而去善即詣楊都求見呉楊渥而訴之時渥初嗣藩服府廷甚嚴僭擬王者布衣游士旬嵗不得一見而善始至白沙渥夜夢人來言曰江西有秀才徐善將來見公今在白沙逆旅矣其人良士也且有情事公其厚遇之旦即遣騎迎之既至禮遇甚厚且問所欲言善具白其妹事即命贖歸徐氏時歙州刺史陶雅聞而異之因辟為從事慶厯二年二月太常博士天章閣待制林瑀落職通判歙州時中丞賈昌朝上言瑀所進會元紀全渉圗緯瑀為儒官専以隂陽小説上惑君聽不宜在勸講之地故落職外任㑹要自睦州青溪縣界至歙州路皆鳥道縈紆兩旁峭壁僅通單車方臘之亂曾待制出守但於兩岸上駐兵防遏下瞰來路雖蚍蜉之微皆可數賊亦不敢犯境會宋江擾京東魯公移守青社掌兵者以霧毒為解移屯山谷間州遂䧟方勺泊宅編方臘之亂已殘睦歙二州而監司尚不以實聞於朝唯知鎮江府毛友節次馳奏時宰相方主應奉事而本路使者皆朱勔客也反怒其張皇即罷友為宫觀而以虞奕代之友謝表有曰兩郡生靈已罹於非命一路使者猶謂其無他嚴州圗經詩話謝舉字言揚幼好學與兄覽齊名為太子家令掌管記深為昭明太子賞接秘書監任昉出為新安太守别舉詩曰詎念耋嗟人方深老夫託其屬意如此謝覽𫝊唐李尚書擢罷歙州與呉圓交代有佐酒録事名媚川聰明敏慧李頗留意縁納營伎韶光託於替人令存恤之臨發共飲不勝離情有詩曰經年理郡少歡娯為習干戈間飲徒今日臨行更交割分明留取媚川珠呉答曰曳履優容日日歡須言違徳涕汍瀾韶光今已輸先手領取蠙珠掌内看南部新書趙嘏頗有詩名不拘小節飲中贈歌者曰倚風無處避梁塵雅唱清歌日日新來值溪亭花欲盡一聲留得萬家春後因酒失悔過以詩上歙州守曰葉覆晴溪豔豔紅路横秋色馬嘶風猶攜一榼郡齋酒傾對青山憶謝公盧瓌抒情録姚巖傑梁公元崇之裔孫也嘗以詩酒放遊江左凌忽前達旁若無人盧肇牧歙州巖傑在婺州先以著述寄肇肇知其使酒以手書褒美贈以束帛辭云兵火之後郡中凋弊無以迎逢大賢巖傑復以長牋激之肇不得已輟所乘馬迓至郡齋館榖如公卿禮既而日肆傲睨肇嘗以詩吒巖傑云明月照巴山巖傑大笑曰明月照一天奈何獨言巴山耶肇漸不得意無何會於江亭時蒯希逸在席肇請目前取一事為酒令尾有樂器之名肇令曰逺望漁舟不闊尺八巖傑遽飲酒一器凭欄嘔之即席還令曰憑欄一吐已覺空喉其傲慢如此唐摭言楊行敏出使驛騎到歙州郡守輕待慊恨尤甚題詩於冬青館云駑駘嘶呌知無定騏驥低垂自有心山上髙松溪畔竹清風纔動是知音又曰杜鵑花裏杜鵑啼淺紫深紅更傍溪遲日霽光搜客思曉來山路恨如迷南部新書李義山詩小鼎烹荼面曲池白鬚道士竹間碁何人書破蒲葵扇記著南窗穏睡時蒲葵扇出謝安𫝊然人不知其何物名蒲葵蘇子容云㯶櫚也出廣雅今衢信宣歙間扇是也謂形似蒲葵爾蔡寛夫詩史中都一士大夫家收江南李後主書一詩云銅壺漏滴初盡髙閣雞鳴半空催起五門金鎖猶垂三殿珠籠階前御柳搖緑仗下宫花散紅鴛瓦數行曉日鸞旗百尺春風侍臣舞蹈重拜聖壽南山永同下有馮延已三字陽春録後南唐元宗優待藩邸舊僚馮延已自元帥府書記至中書侍郎遂相時論以為非才江文蔚因其弟延魯福州之敗請從退削乃出撫州秩滿還朝因赴内宴進詩曰青樓阿監應相笑書記登壇又却回詩史馮延魯出討閩州催督軍糧急於星火李建勲以詩寄之曰粟多未必為全計師老須防有伏兵既而福州之兵果為越人所敗南唐近事歙州問政山聶師道所居也嘗有人渉險攀蘿至絶壁於巖下嵌空處見詩一首雖苔蘚昬蝕而文尚可辨題云黄台詞不知台何人也出詩史按台國初時屯田貟外郎詩二十韻詞多不録伍喬張泊少相友善張為翰林學士寵眷尤優異伍為歙州通判作詩寄張戒僕伺張游宴時投之一日張與僚友近郊宴懽甚僕即投詩詩云不知何處好銷憂公退攜壺即上樓職事久叅侯伯幕夢魂長繞帝王州黄山向晚盈軒翠黟水含春繞郡流遥想玉堂多暇日花時誰伴出城游張得詩動容久之為言上召還為考功貟外郎判吏部流内銓詩史蘇壽易簡長子也知泗州公用不足往來憾之壽為詩曰戴笠披蓑軍十萬饑嗔飽喜客三千後移越州與通判賈贊善不叶移歙州有詩曰却因賈贊善來作歙知州胡納見聞録景祐五年廷試進士以鯤化為鵬為詩題呂濟叔詩云千尋離海嶠一息過天池議者謂此詩意自當為第一人也雲齋廣録丘濬十嵗謁陳州太守曰前日寺中聞射因成詩云殿宇時聞燕雀鳴虚庭盡日少人行孤吟獨坐情何限時喜風傳中鵠聲守喜之令對弱柳絲絲搓緑線對云春雲片片揭新綿古今詩話丘濬寺丞失意徧游諸郡至山陽郡守屢召之夜飲翌日作詩曰醜却天下美人面正得世間男子心郡守他日再為文字之飲以謝之又至儀真太守召看牡丹作詩曰何事化工情愈重偏教此卉大妖妍王孫欲種無餘地顔巷安貧欠買錢曉檻競開香世界夜欄誰結醉因縁須知村落桑麻處田叟饑耕婦不眠又至五羊贈太守詩曰碧睛蠻婢頭蒙布黒面胡兒耳帶環㡬處樓臺皆枕水四周城郭半圍山又云風腥蠻市合日上瘴雲紅守見之不懌翰府名談朱吏部喬年儒學決科刻苦為詩紹興初綦處厚為翰林學士每哦其詩最愛一絶云春風吹起籜龍兒戢戢滿山人未知急喚蒼頭斸煙雨明朝吹作碧叅差蓋前人有筍詩曰急忙喫著不可遲一夜南風變成竹喬年㸃化乃爾精巧處厚力薦于朝後為尚書郎曽端伯皇宋百家詩選程進道紹興初帥閩中殄滅諸宼以武庫為止戈堂一時諸公題詠甚多汪彦章二詩最為絶唱其詩云此老胸中百萬軍暫勞試手犬羊羣山頭不復望廷尉柱下何須用惠文解帶為城聊戲劇賣刀買犢便耕耘三山勝處開華屋千載人𫝊舊史君千里閩山驛騎飛天書趣解海邊圍異軍方逐蒼頭起元帥徐將白羽揮翻就鐃歌春舉滿收還烽火夜開扉向來萬事關兵氣都作風光坐上歸桐江詩話石敏若學士橘林文汪彦章内翰龍溪集合竝行於世二集之詩相犯甚多如鳥聲應為故人好梨雪欲將春事空山色總兼溪色好松聲長作雨聲寒負郭生涯千畝竹長年心事四愁詩千里江山漁笛晚十年燈火客氈寒日邊人去鴈行斷江上秋髙楓葉寒天闊鳥雙下山寒人獨歸及阻風餘干渡詠水晶數珠次蘇養直韻寄黄元功阻風雨辟邪渡寄王仲誠客至夏夜示友人等詩皆全篇見於兩集未知果誰作設皆内翰所為則橘林中詩本自無多去此遂空冀北之羣矣出漁隠叢話漁隠者績溪胡待制長子名仔寓居呉興自號苕溪漁隠雜蓺錢鄧州若水嘗言古之善書鮮有得筆法者唐陸希聲得之凡五字擫押鉤格抵仍用筆雙鉤則㸃畫遒勁而盡妙謂之撥鐙法希聲言自斯翁及二王以至陽冰皆𫝊此法希聲以授沙門𧦬光𧦬光入長安為翰林供奉刁衍言江南後主得此法書絶勁復増二字曰導送今待詔尹熙古亦得之而所書為一時之絶查道始篆患其體勢柔弱熙古教以此法仍雙鉤用筆經半年始習熟而篆體勁直甚佳楊文公談苑薛稷天后朝位至少保文章學術名冠當時學書師褚河南時稱買褚得薛不落時節畫蹤閻令秘書省有畫鶴時號二絶曽旅遊新安遇李白因留連書永安寺額兼畫西方像一壁筆力蕭灑風姿逸發曹張之亞也二妙之跡李翰林題贊見在出唐書斷按稷嘗為黟縣令白亦嘗至新安但時有先後耳薛稷曽為黟縣尉善畫鶴今邑人時有畫者蓋薛公之餘風出太平寰宇記言尉亦悞也裴休守新安日屬希運禪師初於黄蘖捨衆入大安精舍混迹勞侣掃灑殿堂公入寺燒香因觀壁畫問是何圗相主事對曰髙僧真儀公曰真儀可觀髙僧何在僧皆無對公曰此間有禪人否曰近有一僧投寺執役頗似禪者公曰可請來即舉前問師髙聲云裴休公應諾師曰在什麽處公言下知㫖如獲髻珠曰真善知識也示人尅的如是何泊没於此乎寺衆愕然自此延入府治留之供養屢辭不已復堅請住黄蘖山薦興祖教有暇即躬入山頂謁或渴聞勝諭即請師入州公既通徹祖心復博綜教相諸方禪學咸謂裴公不浪出黄蘖之門也至遷鎮宣城亦創精藍迎請居之雖圭峰該通禪講為裴所重未若歸心於黄蘖而傾竭服膺也集黄蘖語要序冠編首留鎮山門出景徳𫝊燈録今歙縣有黄蘖山然當即禪師所住而𫝊燈又言禪師閩人於其本州黄蘖山出家後居洪州大安寺則與此不同研龍尾黼研章聖皇帝所常御也乾元升遐以賜外戚劉氏而永年以遺其舅王齊愈臣軾得之以遺臣宗孟且銘之曰黟歙之珍匪斯石也黼形而縠理金聲而玉色也雲蒸露湛祥符之澤也二臣更寳之見者必作也蘇文忠公集余家有歙研底有欵識云呉順義元年處士汪少微銘云松操凝煙楮英鋪雪毫頴如飛人間五絶所頌者三物爾蓋謂研與少微為五耶蘇公説今歙州之山有石俗謂之龍尾石亦亞於端若得其石心巧匠就而琢之貯水之處圎轉如渦旋可愛蘇參政易簡文房四譜端石在端溪色理瑩潤本以子石為上子石者在大石中生蓋精石也而流俗𫝊訛遂以紫石為上又以貯水不耗為佳有鸜鵒眼為貴眼石病也然惟北巖石則有之端石非徒重於流俗官司嵗以為貢亦在佗研上然十無一二發墨者但充翫好而已歙石出於龍尾溪其石堅勁大抵多發墨故前世多用之以金星為貴其石理微麤以手摩之索索有鋒鋩者尤佳余少時又得金坑礦石尤堅而發墨然世亦罕有端溪以北巖為上龍尾以深溪為上較其優劣龍尾逺出端溪上而端溪以後出見貴爾歐陽公研譜君謨言端石瑩潤惟有鋩者尤發墨歙石多鋩惟膩理者特佳蓋物之竒者必異其類也此言與余特異故并記之研端溪無星石龍尾水心緑紺如玉石二物入用餘不足道也蔡君謨文房四譜青州石末研受墨而費筆龍尾石得墨遲而久不燥羅文石起墨過龍尾端溪龍窟巖紫石又次之古瓦類石末過此無足議也蘇易簡文房四譜中載研四十餘品以青州紅絲石第一端州斧柯山第二龍尾石第三餘皆在中下雖銅雀臺古瓦研列於下品特存古物耳類説婺源研在唐開元中因獵人葉氏逐獸至長城里見疊石如城壘狀瑩潔可愛因攜之以歸刋粗成研温潤大過端溪者後數世葉氏諸孫持以與令令愛之訪得匠手琢為研由是天下始𫝊南唐元宗精意翰墨歙守獻研并薦研工李少微國主嘉之擢為研官令石工周全師之其後匠益多今全最髙年能道昔時事并召少微之孫明訪偽告不獲今山下葉氏繁息㡬數百户乃獵者之孫也唐積婺源研圗譜凡取石先具牲醪祝版擇日齋戒至山下設神位十餘於壇祝訖發之稍䙝慢必有蜂蠆虫蟒毒物傷人蓋神物所惜不欲廣𫝊人間所得不過百十枚即竭矣又當再祝之前後嚙死者十餘人今皆預祀享也唐侍讀研譜云二十年前頗見人用龍尾石研求之江南故老云昔李後主留意翰墨用澄心堂紙李廷邽墨龍尾研三者為天下冠當時貴之自李氏亡而石不出亦有𫝊至今者景祐中校理錢仙芝守歙始得李氏取石故處其地本大溪也常患水深工不可入仙芝改其流使由别道行自是方得之後縣人病其須索復溪流如初石乃中絶邑官復改溪流遵錢公故道而後所得盡佳石遂與端石並行按圖經龍尾山在婺源縣長城里今雖多故坑無有石出環縣皆山也石雖出他山實龍尾之支脈俱得謂之龍尾歙研説唐公研録云嘗過金陵於翰林葉道卿處見研方四五寸色淡青如秋雨新霽逺望暮天表裏瑩潔都無文理蓋石之美者云得於歙不知出於何坑今不復有祁門縣出細羅文石酷似泥漿石亦有羅文但石理稍慢不甚堅色淡易乾耳此石甚能亂真人多以為婺源泥漿石當須精辨之歙縣出刷絲研甚好但文理太分明無羅文間有白路白㸃者是辨歙石説涵星研龍尾溪石風字樣下有二足琢之甚薄先博士君得之於外姓姪黄村成伯成伯以嗜研求主婺源簿顧視一老研工甚至秩滿研工送之百里探懐出此研為贐且言明府三年之久所收無此研也黄始責其不誠工云凡臨縣者孰不欲得佳研使每研必珎石則龍尾溪當泓為海不給也此石嵗採不過十數幸善䕶之然研只如常研無甚佳者但用之至灰埃垢積經月不滌而磨墨如新此為勝絶耳先子性率不耐勤滌得此用之終身出何薳春渚紀聞其父武學博士去非也紙黟歙間多良紙有凝霜澄心之號復有長者可五十尺為一幅蓋歙民數日理其楮然後於長船中浸之數十夫舉抄以抄之傍一夫以鼓節之續於大熏籠上周而焙之不上於牆壁也於是自首至尾勻薄如一四譜山居者嘗以紙為衣蓋遵釋氏云不衣蠶口衣也然復甚暖衣者不出十年面黄而氣促絶嗜欲之慮且不宜浴蓋外風不入而内氣不出也亦嘗聞造紙衣法每一百幅用胡桃乳香各一兩煮之不爾蒸之亦妙如蒸之即常灑乳香等水令熱熟隂乾用箭簳横巻而順蹙之然患其補綴繁碎今黟歙中有人造紙衣叚可如大門闔許近士大夫征行亦有衣之者蓋利其拒風於凝沍之際焉陶隠居亦云武陵人作榖皮衣甚堅好也紙李主澄心堂為第一其物出江南池歙二郡今世不復作精品蜀牋不堪久自餘皆非佳物也文房四説歙州績溪紙乃澄心堂遺物其新也鮮明過之今世紙多出南方如烏田古田由拳温州惠州皆知名擬之績溪曾不得及其門牆耳婺源石研有羅文金星蛾眉角浪松文豆斑之類其要在堅密温潤天將隂雨水脈自生至可磨墨斯可寳者黄山松煤至精者造墨可比李廷珪然匠者多貧人於以求利故不逮也近有道人自能燒煙遣令就黄山取煤必得佳者歙州此三物竒絶唯好事以厚資可致之若臨以官勢莫能致也墨江南黟歙之地有李廷珪墨尤佳廷珪本易水人其父超唐末流離渡江覩歙中可居造墨故有名今人得而藏者亦不下五六十年膠敗而墨調其堅如玉其紋如犀寫踰數十幅不耗一二分也四譜今常侍徐公鉉云幼年嘗得李超墨一挺長不過尺細才如筯與其愛弟鍇共用之日書不下五千字凡十年乃盡磨處邊際有刃可以裁紙自後用李氏墨無及此者唐末陶雅為歙州刺史二十年嘗責李超云爾近所造墨殊不及吾初至郡時何也對曰公初臨郡嵗取墨不過十挺今數百挺未巳何暇精好近黟歙間有人造白墨色如銀迨研訖即與常墨無異未知所製之法奚廷珪墨二品一品面曰逺煙香墨漫曰從前奚廷珪其一面有特龍漫曰供使奚廷珪祖記墨皆狹薄輕脆多斷折校其精觕不及李廷珪逺甚安敢望超也自蔡君謨以來皆言李廷珪即奚廷珪唯此言奚墨不及李又何逺言唐李慥是諸李之祖不知孰是李超墨二品其面或為特龍或曰新安香墨其漫曰歙州李超造或止曰李超其號雖異亦互有精觕精意為之者廷珪不及也廷珪大墨有二品其一面曰歙州李廷珪墨漫有特龍其一面曰歙州李廷珪造漫有雙脊特龍小墨有握子者上止有一香字豐肌膩理光澤如漆又有小餅子面有蟠龍四角有供御香墨字漫止有一歙字前四品無粗者非法之至精曷能臻於此哉諸李唯超廷珪為特嘉承晏文用次之惟慶小挺子優於大墨可亞廷珪也宣道宣徳不知何許人其形製俱類廷珪疑歙州人也李孝美墨苑曽君示予墨一丸其面文曰新安上色香墨幕音漫曰歙州李廷邽墨肌理光膩與今之李廷珪墨形模不類其名邽珪不同形製復異謂之真廷珪墨其可乎然李超與其子廷珪唐末自易水渡江至歙州地多美松因而留居遂以墨名家本姓奚江南賜姓李氏超墨世不復𫝊襄嘗侍仁宗羣玉宴賜得之其面文新安香墨其幕歙州李超造與今所示形制相類予謂超與珪始至新安各出姓名尚用邽字超死而珪業益精面有龍文而其名亦用邽者作之有先後也何以知之蓋類其父超且藏蓄數十百年非偽效也予既辨之而墨遂歸吾家墨哉可無恨矣蔡君謨墨辨余收歙州李氏父子四世五人墨李超之子廷珪珪之子廷寛寛子承晏晏子文用用之後墨無𫝊焉有孫惟慶今為墨務官李氏墨超始知名珪或為邽與寛最精好承晏而下不能用家法無足取者世之好竒者多借廷珪姓名模倣形制以造之有至好者茍非素蓄之家不能辨之四説墨貴老久而膠盡也故以古為稱世以歙州李廷珪為第一易水張遇為第二珪復有二品龍文雙脊者為上一脊次之遇亦二品易水貢墨為上供堂次之近世兖州陳元亦為精廷珪弟廷寛寛子承晏晏子文用皆能世其業然差不逮近絶無有也廷珪為第一廷寛承晏次之張遇次之陳元又次之不獨造作有法松煙自異近得歙煙令造墨便有廷珪風采不為浮光乃知水性隨其土地而異予嘗有辨信不誣矣仁宗嘉祐中宴近臣於羣玉殿嘗以李超墨賜之曰新安香墨其後翰林諸君承賜者皆廷珪雙脊龍樣尤為佳品澠水燕談祥符中治昭應宫用廷珪墨為染飾有貴族嘗誤遺一丸於池中踰年臨池飲又墜一金器乃令善水者取之併得墨光色不變表裏如新遯齋閉覽禁中板刻古法帖十巻當時皆用歙州貢墨墨本賜羣臣今都下用錢萬二千便可募得元祐中親賢宅從禁中借板墨百本分遺官僚但用潘谷墨光輝有餘而不甚黟黒又多木横裂紋士大夫不能盡别也此本可當舊板價之半耳黄魯直跋翟公巽所藏石刻晁無斁有李墨半丸云裕陵故物也往於秦少游家見李墨不為文理質如金石亦裕陵所賜王平甫所藏者潘谷見之再拜曰真廷珪所作也世惟王四學士有之與此為一矣陳無已集山谷道人云潘谷一日過余取所藏墨示之谷隔錦囊揣之曰此李承宴軟劑今不易得又揣其一曰此谷二十年造者今精力不及無此墨也取視果然春渚紀聞余為兒時於彭門㓂鈞國家見其先世所藏李廷珪下至潘谷十三家墨斷圭殘璧粲然滿目其廷珪小挺嵗久不見膠彩而書於紙間視之其墨皆非餘墨所及東坡先生臨郡日取試之為書杜詩十三篇各於篇下書墨工姓名因第其品次云一日謁章季子於富春之法門寺出廷珪墨半笏為示初不見膠彩云是其大父申公所藏者其墨匣亦作半笏樣規製古朴是百餘年物王景源使君所寳古墨一笏蓋其先待制公所藏者背銘曰唐水部員外郎李慥造云諸李之祖也黎介然一見求以所用端石研易之景源久之方與後攜研至行朝有貴人欲以五萬錢輟研景源不與也沈珪嘉禾人初因販繒往來黄山有教之為墨者以意用膠一出便有聲稱後又出意取古松煤雜用脂漆滓燒之得煙極精細名為漆煙每云章仲將法止用五兩之膠至李氏渡江始用對膠而秘不𫝊為可恨一日與張處厚於居彦實家造墨而出灰池失於早墨皆斷裂彦實以所用墨料精佳惜不忍棄遂蒸浸以出故膠再以新膠和之墨成堅如石因悟對膠法每視煙料而煎膠膠成和煤無一滴多寡故其墨銘云沈珪對膠十年如石一㸃如漆此最佳者也有持張孜墨較珪漆煙而勝者珪曰此非敵也乃取中光減膠一丸與孜墨竝而孜墨反出其下逺甚余扣之答曰廷珪對膠於百年外方見勝妙蓋雖精煙膠多則色為膠所蔽逮年逺膠力漸退而墨色始見耳若孜墨急於目前之售故用膠不多而煙墨不昩若嵗久膠盡則脱然無光如土灰耳孜墨宜用之西北若入二浙一遇梅潤則敗矣黄山張處厚髙景修皆起竈作煤製墨為世業其用逺煙魚膠所製佳者不減沈珪常和沈珪汪通輩或不自入山多即就二人買煙今渠用膠止各用印號墨工製名多相蹈襲其偶然耶亦好事者冀其精藝追配前人故重名之也南唐李廷珪子承晏今有沈珪子晏又有關珪國初張遇後有常遇者和之子又有潘遇谷之子黟川布衣張谷所製得李氏法而世不多有同時有潘谷又永嘉葉谷作油煙與潭州胡景純相上下而膠法不及陳瞻之後又有梅瞻云世言歙州具文房四寳謂紙墨筆研也其實三爾歙本不出筆蓋出於宣州研久無良材所謂羅紋眉子者不復見惟龍尾石捍堅拒墨與凡石無異歐陽文忠公作研譜推歙石在端石上世多不然之蓋各因其所見爾方文忠時二地舊石尚多豈公所有適歙之良而端之不良者乎紙則近嵗取之者多無復佳品余素自不喜用蓋不受墨正與麻絶相反雖用極濃墨終不能作黒字惟黄山松豐腴堅縝與佗州松不類又多漆古未有用漆煙者三十年來人始為之以松漬漆竝燒余大觀間令墨人髙慶和取煤於山不復計其直又嘗被命館三韓使人得其貢墨碎之參以三之一既成潘張二谷陳瞻之徒皆不及葉左丞避暑録話定數僕射房琯相國崔渙竝曽貶任睦歙州官時有婺州人陳昭見之云後二公竝為宰相然崔公為一大使來江南及至徳初上皇入蜀房崔二公同時拜相崔後為選補使巡按江東至蘇杭間崔公自説出定命録元和十一年監察御史叚文昌與崔植同制入臺先是御史崔元亮察院之長每以二監察後至不由科名接待間多所闊略叚與崔深銜之元和十五年春穆宗皇帝龍飛命二公入相叚自翰長中書舍人拜植自御史中丞拜同在中書時元亮罷密州刺史謁宰相二相相顧搯元亮名曰此人不雲行地没而有心求官時中書侍郎蕭俛亦在食堂因問二相二相具以事對蕭相曰若如此且令此漢閑三五年不數日宣州奏歙州刺史闕其日印在叚相宅便除歙州刺史明日叚入朝都忘前事到中書大怒責吏房主事陽述云威權在君更何須宰相必是此賊納賂除官若非人吏取錢崔元亮何由得歙州刺史述惶怖謝罪云文書都不到本房昨日是相公手内擬名進黄及檢勘方省迷忘植欲改擬覆奏叚曰安知不是天與假吾手耳遂放勅下續定命録于濤者唐宰相琮之姪也琮南遷經平望驛維舟方食有一叟自門而進直抵㕔側小閣子中濤問叟何人對曰曹老耳問其所來對曰郎君極有好官職此行不用憂亦叙相國牽復之事濤因問表弟薛校書如何叟曰千里之外遇西則止官職雖非真刺史亦作假郡守時濤表弟杜孺休給事刺湖州寄箬下酒一壺可五斗因問叟頗好酒否叟忻然而請即以銀盂受之令自酌飲頃之酒盡已昏睡矣遂以銀盂枕首而睡時蚊蚋極盛無有近叟者及旦失叟唯銀盂在焉訪求莫知所止或云此即曹的休博士也魏之宗室仕晉為史官齊梁間或處朝列得神仙之道多遊江湖間往往賈販嘗拯救人以隂功及物人多有見之受其遺者濤自後授泗州防禦使歙州刺史佐淮南呉王楊公行密為副使相國尋亦北歸薛校書佐江西賓幕知袁州事務神仙感遇傳廣西昭州最為瘴毒之地而山水頗清婉郡圃有亭名天繪建炎中郡守李丕以與京國年號同欲更之乞名於寓公徐師川久而未得有范某者為易曰清輝已揭牓徐謁李同坐亭上少焉策杖於四隅視積壤中有片石班班如文字然命取而滌之乃丘濬所作記其畧云予擇勝得此亭名曰天繪取其景物自然也後某年月日當有俗子易名清輝者可為一笑考范初命名之日不少差洪舍人夷堅志俞舜凱徽州人紹興十八年赴省試夢紅黒二梯倚簷間有使登紅梯者俞顧梯級甚峻辭以足弱不能躋遂登黒梯造其顛而寤是嵗中特奏名第一人楚贄説亦徽人贄字少陸老儒終桃源丞神異大徽村在績溪縣西北五里有汪節者其母避瘧假寐於村西福田寺金剛下感而生節有神力長安東渭橋有石師子重千斤節指而告人曰吾能提此而擲之衆不信節遂提師子投之丈餘衆數十人不能動遂以賂請節復挈致故地尋入禁軍補神策軍將嘗對御俯負一石碾置二丈方木於碾上木上又置一牀牀上坐龜兹樂一部曲終而下無厭重之色徳宗寵惜累有賞賜雖㧞山曳牛之力不能過也太平廣記孚應廟在邵武軍泰寧縣東二里五代正明中建廟有二神相𫝊一姓陳閩人一姓汪歙人相遇於廟東之黄溪愛其山川氣象可為宅兆陳曰吾曩者過此識之以錢汪曰吾亦以丁為識遂闕地得錢而丁貫其中由是二人相悦卒俱𦵏於此數有神異偽閩王氏時封為將軍國朝載在祀典水旱疾疫有求必禱螟蝗盜賊不及其境元豐中賜孚應廟額元祐初封靈符靈佑侯政和加封寧惠寧順公宣和進封廣惠廣順王至紹興二十五年封廣惠英顯王廣順威顯王武陽志邵武圖經唐天寳末歙州牛與蛟鬭初水中蛟殺人及畜甚衆牛因飲水為蛟所繞直入潭底便爾相觸數日牛出潭色赤時人謂蛟死廣異記婺源縣有大黄石自山墜於溪側瑩徹可愛羣犬見而競吠之數日村人不堪其喧乃相與推致水中犬又俯水而吠愈急取而碎之犬乃不吠稽神録新安人閔居敬所居為山水所浸恐屋壊移榻於户外而寢夢一烏衣人曰君避水在此我亦避水至此於君何害而迫迮我如是不快甚矣居敬寤不測其故爾夕三夢居敬曰豈吾不當止此耶因命移牀乃牀脚斜壓一龜於户外放之乃去記聞州南數里有岸特髙號浣沙隔溪對龍井山望城陽不逺相𫝊李太白訪許宣平徘徊岸山上甚久以白詩考之嘗稱金華五百灘之勝而思為新安之游又嘗自洄溪十六渡至黄山湯泉之下則吾土山川勝槩頗已寄於逸想其贈許宣平詩沈汾述以為𫝊當不虚也又白集有答山中人所謂桃花流水杳然去别有天地非人間者復相𫝊以為入黟所作而俗又有石墨嶺與水西興唐寺詩語不類太白東坡嘗疑富陽國清彭澤興唐詩及姑熟十詠非太白所作而王平甫疑十詠出於李赤按南唐自有一翰林學士李白曽子固以為十詠是此人所為然則此間墨嶺興唐詩豈亦此類耶覽者詳之馮相國樂府號陽春録者馮氏子孫泗州推官璪嘗以示晏元獻公公以為真賞至元豐中髙郵崔公度伯易䟦以為李氏既有江左文物甲天下而馮公才華風流又為江左第一其家所藏集乃光禄公手抄最為詳確而尊前花間諸集中往往謬其姓氏近時所鏤歐陽永叔詞亦多有之皆𫝊失其真本也崔公云劉煇信州鈆山人未第客新安為人傭書以自給其寓歙縣鄭氏及績溪汪氏尤久汪氏子弟嘗課堯舜急親賢賦煇竊為代作師視其語與平日異詰之以實告乃發煇牀篋楓葉委積葉上皆細書成文始異之明年還鄉遂貢京師已而為進士第一今俗聞猶有蓄其所寫禮部韻者王提刑守南劒州致書陳諫議有求益之言陳公答曰瓘辱書勤恤累紙感不容言别紙之論尤甚謙厚瓘孤苦待盡人事弛廢獨聞賦政愷悌民之受賜前此未之有也託庇方厚其何以告左右雖然意所欲言不敢自外境内有二賢士呉熙呉儀儀居水東熙在橘溪兄弟也好學有守介而能通求之士類不可多得遺逸之選宜在此輩以其善自韜晦莫有知者閣下好賢禮士倘使其名自此彰徹非唯敦奬行義亦足以上助朝廷求士之意政之大者宜無以過此輙縁下諏布所欲言僭易是懼此有以見前輩相與蓋如此王公嘗為劒學撥田至今號王公莊其祠象久益暗紹興中嘗遣人求訪公後裔復求繪象以去其後王筠文剛為通判就為新其祠筠於公有族屬嘗被檄往建寧府决獄建亦公舊治聞筠至皆焚香以迎以為王公孫也公去二郡至是蓋三紀矣曾公諤為守雅敬郡人俞平叔平叔老儒用累貢恩得官嘗尉彭澤檢旱宿山寺有嫗夜至門委白金一襆而去平叔呼從吏寺僧封識送縣及還令欲盡法籍犯者家而使平叔得賞平叔笑曰易直豈以此求賞耶即縣斷罪以贓没官足矣歴三任以母老不仕俞氏主塋墓者有享祀田二十畝輸税而食其餘未嘗告乏於人時盧君知原行之為歙縣宰周殿撰秩重實謫監城下酒税曾公聞平叔病使二君往視之環堵蕭然因問以後事平叔曰棺已具矣衣已浣矣方屬妻子袝𦵏先塋不為齋具此外無所須也二君退為曾公言之皆歎息盧乃折簡遣闕吏齎錢五萬為湯藥之奉平叔召吏至卧内問知縣俸耶曰非也抑出之官帑耶曰非也將縣吏若里正上户所率歛耶曰非也平叔曰財非天降地涌何由而得辭不受吏再至不復視曰吾平生貧不唯今日豈以五萬錢變吾志哉是夕卒年八十九曽公賢有政聲冲澹類學道者為郡時年七十餘矣神骨清健至九十餘乃卒盧君平江人資廉明滯訟有踰十年者皆手為决遣旁郡邑以事詣朝省外臺者多求送歙縣後為禮部侍郎周公以名臣謫筦庫不見其施設獨其流風遺韻被此邦云始鄉之老儒年過九十者曰崔君虞卿字顯仲能以世次歴數吾縣自昔之為儒者縣北鄭鈞子平及願先大父其次皆在一二數中願時尚幼不能盡其説先是本朝達者有舒謝俞呂之屬矣中數十年學者不繼大父生嘉祐間㓜獨知好書間輒買私習讀之曾大父無他子方仰以治生業見猶怒之後察其誠乃已元豐中游郡校時學者尚少大父出意為之衆未以為是及紹聖中罷顧募行差役大户無免者知縣王君薦篤意勤學凡家有受書一人則為盡免之同時富者子皆執役在庭下見大父獨庭上與縣大夫抗禮由是羡慕始相勸於學然大父晦不顯年九十餘耳目聰明得異書猶勤閲之以封至朝請大夫諱舉字子直云而鄭氏越數世至紹興間有登第者二人先同年胡銓仲平工聲律嘗就廣文館試惟徳動天賦其用事處云明如虞帝雨無納麓之迷令若成王風有出郊之反為考官所黜佗考官過之取讀稱善問所以黜之之意考者以為觸忌諱乃袖去自以其名取之竟論以為第一後至政和中始登第方是時王氏經學行罷詩賦不用然每見等輩好言其舊習至今胡氏一族為賦有典刑汪屯田廷直微時與里人女約昏政和中諸州類試為省元既登第所約女喪明其家使來謝不能復相當廷直不可竟成之後赴調在京師貧甚舍於符寳汪公㑹圍閉闕方責金銀期且滿無以應間獨至汴上行屏營有懐沙之意傍舍有人出止之問所須之數簾中出白銀二十兩袖以歸符寳怪問所從得具以實對相與訪其處無居者人以為隂徳之報魯直在洛時歙人祝碩字有道因知命以識魯直及謫黔中有道往訪之魯直為書帖云凡士大夫胷中不時時以古今澆之則俗塵生其間照鏡則面目可憎對人亦語言無味又贈以詞所謂長楊風挑青驄尾者也魯直八月十七夜張寛夫園待月有詞云老子平生江南江北最愛臨風笛孫郎微笑坐來聲噴霜竹蜀人謂笛音如牘故用之嘗書一本贈碩今俗本改笛為曲非也碩藏魯直文藁三枚率以連紙百幅為之改竄甚多洪尚書知許州嘗為園訪境中所有江南草木萃而種之下至紅躑躅之屬皆在焉號故里園時與賔佐游燕其間蓋公富貴久然多在外故惓惓如此晚節竟歸故鄉云當艱難時孫公佑鎮此邦為人絶嚴明時統制國信臣屯於此而郡南大姓所募弓手有閤門祇候宋與統之號宋舍人待信臣尤桀驁至坐太守衙倚佑令牽去斬之又張憲軍久留有錢糧官以為郡不時支糧捉手分與録參衣相結擁至庭下佑出揖録參以上問彼來者何人見節制兵馬而不聲喏何也叱斬之自通判以下皆懼為懇凡數四乃已呼門者謂曰爾曷為縱之使入後不得復爾取軍令狀門者退曰自今有輙入者我直當殺之耳既畢乃使人將錢糧官詣憲軍憲不得已為杖之佑約與糧而促其進發憲自詭三日行其政雖嚴未嘗輕與人以徒罪公燕飲食及圃所供菜皆於供給錢中尅還之始方臘來宼時歙縣人程叔清家避地於城南有女年十七父母計曰我等處此不幸則死獨此女年色方盛萬一辱於賊何以見族黨乃呼謂曰吾州之俗尤以滛為諱爾良家女也足未嘗出閨閫賊倘以兵脅爾當奈何女曰兒豈從賊者必不可當以死拒之親族又從旁審其語女因取所攜衣囊負以趨且為見執罵賊狀父母喜曰果如是真吾女也吾聞死於兵者用道家説醮九幽則能升濟魂魄爾勿慮女笑曰諾明日散處東塘山中女適為賊所遇賊好謂曰吾以爾歸聖公毋憂不富貴女曰爾輩欺天害人狗彘之不若何聖公也賊脅以刃曰不從吾言必殺若女曰我知有官府不知有賊賊先斷其髻益以好語誘之女且唾且罵賊知不可屈刀亂下潰其尸乃去有二兒隠旁大石下備窺見本末為其家言之皆悲喜因𦵏東塘山中願兄頌端規為作𫝊汪内翰少在郡齋數獨於爐亭中避人為文同舍迫而觀之乃擬草制詞衆笑之中興遂居翰苑為代言之最其除知本州謝表云惟今日股肱之郡實平生父母之邦行路咨嗟全家感涕又云屬縣前驅初靡勞於草檄行朝在望復何待於移關遺執政啟云城郭重來疑千載去家之鶴交游半在或一時同隊之魚時汪丞相亦杖節過家中宴作詩云兩兩泰階星一色亭亭華表鶴雙歸公與唱和鄉里𫝊之在郡大興廟學先是公嘗為鎮江作學記闕府以白金致贐適至即以佐費歙縣多賢宰舊有董君若王君景丞則黎君確既久事多逸近嵗民間𫝊誦者鄭君鋭夫錢君瓌鄭君才髙詳練吏不能欺先是郡科撥諸縣賦輸嵗不同掌計者竝縁大率有増而無損縣素乏秔米時秋税以十分為率其四分二釐科秔餘則為絹米錢米穤豆之屬明年郡案復改科撥行下鄭請於守以為某始到官嘗受此數於下吏矣在某任内願奉以周旋不願數更也乃按舊為籍齎至前丐守為印書之由此終任無所増郡亦無乏事又縣賦既重則役錢亦多嵗遂以其贏為傍縣顧役人君以縣各用其人今驅縣民使出錢顧庸以給他縣令佐之用非政之急者也乃度官用以賦取其尤貧不能出者多寛之終任無一事不結絶者錢君廉潔愛民常言瓌無他長正能忍饑三日耳其政務抑强扶弱於大辟尤經意吏不得輕重其間差里長但用税錢不以人丁多寡其科撥亦三嵗不改自二君去後今科秔至八分有竒矣近有邵君巖者其操履如錢君資頗安靜而方略不及也三君皆已蓋棺論定故私著之又績溪民言孫君懋為宰不令里長督賦苐按省限里長不敢無故至人門民亦樂輸末限既畢始謄欠付督之先是里長領民錢為代輸者帛一尺為錢百五十數寸者取至百錢孫君乃為第三等以下置零殘簿并匱於聽事側令民得以尺寸自為鈔持錢投匱中少者至十餘錢皆面給鈔與之即以其日銷簿其官司追逮民納在前而吏不為銷者使代償之今為某官宣和兵火後發地得故碑乃景徳中太守昭文學士趙昻為其母立始昻父金吾大將軍延進娶晉州節度使張温女廣順中昂大父中令暉鎮岐母張年十七生昂累月而卒於岐昂始齔知之及壯登第入朝三十年志求遺像每朝士銜命及謁告過岐下者必涕泣屬之皆以嵗久訪求無所淳化中昂以右史判吏部南曹請自訪之詔給假不解職仍勑郵𫝊供須經旬無所聞晝夜悲啼逮還朝有得其繪像於僧寺中者至京師遺之昂悲喜作詩自舊相宋公琪呂公蒙正暨臺閣名賢十九人為之詩而翰林蘇承㫖易簡為贊曰英英趙君孺慕終身孝發於性性通於神神啟其便復歸是真髙堂曉懸和顔若春似以慈訓教其為臣蒸蒸趙君如聞音塵饋奠以時哀號感鄰趙君為人天驥石麟趙君為文紅藥白蘋出事聖主歸寧慈親忠孝言行無慙縉紳昂以景徳初出守歙州明年郊禮因表求追封詞㫖哀切詔贈清河縣太君又明年五月告至率官吏自歙安門結綵導樂而刻告及所得詩贊為紀美追榮記立之西溪太平寺今在學之左塾王提刑謝事還家以名徳為縣大夫所敬慮鄰里干請大榜于柱曰疇昔居官惡人請託今茲閑退來者不可有言會郡守與公宿相好公往訪之親舊有追及公於五嶺間者自以訟在郡願借公言為重公曰吾不欲出為是故也使爾雖不因吾言得直人其可户曉耶遽命駕還令佐有訪公為政者勸以寛賦役為國恤民爾與劉丞相摯厚善其子蹈為婺源丞以父行事公公每見但問尊公安否不及其他丞相去位坐累者衆獨了然免於猜嫌嘗謂人云閭里鄉黨要在輯睦恩多怨少則胷中常暇貲不耗散聞者轉以相告訟訴為衰經界之行績溪以鄉均税税錢無所歸者百餘千乃强均配之上田二百之外有溢至三百五十者訴者不已太守趙監丞子遊始至以問孔目官章愈章請按沙漲之田税錢當倚閣者百餘千餘以次均減然後定又諸縣輸納或抑民使就整如遇寸則輸尺遇錢則輸兩遇合即輸斗之類時歙縣貧民有以墳地税當輸正綿四分折綿四分者攬户以為就整則為綿二兩取其錢八百民因訴於州趙守復以問之章對以在律無有因請徧下屬縣但按元數輸納而向之為錢八百者直輸綿二錢為錢八十耳章平生多惠利其鞫獄務全活子元崇兩首鄉薦遂登第今為夷陵令賢而有文新安多佳山水又有前世許聶遺風以故人多好仙始謝諫議微時讀書烏聊山市人有汪四者心愛敬公旦就市得錢暮輒攜以相資嘗數日不來公下山問之人云已盜驢竄去矣及公登第為蜀中縣令一日有道人來訪者乃汪也與坐書室汪起畫壁為巖洞有朱門金鎖解腰間鑰開之挽公同入公請歸白㛐汪遂先入比出壁屹立如故汪亦不復見崇觀間有呂望天者行好仰視為人作瓦卦語黙不常周殿撰戲贈以詩曰新安呂望天一旦棄家縁朝就市㕓食暮歸空屋眠為君打瓦卦乞我一文錢日日只如此已經三十年方臘未亂前失所在近有金野仙者名梁之兩浙提刑受之子以䕃為奉新尉一旦狂肆以病去官妻亦攜二女去之自是食不繼然貌常充悦時時卧冰雪中體不慄晚常在郡市好為人作詩及與人語往往有警誨得者皆以為能知其意中事每三嵗貢輙預書得者姓氏嘗曰使吾為物外神仙則難若塵中仙人拔生度死可庶㡬也每言吾當以來嵗八月死幸無焚我至淳熙初年八月十三日夜半起坐一榻揮扇自若視之已化矣郡人相與壇之於紫陽山又有黄冠曹元育休寧人寄食歙縣之長春里凡數十年未嘗有求於人破窗塵榻凝坐達旦或一卧輙六七日一旦以衣物道具徧散鄰里遂卒新安墨以黄山名數十年來造者乃在婺源黄岡山戴彦衡呉滋為最彦衡自紹興八年以薦作復古殿等墨其初降雙角龍樣是米待制元暉所畫繼作圭璧及戲虎樣時議欲就禁苑為窑稍取九里松古松為之彦衡以松生道旁平地不可用其後衢池工者載他山松往造亦竟不成彦衡未㡬死嘗出貢餘一圭示米公米以為罕有其比詩人呉可贈詩曰病來漫喜折釵股老去尚懐雙脊龍他日扁舟會乘興摩娑圭璧小從容呉滋家有汪内相帖云呉滋作墨新有能聲紹興庚申於新安郡齋授以對膠法此墨是也試之當見其佳滋又求題品於李參政漢老李公云已經評子矣呂舍人居仁亦常遺以詩今上在東宫以滋所造甚佳例外支犒設錢二萬歙州軍事牒攝同十將兼衙前虞候充衙佐鄭槙牒奉處分前件官推誠奉上戮力從戎登陴將匝於星灰禦侮頗勞於蚤夜既殫勤瘁須議甄酬勉勵干城更期顯級事須改補正同十將兼衙前虞候依前舊務牒舉者准狀帖牒所由仍牒知者故牒光啟三年十月二十三日牒使檢校右散騎常侍兼御史大夫呉圎右藏於歙縣士人汪徳符子充家汪得之琶村鄭氏紙甚低小然極𦂳厚自十將至姓名三印年月日四印其文曰歙州之印印文刻缺而朱墨色皆如新新安志巻十
