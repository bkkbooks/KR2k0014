body:
  text: 新安志巻三宋羅願撰歙縣沿革歙望縣以縣南有歙浦故名此義似未安而舊唐志有之不可略或曰歙者翕也謂山水翕聚也秦屬鄣郡漢改鄣曰丹陽而以歙為丹陽都尉治建安十三年呉使賀齊取黟歙乃分歙縣東鄉新定里之地置始新縣又分南鄉安定武疆里之地置新定縣及置黎陽休陽并黟歙凡六縣以為新都郡呉志武疆葉郷東陽豐浦四鄉先降賀齊表請以葉鄉為始新縣而嚴州圖經稱淳安縣本歙縣東鄉新定里之地按淳安即古始新縣而遂安即古新定縣也舊唐書亦云遂安縣後漢分歙縣南鄉安定里置然今遂安有武疆山武疆溪則又當兼武疆鄉地故録之廣異聞後郡更名新安梁武帝承聖中分歙及海寧黟三縣之地復置黎陽以四縣别為新寧郡陳省新寧郡及黎陽縣隋義寧中徙新安郡治于歙之烏聊山唐永徽五年析歙置北野永泰二年析歙置績溪北野至大厯中廢㑹昌四年十二月升歙為𦂳縣國朝為望縣境縣在郡東一里先是漢歙縣境廣大呉分之為始新新定黎陽休陽四縣始新新定今嚴州之淳安遂安是也宋省黎陽入海寧海寧今之休寧唐又析歙置績溪縣開元中析休寧置婺源縣今自歙縣休寧績溪婺源嚴州之淳安遂安凡六縣皆秦漢歙縣之故境太平寰宇記又云壽昌縣秦歙縣地漢為富春縣之境按壽昌本呉郡地梁武帝普通中割屬本郡耳元非歙縣地也數分割則益小今東西七十七里南北二百四十里東至績溪界四十里南至淳安界百二十里西至休寧界三十七里北至寧國府太平界八十六里東南至臨安府昌化界百一十里别到淳安界百一十里西南到休寧界三十五里東北到績溪界七十五里西北到太平界百三十里鎮寨鎮舊有三巖寺鎮在縣西二十五里新館鎮在東三十里街口鎮在南百里今唯巖鎮設官收酒稅之𣙜而新館街口不為鎮然市井如故寨有四管界寨在縣西百八十歩王干寨在東南百里黄山寨在北百里深渡寨在南四十五里鄉里其鄉十六其里八十明德鄉在縣東其里良干明化承風懷金還城平遼鄉在縣西其里仁風樂平善福新平黄池中鵠鄉在縣西舊曰遊山南唐時以舒雅為進士第一故改之其里遷喬禮教長林澧泉萬年孝女鄉在縣南舊曰合陽唐以章氏女孝故改之其里孝女龍年藥潭延賔章湍長樂上鄉在縣南其里富思白楊沙溪僊溪西村布政鄉在縣北其里安仁歸化成果連溪連山寧泰鄉在縣北其里仁祐仁愛寧信猶風儒宗長樂下鄉在縣東南其里長樂龍潭傍溪銅山王干登瀛鄉在東北舊曰登龍其里折桂清平化成宣化永泰仁禮鄉在東北其里萬安石干寧仁溪頭永福永豐鄉在西南舊曰永昌其里安業長清永楊清泰寒山長壽鄉在西南其里卒城龍宿龍還龍巷懐德仁愛鄉在西南本唐敬愛鄉其里金山長沙富資寧固湧泉寧仁鄉在西南其里修集神山臨江章溪仁福通德鄉在西北舊曰同德其里長春隱儒敦孝靈泉豐樂孝弟鄉在西北其里永安玉泉信行和睦萬安戸口天禧主戸萬六千四百二十八口二萬八千二十五客戸四十六口四百六十六未經界戸四萬四千五百三十經界戸二萬二千七百有十六乾道八年主户二萬五千五百三十四客戸四百有九而無其口數田畝田園山地祖額二十五萬二千九百八十四畝四十五步經界四十六萬有奇今為四十五萬八千一百五十六畝二角四十九步半塘千二百七處堨二百二十六處租賦夏稅紬千二百四十三匹三丈一尺三寸六分絹萬二千一匹一丈五尺八寸七分布二千三百四十四匹一丈八尺七寸一分綿八萬七千八百八十五兩五錢七分小麥二千七百五十二石八斗五升九合錢萬一千二百三十三貫三百九文軍布千五百一十二匹夏租課錢百一十九貫四十五文租課麥三斗八升内二升折麥茶一片秋稅糙米五萬六千二百八十七石六斗五升七合四龠鹽錢二千四百二十五貫六百八十四文三分租課糙米三百一十五石七斗八升熟米八石一斗九升黒豆十八石一斗七升和買紬五千一百三十七匹有半絹萬五千四百六十五匹酒稅巖寺鎮酒稅以紹興十七年所收為額酒六千六百三十六貫二百六十一文稅四千九百三十五貫三十八文坊塲二十六處城社縣即州所治社在東山上太平興國五年自州徙于此先聖廟及縣學本在縣南南唐保大八年置今附于州學官廨縣㕔在州城東有松風亭元豐中王薦為宰時知州事張慎修易之為歲寒亭少蘇公在績溪為賦詩而發運使蔣之奇為作賦刻石亭上丞㕔在縣側主簿㕔在縣後東尉㕔在縣西西尉㕔在縣南道路驛路東出績溪由寧國宣城南陵青陽貴池至池州凡七百里小路北踰箬嶺經太平石埭青陽界徑至池州纔三百七十五里橋梁馮橋在縣東十五里金坑橋在東十八里良干橋在東二十里清化橋在東二十九里冕輦橋在西七里巖寺橋在西二十五里甘露橋在北三里津渡深渡在縣南四十五里街口渡在東南百里揚之水自縣南流百二十里入淳安界又六十里至其縣又九十里至嚴州凡三百六十里山阜烏聊山在縣西北三百五十步髙二十八仞周八里漢建安之亂歙人毛甘以萬戸屯此山為呉將賀齊所破因置新都郡隋末越國公起兵亦屯於此及義寧中州自休寧遷治此山之下則城東北南皆踐山為之西有四水合流山上數石圓而白號落星石唐中世遷越國公廟於此俗因謂之廟山别呼山之東峯為東山云黄山舊名黟山在縣西北百二十八里髙千一百八十仞東南則歙西南為休寧西北則蔽于寧國府之太平縣漢末㑹稽太守上虞陳業絜身清行遁跡此山而世復相傳以為黄帝嘗命駕與容成子浮丘公同遊合丹於此山經引周書異記及呉地神仙傳甚詳今不復録其後又有僊人曹阮之屬故有浮丘容成之峯曹谿阮谿唐天寶六年六月十七日勅改為黄山黄山圖經云改黟山為黄山而祥符州圖經乃云改黄山為黟山今按酈道元注水經云浙江又北厯黟山縣居山之陽故縣氏之然則黟縣本以黟山得名未聞前世謂之黄山也至天寳中好道家之説故以黄帝為嘗遊于此因名之耳寰宇志又以黟山為北黟山北葢衍字按江南諸大山有天目天台之屬郡國志稱天目髙萬八千丈而低於黄山者何也以天目近連浙江天台俯瞰滄海地勢傾下百川所歸而新安乃江之上游海之濫觴今計郡之平地巳與二山等矣而此山又特髙然則鄰郡諸山要皆此山支脉也西北山勢中坼望之類太華故自前世亦名為小華山有峯三十六其水源亦三十六谿二十四洞十有二巖八靈迹至不可勝數水流而下合揚之水為浙江之源山髙而靈雷雨在下峯上往往有笙簫之聲第四峯下有泉沸如湯出香溪中號朱砂湯大厯中刺史薛邕就立廬舍設盆杅以病入浴者多愈後至大中年刺史李敬方以風疾比歲凡再入浴感白龍而疾瘳乃作龍堂于湯之西陵後命僧主之今祥符寺是也元符三年正月休寧太平縣民三人來浴凌晨水變赤如流丹驚相視不敢發言頃之地勢傾動波沸涌聲如雷屋舍皆震馳以告寺之人寺之人曰是必朱砂發見也急以瓦器二十餘貯而緘藏之山下民聞者爭來汲飲至二月砂復發差減於前久之視所藏水其新器中者宛然香甘泉清而砂沉舊器中皆臭壊不可近好事者往往澄其砂以為藥至八月耿公南仲以部使者巡按因至山僧文太以一器獻公嗟味久之而主簿徐元龜亦乞其一器歸以遺親由是人始信為朱砂泉焉旁近有昔人墨窯音􅘸竈也數處飛布山在縣北二十里髙百七十仞周二十七里舊名主簿山新安記云昔因冦亂縣主簿率百姓保此山獲金天寳六年六月十七日勅改為飛布山舊有廟甚靈建中末旱禱不雨刺史劉公徹其廟有人夜聞暴風雨西去如人馬聲繼夢神告之曰吾將寄於靈山靈山在縣西北三十里髙三百五十仞周七十七里新安記云靈村有山生香草名曰靈香又有黄精木上有靈壇道士祈請不燒香自然芬馥人射獵經踐之者忤犯山神終無所獲或失火燒網人則疾病故曰靈山輿地志云山甚髙峻天欲雨先聞皷角聲有圓石髙數丈上有石如車葢城陽山在縣南二里髙百九十仞周四十里有觀唐世許宣平隱山之南塢塢今别號南山近每夕有神光鳳凰山在縣北十五里髙三十仞周十五里嘗有鳳集于此舊産茶歲采製不過三二斤熈寧中丘寺丞名之為甘白香問政山在縣東五里唐有于方外者自荆南掌書記棄妻從太白山道士學養氣之術周游五嶽名山時從弟德晦為歙州刺史方外來訪之德晦為選勝築室于此號問政山房縣人聶師道少事方外後入呉為國師因號問政先生今有觀問政之名見於碑記及豫章黄太史所書問政先生語後葢其始因方外得名而祥符經云唐光化中有聶道士隱居於此刺史陶雅深所推重嘗訪以為政之要故名問政山恐於義未盡栁亭山在南百里髙二百五仞周四十里舊名昌山天寳六年改黄蘖山在縣北九十里髙五百六十仞周百里厚山在縣北三十五里舊名武山天寶六年改竅山音嶠在縣北十里髙百五仞周二十五里黄牢山在縣西南三十二里髙十仞周八里紫金山在縣東三十五里舊名金紫山與績溪石金山偕號甘露大士道塲暮夜見種種光相映紹興十八年尚書郎章侯睹而異之因取佛語改其山曰紫金而徙置白蓮院焉披雲峯在縣西南二百步髙百仞周五里山勢峭拔太平興國中知州蘇德祥為亭於峯頂名披雲亭箬嶺在縣北八十里黄山之東髙四百八十仞多箬竹上有官路通寧國府太平縣隋末越國公所開藺將軍巖在縣南十五里隋藺亮嘗屯此巖跳石在縣西北三十里石在溪中去岸數丈相傳昔有羅腰居溪口膂力絶人嘗躍過之石上有足跡云水源揚之水出績溪大尖山東流六十里至臨溪入歙縣界抵郡城西合四水南入新安江布射水出黄蘖山南流至縣北三十里合揚之水溉田十六頃豐樂水出黄山東流至縣西五十里合揚之水春夏勝小舟溉田三十四頃富資水出昉源南流至縣北一里合揚之水溉田七頃昌溪水出栁亭山東南流四十八里至雙館合揚之水溉田二頃綿溪水出績溪佛論嶺西流四十五里至州東鳳池村西十里合揚之水溉田二頃四十畝武洪水出梢雲山半壁中南流二十一里經武洪村又南流四里合揚之水溉田七頃苦溪水在縣東南從揚之水下抵深渡名曰八十里苦其中亂石碊碊洪港斗折淙流騰激其疾如箭雖三峽不過故名苦溪右按寰宇志所云如此而新經輒云以傍有苦竹塢為名非是深渡水在縣東百一十里新安江中接嚴州界從此而上穹山峻流秀爽尤異峯巒掩映狀若雲屏實百城之襟帶黄墩湖在縣西南四十五里濶二十餘丈長三百步衆水所瀦湖舊有蛟湖側居人程靈洗者好勇善射夜夢白衣道士告曰吾數為吕湖蛟所困明日當復來君能見助當有厚報靈洗問何以為識道士曰束白練者我也許之旦日率里中少年皷譟於湖上頃之波涌大聲如雷有二牛相奔觸其一肩白者甚困靈洗射黒牛中之俄而隂晦廓然湖水皆變明日有蛟死於吉陽灘下吕湖由是漸塞後名其灘曰蛟灘以上蛟及此蛟灘本字竝辰下虫未幾靈洗偶出有道人過其母乞食食巳令母隨行至山上以白石識地曰葬此可以驟貴靈洗還母語之因葬其父于此巳而靈洗官儀同封侯宅在湖東二里南有大䡤可數十圍號千年木鄉人立祠其下墓在湖西北黄牢山下云黄墩地廣衍黄巢之亂中原衣冠避地者相與保于此及事定留居新安或稍散之傍郡今人即靈洗墓處為壇水旱禱者八十餘社靈洗事見祥符經與歐陽公所書張龍公事相類姑載之自餘鰐灘鼉井及祁門蛟潭之屬尤怪誕無補者皆不録銅井潭在縣東北四里揚之水中周二百尺傍有井深不可測一名石壁潭唐乾元中嘗投龍闕釡底潭在縣南二里揚之水中潭底稍斂如釡或云斧底吕公灘在縣南十二里揚之水中灘長二里本名車輪灘湍悍善覆舟唐刺史吕季重以俸募工鑿之遂成安流因以為名然今人亦謂之車輪灣祥符經云募軍壯丁鑿毁灘石歙浦在縣東南十五里源出揚之水一名新安江歙之名縣由此浦也南流百五里入嚴州界殷公井在縣南羅城内井甚大不假淘渫自然蠲㓗下有二穴一通銅井一通釡底毎井遺物多於二潭得之古跡階坑在縣東百二十里方輿志云自階村入二十里即呉廢太子和之地階跡猶存和者吳主孫權長子權薨孫峻奪和璽綬徙新都又遣使者賜死和與妃張辭别張曰吉凶當相隨終不獨生活也亦自殺邦人傷焉何姬曰若皆從死誰當養孤拊皓及其三弟孫休立封和子皓為烏程侯自新都之本國及皓即祚追諡和改葬明陵孔靈村在縣南三十里孔愉字敬康㑹稽山隂人惠帝末東遷㑹稽入新安山中改姓孫氏以稼穡讀書為務信著鄉里後忽捨去皆謂之神人而為立祠事見晉書本傳而世說亦云孔車騎少有嘉遁志年四十餘始應安東命未仕宦時嘗獨寢歌吹自箴誨自稱孔郎游散名山百姓謂有道術為生立廟今猶有孔郎廟是其事也今此村禱賽猶及孔愉先生云愉别傳云永嘉大亂愉入臨海山中而晉傳又以謂㑹稽有新安山然世說既稱游散名山明非一處今此地以孔名而寰宇志祥符經皆言是愉隱處不可没也廢北野縣在北三十五里唐永徽五年分歙縣二鄉置大厯五年廢廢歸德縣在西南五十里唐永泰元年方清陷州縣人割八鄉之地保于此山賊平因請置縣大厯五年廢祠廟方儲廟在縣南栁亭西小山上今賜號真應廟浮丘先生廟在黄山第十三浮丘峯下峯上有浮丘仙壇嘗有至者見樓臺及白蓮華池左右有鹽米之積還率人取之迷不知處廟在唐嘗為浮丘觀㑹昌中毁觀今有廟存飛布廟靈山廟竅山廟各在其山自浮丘以下四廟郡昔嘗以春秋禱賽道觀天慶觀在縣西大中祥符元年以正月三日天書降日為天慶節詔東京建玉清昭應宫天下置天慶觀五年十月二十四日有延恩殿之祥閏十月詔天慶觀各置聖祖殿令玉清昭應宫降像及侍從之式焉新書經皆言祥符五年閏十月賜觀額非也此自建聖祖殿年月耳乾明觀在郡城内唐乾封元年置號龍星觀八年改龍興觀天寳元年改開元天寳觀太平興國六年太宗以誕聖之日為乾明節勅改今名紫陽觀在城陽山本許真君祠天聖二年四月奉勅賜觀額興道觀在問政山唐世築室號問政山房道士于方外聶師道相繼居之順義七年三月師道柩自揚州還葬此山楊氏為立壇給田以其故居為歸貞觀天禧四年勅改今名紹興中詔以御書黄庭内景經及臨魏晉六朝唐人書凡十巻藏于山龍興女貞觀舊在縣西五里唐神龍二年置開元十八年改靈星觀二十八年勅改龍興今立通德鄉長春里長春素有古觀近歲稍葺之為此額焉僧寺報恩光化禪寺在州城北隅舊名䕶國天王院唐中和元年州經焚爇光啟三年修築北城乃給文宣王廟後論堂故基使修建景福元年賜額慶厯三年僧省先募人為塔十三層髙三十仞廣十丈其下為屋百餘間至治平四年成賜名普安塔崇寧二年十一月以為崇寧寺政和八年改天寧萬壽紹興七年改報恩廣孝十三年改今名太平興國寺在縣西南唐至德二載建號興唐寺寺門踞兩峯間下瞰溪流州西勝處也始唐有聖像閣後營葺寖盛僧房經閣飛跨巖谷大厯末吕渭為州司馬嘗於寺之隙為堂讀書晨入夕還既去以遺寺僧故至今有吕侍郎祠舊不顯吕侍郎所以建祠本末後訪得祥符經其説云爾唐末楊氏改為延壽寺南唐復為興唐寺國朝開寳九年復為延壽太平興國四年勅改今名而民間亦呼為水西寺寺有戒壇國朝之制歲以誕聖日開壇為沙彌受三百六十戒祠部給戒牒凡天下壇七十有二云寺舊有院二十四今兹起廢僅十五六處其應夢羅漢院者唐末寺僧清瀾與婺州僧貫休游休為畫十六梵僧象相傳國朝嘗取入禁中後感夢歙僧十五六輩求還遂復以賜汪内相詩所謂秪應夢乞歸巖寺要使邦人習氣移者也按野人閑話云貫休當王氏建國時來居蜀中龍華精舍水墨畫羅漢十六身并一佛二大士皆古貌與佗畫不同或曰夢中所覩覺後圖之謂之應夢羅漢蜀主曾宣入内歎其筆迹狂逸經月却付院中翰林學士歐陽炯歌云或然夢裏見真儀脫去袈裟㸃神筆然則應夢之名久矣今兩載之今畫本猶一二存福聖院者雪竇長老嗣宗出家處宗有同受業僧智珍嘗為長蘆壽禪師延壽堂主亦有學卒八十餘開化禪院在縣西唐天祐元年建舊號十方院大中祥符元年二月勅改昭慶禪院在縣東唐光化中刺史陶雅建舊號寳相禪院大中祥符元年二月勅改大中祥符禪院在黄山天都峯下先是唐刺史李敬方作龍堂於湯之西天祐九年刺史陶雅建寺號湯院南唐保大二年改靈泉院大中祥符元年十月勅改今名挂石為魚其聲清越乾明禪院在登瀛鄉清平里南唐建號安國院太平興國五年三月勅改與前觀名同義是時賜兩京及諸路無名寺額凡數百大率多以乾明太平興國為名水陸院在寧仁鄉神山里呉順義年中建白蓮院舊在縣治側唐天祐二年建紹興十八年院徙紫金山其址今為定光堂隆興初宋尚書貺自南安舁致定光圓應普通大師像于此城陽院舊在縣南三里隔溪面城陽山唐景福中建宣和中焚毁僧如淨為請其額於長壽鄉建之如淨縣南項氏子壯歲為弓手飲斗酒噉肉數斤一旦棄妻子求事長老道才後住州之天寧寺太守趙詳之嘗跋其遺偈普安院在寧仁鄉乾寧二年建號永安後改有水玉色里人號白水寺西峯院在通德鄉隱儒里唐至德二年建惠化院在仁愛鄉唐乾寧中建號天王廟天祐十四年改白陽院在長樂上鄉西村里唐太和元年建金城院在仁愛鄉長沙里開寳二年十二月勅建禪林院在登瀛鄉宣化里唐永昌元年勅建江祈院在孝悌鄉千秋里呉順義二年建靈山院在平遼鄉新安里唐天祐三年勅建今為禪院清泉院在孝悌鄉玉泉里唐大中二年建舊號玉泉院泉在方丈之前宣和後院稍遷泉今在蔬圃中矣竹㑹寺在寧泰鄉仁愛里唐大中元年建溪頭院在仁禮鄉溪頭里唐景福中建楊干院在孝女鄉漳湍里唐咸通二年建古城院在永豐鄉安樂里唐太和中建舊在杏潭東宣和後徙潭西其傍有杏城潭極平廣相傳古嘗以為城尋以土輕棄不用漢洞院在仁愛鄉富資里大中二年建此據祥符經云爾今院有南唐保大中碑稱院厯㑹昌中廢大中咸通中復則寺亦不特始於大中也此地初入險陿其中夷廣傍連簸箕山山上有昔人屯聚遺迹壊垣廢瓦可數百家其東披山上亦然相傳黄巢亂時民相與保於此其稱為漢洞者當是漢末巳嘗保聚如烏聊林厯山之類俗云漢帝嘗駕至此以為名非也宣和賊退後院東遷半里許對石耳山古巖院在永豐鄉寒山里唐㑹昌元年建有石巖興福院在中鵠鄉遷喬里唐光化中建坦平院在仁禮鄉萬安里唐太和五年建黄坑院在仁愛鄉金山里唐太和中建靈康院在永豐鄉谿上一徑通太平興國寺唐天祐八年建葛塘院在平遼鄉唐天祐八年建仁義院在中鵠鄉禮教里大中祥符元年建富山院在仁禮鄉唐景福中建楊干禪院在寧泰鄉仁祐里至道元年建向杲院在永豐鄉梁大同元年建小溪院在仁愛鄉唐太和五年建任公寺在寧泰鄉仁祐里莫知始所建大中祥符元年用舊額起廢先是寺側有富資水梁太守任昉每行春至此累日不能反傍有大石往往坐釣其上後人因名其谿為昉谿村為昉村大中九年刺史盧潘以賢守名宜諱始改為任公谿任公村而寺舊亦以昉名僧籍則稍變其音為牓寺元豐元年本縣始為立任公寺戸而僧籍猶如其故周流院舊在永豐鄉岑山上鬱然孤峯溪水環之故寺以為名唐天祐八年建今稍徙溪西二里許保安院在孝悌鄉唐天祐五年建傍溪寺舊在長樂下鄉銅山里大中祥符元年建紹興中徙烏聊山資福院在明德鄉唐天祐元年建溪子寺在長樂下鄉銅山里大中祥符元年建香油院在長樂上鄉佛溪里呉順義六年建陳塘院在孝悌鄉唐㑹昌以前有之大中七年復臨塘院在中鵠鄉禮教里至道二年建右此諸寺凡為呉所建祥符經多作偽唐今各正之天王院在仁愛鄉唐景福元年賜額先是天寳初大食康居五國寇安西遣救未至詔不空三藏祈䕶世天王為助帝晝見神人鎧仗五百不空言此毘沙門第二子領兵救安西來辭耳巳而安西奏城東北三十里雲霧晦冥中有人皆金甲長丈餘皷角鳴振五國奔潰又有鼠金色齧其弓弩絃及器仗皆不堪用城樓現天王像無不見者乃圖以進因勅諸道州府於城西北隅各置天王像至佛寺亦别院安置毘沙門者北方天王也故設之北隅此院舊亦在郡城北角今有唐世祠部牒目為北城䕶國天王院置僧七人崇寧中郡以為崇寧寺故紹興間取其廢額建於此丘墓羽林將軍盧元卿母墓在厚山之側元卿縣人也刺史陶雅墓在明德鄉良干里地名陶灣俗間痞作者取其土懐之而縣南長垓有堆阜巋然其上如冢聚者二三十處號蕭王墓民間請雨必祭蕭王及孫王孫王當是呉太子和而縣東負郭有吕狀元祖墓又有墓列石人石羊之屬傳云國朝王丞相嘗為縣主簿母夫人卒葬於此不知為誰碑碣新安之石不宜於碑露暴歲久則剥泐不可讀加以中更寇攘存者益寡祥符中所録凡十一碑興唐寺碑唐司馬吕渭文重建越國公廟記唐鄉貢進士汪台符文問政先生碑銘呉順義中銀青光禄大卿方訥文歸真觀碑江南徐鍇文重修郡廨碑通判太子右贊善大夫孫彭文通判㕔壁記黄慶長文御前三牓碑端拱中通判著作佐郎馮起文夫子廟記景德中知州直史館趙昻文應夢羅漢碑雍熈中通判梁鼎文許真君祠堂碑二其一梁鼎文其一通判太常博士王臯文此其文或尚傳或碑與辭皆亡甚可惜也因為登載其目自餘及近歲作者益多其辭義之美者方行於世不待詳載賢宰庾沙彌潁川􅋣陵人父佩玉宋長沙内史昇明中坐事誅時沙彌始生及年五歲所生母為製采衣不肯服問其故流涕以對及長遂布衣蔬食終身為中軍田曹行叅軍嫡母劉氏寢疾沙彌晨昏侍側衣不解帯鍼炙輒先以身試及亡水漿不入口者累日初進大麥薄飲經十旬方為薄粥終䘮不食鹽酢冬不衣纊夏不解衰不出廬戸晝夜號慟鄰里不忍聞所坐薦淚沾為爛宗人都官尚書詠表言其狀應純孝之選梁武帝召見嘉之以補歙令還除輕車邵陵王叅軍事李紘字仲綱應天府楚丘人叅知政事李昌齡之從子也登大中祥符元年進士第試秘書省校書郎知歙縣初縣産金以代賦後金盡而輸賦如初紘奏罷之厯於潛南新剡縣所至有惠愛民生子多以李為名天禧二年詔薦州縣吏御史知雜吕夷簡薦之官至龍圖閣學士紘長於吏治篤於交游方范公仲淹被謫朝士畏宰相無敢過者紘獨出郊飲餞之王薦字繼道宣城人常從學於蔣之奇登第後以雄州防禦推官知歙縣事其為政捐利于民專務興崇學校招後進使就學作勸學文以率之蔣之奇為作歲寒亭賦其略曰遵教條布慈惠巳逋責寛田稅斥掊斂之百為寢貨財之末議射利無猛鷙之發詮奸見犬尨之吠吏絶侵寃人無淹繫以至道遺莫拾戸闢不閉訟庭則丹筆不施學市則青衿聿至其用心亦可槩見矣新安志巻三
