body:
  text: 新安志地理類三都㑹郡縣之屬提要臣等謹案新安志十巻宋羅願撰源有爾雅翼已著録初梁蕭㡬作新安山水記王篤又作新安記唐亦有歙州圖經及宋大中祥符中李宗諤撰次州郡圖經頒之天下于是舊志皆佚洎經方臘之亂新圖經亦隨散失願嘗雜採諸書創為稿本而未就淳熙二年趙不悔為州守乃俾原續成之其書第一巻為州郡第二巻為物産貢賦第三巻至五巻為所屬之歙休寧祁門婺源績溪黟六縣第六巻七巻為先達第八巻為進士題名凡賢良明經獻䇿賜䇿特奏名武舉皆附之義名仙釋亦併在是巻九巻為牧守十巻為雜録叙述簡括引據亦極典核于先達皆書其官别於史𫝊較為有體其物産一門乃願専門之學徵引尤為該備其所志貢物如乾蕷藥臘芽茶細布之類皆史志所未載所列先達小𫝊具有始末如汪藻曽為符寶郎之類亦多史𫝊所遺趙不悔序稱其博物洽聞故論載甚廣而其序事又自得立言之法願自序亦自以為儒者之書具有微㫖不同抄取記簿皆不愧也程敏政新安文獻志記願所作胡舜陟墓誌後曰鄂州新安志于王黼之害王俞秦檜之殺舜陟皆畧而不書茍非得虚谷一白之則其蹟泯矣然則是書精博雖未易及至其義類取舍之間疑有大可議者姑記二事以諗觀者云云案劉克莊後村詩話謂舜陟欲為秦檜父建祠髙登不可因劾登以媚檜㑹舜陟以他事忤檜下獄死登乃得免則舜陟之死乃欲附檜而反見擠耳願之不書殆非無意未可遽以為曲筆也乾隆四十六年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書史部十一新安志目録地理類三都㑹郡縣之屬巻一州郡沿革分野風俗封建境土治所城社道路戸口姓氏坊市官府廟學貢院放生池館驛倉庫刑獄營寨郵傳祠廟巻二物産榖粟蔬茹藥物木果水族羽族獸類畜擾貨賄貢賦稅則雜錢夏稅物帛小麥秋稅糙米折帛錢進貢供物帛上供紙酒課稅課茶課鹽課公用巻三歙縣沿革縣境鎮寨戸口田畝租稅酒稅城社官廨鄉里道路橋梁津渡山阜水源古跡祠廟道觀僧寺丘墓碑碣賢宰巻四休寧五縣事目略如歙縣祁門巻五婺源績溪黟縣巻六先達程儀同程都督吳御史王校正汪處士舒狀元吕侍郎大魏太尉查祕監張度支許司封許承㫖謝諫議張密學小魏太尉查賢良俞待制俞侍郎洪比部聶内翰許待制許長官呂狀元孫工部巻七先達王提刑汪宣徳洪尚書胡金部胡司業黄侍御汪丞相程顯學凌待制汪内翰胡待制汪少卿胡殿院先君尚書朱吏部汪樞密金尚書巻八進士題名賢良方正一人進士貢士二百三十四人明經二人發運使賜第二人樂成獻頌並銓試賜第共四人貢士獻䇿一人特奏名三十三人武舉四人義民黄芮章氏二女汪廷美葉氏女詹恵明仙釋方儲許宣平聶師道聶紹元丘寺丞鄭姑程惟象張擴智琚定莊茂源謙禪師瀾大徳雪山子寧道者宗白頭巻九牧守吳五人晉三人宋十二人齊五人梁十二人陳五人唐三十六人吳楊氏三人南唐一人國朝宣和前二十九人宣和後見壁者三十六人巻十雜録人事詩話雜藝硯紙墨定數神異記聞新安志原序新安在秦漢為黟歙二縣漢末别於丹陽以自為郡其山川風土則已見於中古矣漸江之水出於鄣山則章亥之所步禹之所録也桐汭之地為黟故境則楚子西子期之所爭丘明之所記也至於漢氏兩以疏封骨肉為諸侯王國又丹陽都尉之所理會稽太守之所遁皆班班著見至梁蕭幾為新安太守愛其山水始為之記又有王篤新安記唐有歙州圖經國朝太平興國中詔編廣記往往摭取之至大中祥符中頒李宗諤所修新圖經於天下則由前諸書廢不顯而官府頃罹睦冦又失祥符所頒特抄取計簿益之以里魁亭父之所隠實者編以為冊餘五六十年矣私竊悼之間因閱前史及國典并雜家稗說有及此者稍稍附著後得祥符圖經於民間則綱目粗設益訪故老求遺事思輯為一書然未果就會邦君趙侯聞之勉使卒業約敇諸曺遇咨輒報且諭屬縣網羅金石之文使得輔成其說而書出矣夫所為記山川道里者非以示廣逺也務知險易不忘戒也其録丁口頃畝非以覽富厚也務察息耗毋繇奪也其書賦貢物産非以給嗜欲也務裁濶陿同民利也至於州土沿革吏治得失風俗之媺惡與其人材之衆寡是皆有微㫖必使涉於學者纂之自上世九州之志與三墳五典偕號為帝王遺書而禹貢職方氏孔子定之以為經若直抄取計簿以為書則凡吏之善書者足以次之矣其施於事也亦然若直據令甲以為治則凡吏之毋害者足以聽之矣盖世常以此為無事乎儒而儒亦卒不可廢於世也豈特此哉凡十巻名曰新安志侯帝室之胄父子昆季皆以文學取第其為政廉靖不擾人亦相與安之且去猶惓惓於吾土思欲表章之盖有不可忘者矣淳熙二年三月癸未郡人羅願序徽為郡自漢始至於今久矣圖經紀述其事宜詳也試考之則遺闕而不備讀者恨焉此新安志所以作也不悔昔將承乏此州而吏以圖經先至見其疎略即有意於補次一日對衆客語之客言新章貢倅羅君盖志存於此者訪拾編摩蒐取附益用心勤且舊矣僕為驚喜因請之卒業成一家書以表見於時於是新安志出焉上下千載間博采詳摭論正得失皆有據依釐為十巻凡山川道里之險易丁口頃畝之息耗賦貢物産之闊狹以至州土吏治風俗人材皆條理錯綜聚見此書曽無遺者嗚呼可謂盛也羅君以儒學早馳雋聲惟其博物洽聞故論載甚廣而其敘事又自得立言之法讀者必能辨之趙不悔序新安志原序
