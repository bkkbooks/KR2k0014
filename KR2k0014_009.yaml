body:
  text: 新安志巻九宋羅願撰叙牧守郡在漢為丹陽二縣丹陽統縣十七地險逺故常使都尉分治於歙都尉本秦郡尉掌佐守典武職甲卒秩比二千石光武省諸郡都尉并其職於太守然亦往往有置者中世汝隂何比干自廷尉正與張湯爭事所濟活以千數後遷丹陽都尉獄無寃囚及漢末零陵黄蓋為之抑彊扶弱山越懐附此其名迹之最章章者也自建安中置郡不輕選授故梁髙祖嘗謂徐摛曰新安大好山水任昉諸人竝經為之卿為我臥治此郡而唐韓愈序送陸傪亦以歙刺史為大州尊官宰相薦聞而天子選用此不輕之驗也是以六朝置守多一時名勝而唐世宰相嘗為此州者蓋七人可不謂盛哉國朝仁宗嘗謂輔臣曰齊密登華邠耀麟絳潤婺海宿饒歙吉建江潮凡十八州民事繁劇守臣尤當審擇自今宜令中書舍人而潮州則命監司保薦其有異績者當陞擢之英宗治平四年閏三月又詔以十八州竝嘉祐中詔委中書選清幹臣僚充近年該堂除知州人各直指射有違詔約今後聽中書選掄不得陳乞有以見列聖視邦選侯之意中興距天子所纔數百里其選益重古之君子動不忘君故在内則畢身盡慮以事君而在外則畢身盡慮以厚夫君之民夫民者君之所深愛也故使忠信慈惠者傅之然則厚夫民者所以為奉上也任昉崔元亮李維之屬足以為法若陶雅者可以為戒顧設心何如耳呉太守都尉五人賀齊字公苗會稽山隂人仕呉孫權為威武中郎將建安十三年使擊丹陽黟歙時武疆葉鄉東陽豐浦四鄉先降齊請以葉鄉為始新縣而歙帥金竒萬户屯安勤山毛甘萬户屯烏聊山黟帥陳僕祖山等二萬户屯林歴山林歴四面壁立髙數十丈徑路危狹不容刀盾僕等臨髙下石不可得攻軍住經日將吏患之齊身出周行親觀形便隂募徑㨗士作鐵弋密於隠險不備處以弋拓塹為縁道夜令潛上乃多垂布以援下人得上者百數四面流布俱鳴鼓角齊勒兵待之僕等夜聞鼓聲四合謂大軍悉已得上驚擾不知所為守險者皆走還軍由是得上大破僕等其餘皆降齊復表分歙為新定黎陽休陽并黟歙凡五縣權遂割為新都郡齊為太守立府於始新加偏將軍十六年被命詣行在及當還郡權出祖道作樂舞象賜齊軿車駿馬住駕使齊就車齊謝不敢權使左右扶上車令吏卒兵騎導引如在郡之儀權望之笑曰人當努力非積功累勤此不可得去百餘歩乃旋呉志言賀齊為太守而酈道元注水經乃云齊為都尉按沈約宋書稱漢末及三國多以諸部都尉為郡然則都尉即當時太守也故都尉名字可見者凡數人而太守畧無有惟沈矯在孫皓時稱新都太守或者至皓稍正其名亦恐接晉初史官追書耳是以自陳表以下竝立列牧守中陳表字文奥廬江松滋人嘉禾三年諸葛恪領丹陽太守討平山越以表領新都都尉與恪叅勢表在官三年廣開降納得兵萬餘人事捷當出會中郎將周祗乞於鄱陽召募上大將軍右都䕶陸遜以為不可而祗固請之鄱陽民呉遽等果為亂殺祗攻没城郭豫章盧陵宿惡竝應新都屬縣搖動表便越界赴討破之遽等相率降遜拜表偏將軍進封陽都侯北屯章阬年三十四卒家財盡於養士死之日妻子露立太子登為起屋宅呉志陳武𫝊稱諸葛恪以表領新安都尉按是時新都未改新安兼丹陽部内别無郡名新安者又呉書云新都都尉陳表則表為新都無疑當由下文表受賜後人二百家在㑹稽新安縣因致誤耳諸葛融字叔長瑯琊陽都人也父瑾呉大將軍左都䕶融生於寵貴為章句博而不精然寛容多蓻數以巾褐承朝請後拜騎都尉赤烏中諸郡出部伍新都都尉陳表呉郡都尉顧承各率所領人會佃毗陵男女各數萬口表病死權以融代四年瑾卒時兄恪自已封侯乃令融襲爵攝兵業駐公安部曲吏士親附之疆外無事沈憲字子禮呉郡永安人位左中郎將新都都尉定陽侯才志顯於呉朝沈矯字仲威憲子也以節氣立名仕為立武校尉偏將軍封列侯建威將軍新都太守孫皓時有將帥之稱呉平後為鬱林長沙太守竝不就憲乃沈約之祖約自序如此南史乃以憲為曼字元禪官封才業昭穆竝同而姓字頓異當以約所述為正晉三人周嵩字仲智汝南安成人狷直果俠每以才氣凌物晉元帝作相引為叅軍及帝為晉王拜奉朝請嵩上疏曰古之王者必應天順時義全而後取讓成而後得今議者以殿下化流江漢澤被六州功濟蒼生欲推崇尊號臣謂宜先雪社稷大恥盡忠言嘉謀之助以時濟宏仁之功然後揖遜以謝天下誰敢不從由是忤㫖出為新安太守怏怏不悦臨發與散騎郎張嶷在侍中戴邈坐褒貶朝士帝怒收付廷尉時顗方貴重帝隠忍久之補廬陵太守不之職更拜御史中丞賈寧字建寧長樂人賈氏孽子也何次道嘗送東人瞻望見寧在後輪中曰此人不死終為諸侯上客初自結於王應諸葛瑶應敗浮游呉會呉人咸侮辱之聞京師亂馳出投蘇峻峻甚䁥之以為謀主及峻聞義軍起自姑熟屯於石頭是寧之計峻敗先降仕至新安太守又有太守杜炯及宋太守楊伯子節皆不全伯子事畧見黟縣令呉茹公事中而梁侯景偽置太守元義凡此等皆不録孫泰晉新安太守王恭討譙王尚之也荆州刺史殷仲堪豫州刺史庾楷廣州刺史桓𤣥等竝應之㑹稽王道子使世子元顯伐恭滅之既而楊佺期及桓𤣥仲堪等復至石頭元顯於竹里馳還京師遣丹陽尹王愷鄱陽太守桓放之新蔡内史何嗣穎川太守温詳及泰發京邑士庶數萬人據石頭以拒之道子將出頓中堂忽有驚馬蹂籍軍中因而擾亂赴江而死者甚衆仲堪知王恭敗死狼狽西走屯於潯陽朝廷嚴兵相距内外騷然其後道子父子竟為桓元所破宋十二人庾登之字元龍穎州􅋣陵人少以彊濟自立初為宋武帝鎮軍叅軍預討偽楚功封曲江縣五等男累遷新安太守謝晦為荆州刺史請為長史張鏡呉郡呉人與兄演弟永辯岱俱知名時號張氏五龍演鏡名最髙鏡為新安太守蚤卒永孫率復為梁新安太守臧綽東莞莒人武穆皇后兄子也太子中舍人新安太守羊欣字敬元泰山南城人也義熙中弟徽被遇於髙祖髙祖謂咨議叅軍鄭鮮之曰羊徽一時美器世論猶在兄後恨不識之即拔欣補右將軍劉藩司馬後出為新安太守在郡四年簡惠著稱除臨川王義慶輔國長史廬陵王義真車騎咨議叅軍竝不就文帝重之復以為新安太守前後凡十三年樂其山水嘗謂子弟曰人生仕宦至二千石斯可矣及是便懐止足轉義興太守非其好也頃之稱病篤免歸江秉之字元叔濟陽考城人也為山隂令以在縣有能出補新安太守元嘉十二年轉任臨海竝以簡約見稱所得秩悉散之親故妻子常饑寒人有勸其營田業者秉之正色曰食祿之家豈可與農人爭利在郡作書案一枚去官留以付庫宋世唯顧愷之亦以省務著績自餘雖刑政脩理而未能簡事云到元度彭城武原人元嘉二十年十二月白熊見歙縣元度為太守以獻終益州刺史王恢之琅邪臨沂人中大夫何愉之廬江灊人沈登之呉興武康人沈宣呉興武康人為太守卒官子懐文時為江夏王義恭東閣祭酒新安郡送故豐厚奉終禮畢餘悉班之親戚一無所留文帝聞而嘉之巢尚之魯郡人孝建初補東海國侍郎仍兼中書通事舍人凡選授遷轉誅賞大處分上皆與戴法興及尚之叅謀上性嚴暴睚眦之間動至刑戮尚之每臨事解釋多得全免殿省甚賴之明帝世累遷黄門侍郎出為新安太守王深字景度琅邪臨沂人晉司徒獻穆公珣之孫齊五人柳惔字文通河東解人也齊中書侍郎中䕶軍長史出為新安太守居郡以無政績免梁天監中終湘州刺史著仁政𫝊及諸詩賦粗有辭義蕭穎胄字雲長南蘭陵人父赤斧太祖從祖弟也穎胄宏厚有父風起家秘書郎太祖謂赤斧曰穎胄輕朱被身覺其趨進轉美足慰人意累遷中書郎世祖以穎胄勲戚子弟除左將軍知殿内文武事得入便殿出為新安太守吏民懐之王慈字伯寳瑯邪臨沂人司空僧䖍子也年八嵗外祖宋太宰江夏王義恭延之内齋施寳物恣聽所取慈取素琴石研義恭善之少與從弟儉共書學歴秘書丞司徒左西屬右長史試守新安太守永明中終冠軍將軍廬陵王中書長史蔡約字景撝濟陽考城人累轉黄門郎領本州中正出為新安太守復為黄門郎領射聲校尉好飲酒夷淡不與世雜永明終太子詹事周仁昭汝南安城人世説叙録考異引丹陽記周顒家世云文子生停之停之生明明生仁昭今新安太守按南齊書周顒少為族祖明所知則仁昭是顒之族父梁十二人蕭隠附程靈洗事中伏暅字元曜平昌安丘人為永陽内史在郡清絜政務安靜郡民何立秀等一百三十四人詣州言狀湘州刺史以聞詔勘有十五事為吏民所懐武帝善之徙新安太守陳書云召為東陽太守與南史不同按下文屬縣有始新遂安海寧則非東陽可知然下文又有往東陽迎姊䘮之語蓋為東陽郡丞時䘮姊耳在郡清恪如永陽時民賦税不登者輙以太守田米助之郡多麻苧家人至無以為繩其厲志如此屬縣始新遂安海寧竝同時生為立祠召為國子博士領長水校尉時始興内史何逺與暅俱稱清白逺累見擢暅循階而已自以名輩素在逺前意望不滿多託疾居家尋求假到東陽迎姊䘮因留會稽築室自表解職詔以軌為政廉平宜加奬養勿使恚望以為豫章内史乃出拜侍御史虞皭奏軌歴典二邦少免貪濁此自為政之本豈得稱功請以大不敬論有詔勿論遂得就郡普通元年尚書左僕射徐勉為之誌其二章曰東區南服受結民胥相望伏闕繼軌奏書或臥其轍或扳其車或圗其象或式其閭思耿借㓂曷以尚諸謝覽字景滌陳郡陽夏人天監中累遷明威將軍新安太守九年夏山賊呉承伯破宣城郡餘黨散入新安叛吏鮑叔等與合攻没黟歙諸縣進兵擊覽覽遣郡丞周興嗣於錦沙立塢拒戰不敵遂棄郡奔會稽臺軍平山㓂覽復還郡左遷司徒咨議叅軍仁威長史行南徐州事五兵尚書後為呉興太守郡境多劫為東道患覽下車肅然號名守覽在新安頗聚歛至是遂稱廉潔時人方之王述周興嗣者字思纂陳郡項人擢員外散騎侍郎進直文徳壽光省髙祖以三橋舊宅為光宅寺敇興嗣陸倕各製碑及成用興嗣所製自是銅表銘柵塘碣北伐檄王羲之書千字竝使興嗣為文每奏輙稱善九年除郡丞王規字威明琅邪臨沂人齊太尉儉之孫武帝普通二年選為晉安王綱雲麾咨議叅軍久之出為新安太守後歴呉郡召拜左户尚書呉郡千餘人詣闕請留表三奏不許求於郡植碑許之張率字士簡呉郡呉人梁天監初遷秘書丞引見玉衡殿武帝謂曰卿東南物望朕夙昔所聞卿言宰相是何人不從天降不從地出卿名家竒才若後以禮律為意便是其人秘書丞天下清官東南望胄未有為之者今以相處為卿定名譽後厯黄門侍郎出為新安太守秩滿還都及卒昭明太子與晉安王綱令曰近張新安又致故其人才筆宏雅亦足嗟惜隨弟府朝東西日久尤當傷懐也此人物零落特可澘慨率嗜酒每事寛恕於家務尤忘懐在新安遣家僮載米二千石還呉既至遂耗大半率問其故荅曰雀鼠耗率笑曰壯哉鼠雀竟不研問王實琅邪臨沂人起家秘書郎尚梁武帝女安吉公主襲爵建城縣公為新安太守實從兄來郡就求告實與銅錢五十萬不聽於郡及道散用從兄密於郡市貨還都求利及去郡數十里實乃知命追之呼從兄上岸盤頭令卒與杖搏頰乞原宥得免後為南康郡王湘州長史蕭㡬字徳元齊宗室性温和與物無競清貧自立位中書侍郎尚書左丞為新安太守郡多山水特其所好適性遊履遂為之記蕭敏齊宗室為新安太守好射雉未嘗在郡詞訟者遷於畎焉任昉字彦昇樂安博昌人始武帝微時與昉遇竟陵王西邸從容謂昉曰我登三府當以卿為記室昉亦戲帝曰我若登三事當以卿為騎兵霸府初開遂引昉符昔言焉天監六年春出為寧朔將軍新安太守在郡不事邊幅率然曳杖徒行郭邑民通詞訟者就路决焉尤以清絜著名百姓年八十以上者遣户曹椽訪其寒温嘗欲營佛齋調楓香二石始入三斗便出教長斷曰與奪自已不欲貽之後人郡有蜜嶺及楊梅舊為太守所采昉以冐險多物故即時停絶為政清省吏民便之咸謂百餘年未之有視事期年卒於官舍唯有桃花米二十石無以為歛遺言不許以新安一物還都雜木為棺浣衣為歛闔境痛惜百姓共立祠堂於城南嵗時祠之武帝聞問方食西苑緑沈𤓰投之於盤悲不自勝徐摛字士秀東海郯人也晉安王綱入為皇太子轉家令兼管記尋帶領直摛好文為新變不拘舊體春坊盡學之宫體之名由此始髙祖聞之怒召摛將責之及見應對明敏辭義可觀乃意釋因問五經大義次及歴代史官家雜説末論釋教摛商較從横應荅如響帝甚嘉歎更被親狎寵遇日隆領軍朱异不悦謂所親曰徐叟出入兩宫漸來見逼須早為之所遂乘間白帝曰摛年老又愛泉石意在一郡自怡帝謂摛欲之乃召謂曰新安大好山水任昉等竝經為之卿為我臥治此郡中大通三年遂出為新安太守為政清靜教民禮義勸課農桑期月之間風俗便改秩滿還為中庶子加戎昭將軍王泰字仲通琅邪臨沂人通和温雅人不見其喜愠之色天監中為吏部郎不通關求天下稱平後出為明威將軍新安太守在郡和理得民心召為寧逺將軍安右長史終吏部尚書臧未甄東莞莒人博渉文史有才幹少為外兄汝南周顒所知天監中遷右軍安城王長史少府卿出為新安太守有能名還為太子中庶子司農卿太尉長史程靈洗字元滌少以勇力聞歩行日二百里便騎善游梁末海寧黟歙等縣及鄱陽宣城郡界多盜賊近縣苦之靈洗素為鄉里所畏伏前後守長嘗使召募少年逐捕劫盜侯景之亂靈洗聚徒據黟歙以拒景及景軍據有新安新安太守湘西鄉侯蕭隠奔依靈洗靈洗奉以主盟梁元帝於荆州承制又遣使間道奉表劉神茂自東陽建義拒賊靈洗攻下新安與神茂相應元帝授持節通直散騎常侍都督新安諸郡軍事雲麾將軍譙州刺史資領新安太守封巴丘縣侯邑三百户神茂為景所敗景偏帥呂子榮進攻新安靈洗退保黟歙及景敗子榮退走靈洗復據新安進軍建徳擒賊帥趙桑乾以功授持節散騎常侍都督青冀二州諸軍事青州刺史増邑并前一千户將軍太守如故仍令靈洗率所部下揚州助王僧辨鎮防陳五人陸繕字士繻呉郡呉人幼有志尚以雅正知名永定元年遷侍中時留異擁割東陽新安人向文政與異連結因據本郡朝廷以繕為正威將軍新安太守世祖嗣位召為太子中庶子領歩兵校尉掌東宫管記陸山才字孔章呉郡呉人少倜儻好尚文史除正威將軍新安太守時王琳未平留鎮富陽以捍東道天嘉元年秋七月甲寅世祖詔曰新安太守陸山才有啟薦梁前征西從事中郎蕭策梁前尚書中兵部王暹竝世胄清華羽儀著族或文史足用或孝徳可稱竝宜登之朝序擢以不次王公以下其各進拔賢良申薦淪屈庶衆才必萃大厦可成使棫樸載歌由庚在詠山才入為員外散騎常侍程文季字少卿靈洗之子天嘉二年除正毅將軍新安太守仍隨侯安都東討留異異黨向文政據有新安文季率精兵三百輕往攻之文政遣其兄子瓚來拒文季與戰大破瓚軍文政乃降三年始興王伯茂出鎮東州復以文季為鎮東府中兵叅軍劉廣徳南陽湼陽人好學負才任氣厯樂山豫章二郡太守新安内史光大中假節員外散騎常侍雲旗將軍河東太守周景曜義興陽羡人也族弟文育本新安壽昌縣項氏子年十一善游反覆水中數里跳髙五六尺羣兒莫能及周薈為壽昌浦口戍主見而竒之求養為已子文育後為開府儀同三司武帝時死事景曜以文育故官至新安太守唐三十六人王雄誕曹州濟隂人杜伏威養子少彊果膂力絶人伏威之起用其計戰多克唐武徳二年伏威納欵四年遣雄誕討李子通於杭州擒之以獻先是歙州汪華據黟歙稱王十餘年雄誕還軍擊之華拒之於新安洞口甲兵甚鋭雄誕伏精兵於山谷率羸弱數千犯其陣戰纔合陽不勝還走營華進攻之不能克會日暮引還伏兵已據其洞口華不得入乃請降於是伏威盡有淮南江南之地南至嶺東距海雄誕以功除歙州總管賜爵宜春郡公伏威入朝以兵屬雄誕輔公祏將反以詐奪其兵遣人諭計雄誕誼不從公祏殺之雄誕愛人善撫士能致下死力每破城邑整衆山立無絲毫犯死之日江南士庶為流涕蘇瓌字昌容宰相世系表云字延須與𫝊異雍州武功人為歙州刺史時來俊臣貶州叅軍人懼其復用多致書請瓌叱其使曰吾忝州牧髙下自有體能過待小人乎遂不發書俊臣未至追還恨之由是連外徙不得入後厯相中睿封許國公配享睿宗廟廷瓌治州考課常最為宰相陳當世利病甚多盧渙天寳中刺史後改刺陸州季廙上元中刺史寳應元年改刺處州李揆字端卿系在隴西為冠族乾元二年拜相美風儀善奏對肅宗歎曰卿門第人物文學皆當世第一信朝廷羽儀乎故時稱三絶揆决事明當然鋭於進且近名坐抑兄楷不遷又抉擿故宰相呂諲過失上元二年二月貶袁州刺史累年徙歙州龎濬永泰元年公孫綽大厯初薛邕字仲味宰相世系表字公和蒲州汾隂人代宗時為吏部侍郎與同列徐浩分典選華原尉侯莫陳怤浩妾弟也冒優託之邕以長安尉怤當叅臺御史大夫李棲筠物色其勞怤色動不能對乃言為徐浩杜濟薛邕所引非真優也始浩罷嶺南節度使以瓌貨數十萬餉元載濟方為京兆及邕皆載所厚棲筠併劾之帝未决大厯九年三月丁卯浩邕竝停知選事會月食帝問其故棲筠曰月食修行今罔上行私者未得天若以儆陛下耶五月乙酉皆坐貶而邕為歙州刺史舊唐書本紀及徐浩𫝊新唐書李棲筠𫝊皆言邕以侍郎為歙州唯新唐李泌𫝊稱自左丞貶按唐崔巨宣州觀察使去思頌序稱邕在宣九秋今上纂序命紏正於仙臺則是徳宗即位後自宣歙觀察使方為左丞耳在大厯中未為此官也然邕至建中元年十月又以左丞坐贓為連山尉故新書致混其文耳其頌曰詔謂薛公茂學雕章孝弟忠良碑碣語多縁飾未足多信考其事則兩以請屬罷官而唐人稱薛邕有宰相望豈他尚美多乎是時刺史月俸至千緡方鎮所取無蓻而京官禄簿自方鎮入八坐至謂罷權邕之出家人恨降之晚徳宗即位自宣歙觀察使入為尚書左丞蕭復字履初父衡尚新昌公主復生戚里常衣垢弊居一室學自力非名士夙儒不與游以清操顯推主䕃為宫門郎廣徳中嵗大饑家百口不自振議鬻昭應墅宰相王縉欲得之使弟綋說曰以君才宜在左右胡不以墅奉丞相取要職復曰鬻先人墅以濟孀單吾何用美官使門内餒且寒乎縉憾之由是廢數嵗乃歴歙池二州刺史治狀應條遷湖南觀察使後相徳宗劉贊字公佐荆南節度使彚之子楊炎薦贊名臣子擢浙西觀察判官大厯十四年徳宗即位炎入相進贊歙州刺史政幹彊濟墅媪將為虎噬幼女呼號搏虎俱免觀察使韓滉表贊治有異行加金紫徙常州陸傪字公佐呉郡人以明道自任連事觀察使觀察使不能知退居於田者六七年正元中由侍御史入為祠部員外郎二嵗十八年二月十八日出刺歙州朝野之賢者惜其去韓愈序送之曰歙大州也刺史尊官也由郎官而往者前後相望也當今賦出於天下江南居十九宣使之所察歙為富州宰相之所薦聞天子之所選用其不輕而重也較然矣如是而齎咨涕洟以為不當去者陸君之道行乎朝廷則天下望其賜刺一州則専而不能咸謂先一州而後天下豈吾君與吾相之心哉傪未至郡四月二十八日卒於道李翺作陸歙州述稱其生於世五十有七年明於仁義之道可以化人倫厚風俗者餘三十年而恨其道之不行天下未蒙其徳云崔淙字君濟博陵人自侍御史華原令改歙州刺史下車而簡其約束期月而明其信誓既去害郡之奸遂寧挺險之俗召拜長安令元和中官至銀青光禄大夫守工部尚書右據呂温所作行狀參之世系表得題名字范𫝊正字西老鄧州順陽人自比部員外郎出為歙州刺史轉蘇湖二州皆以政事修理聞擢為宣歙觀察使白居易掌制其詞曰蘇州刺史范𫝊正文學政事二美具焉選自郎曹出分符竹江南列郡連領者三所至之郡悉心為理明諭朝㫖恭守詔條謹身省事以臨其下政簡而肅意誠而明吏不能欺人是以息而去思之歎來暮之謠復有關於人聽雖古循吏蔑以加之又云黟歙之遺愛尚在呉興之新政方播升車便道足慰人心固當望風自安計日而理𫝊正精悍有立好古自飭及為廉察頗事奢侈厚以財貨問遺權貴視公蓄如私藏幸不至甚敗云韋綬元和四年有兩韋綬其一元和相貫之之兄徳宗朝為翰林學士其一字子章京兆人穆宗朝吏部尚書然貫之兄晚得心疾不知孰是馮宿東陽人從裴度東征為彰義軍節度判官淮西平拜比部郎中先是鳯翔法門寺有釋迦指骨一節元和十四年正月丁亥憲宗令中使押宫人持香華往迎留禁中三日乃送諸寺王公士庶奔走施財唯恐居後百姓有廢業破産燒頂灼臂而求供養者刑部侍郎韓愈上疏極諫憲宗大怒貶愈潮州刺史宰相疑宿草疏出宿為歙州刺史後入為刑部郎中終劍南東川節度檢校禮部尚書崔元亮字晦叔磁州照義人累轉駕部員外郎清謹介特澹如也稍遷密州刺史元和十五年遷歙州與杭州元藇等同制元稹為制詞曰今餘杭鍾離新安順政三有財用一鄰戎狄將有所授每難其人以藇之理課甄明以洪度之奏議詳允以元亮之學古從政以公逵之守道立身僉命為邦庶可勝殘去殺矣元亮到郡郡人馬牛生駒犢官籍蹄噭故吏得為姦元亮焚其籍一不問民山處輸租者苦之下令許計斛輸錢民賴其利徙湖州後為諫議大夫朝廷推為宿望邢群字渙思河間人孔温業拜中丞求御史於杜牧以群對詔拜監察御史會昌五年由户部員外郎出為處州刺史牧聞之喜曰群不容於會昌中不辱吾御史薦矣代還授歙州時牧為睦州睦州大㕔記牧以㑹昌六年拜睦州刺史歙睦相去直西東三百里牧問往來者邢君何以為治曰急於束縛黠吏冗事弊政不以久逺必務盡根本牧曰邢君去縉雲日老稚泣送於路用此術也數月以風疾廢裴休字公美河東聞喜人大中初為刺史二年移鎮宣州景徳𫝊燈録稱休守新安遷鎮宣城按盧肇宣州新興寺碑文稱大中二年休拜宣城則元年在歙李敬方字中䖍大中四年至六年唐藝文志云太和中歙州刺史以敬方所題黄山詩考之和字誤也盧潘大中九年于徳晦大中十一年任宇咸通七年盧肇字子發袁州人狀元登第咸通中朝散大夫持節歙州諸軍事守歙州刺史柱國賜紫金魚袋通典云武徳四年改郡為州改太守為刺史加號持節後加號為使持節諸軍事而實無節但頒銅魚符而已在郡上海潮賦其狀云去年五月䝉恩除歙州刺史臣謹行陛下法令常懼愆違理郡周星未有政績潛被百姓詣闕以臣粗能緝理求得留臣奉七月二十二日敕又蒙聖恩賜臣金紫蓋其自叙如此張裕乾符中李擢官尚書呉圎代之呉圎光啟元年至三年使檢校右散騎常侍兼御史大夫陸希聲蘇州呉人乾符初召為右拾遺時憸腐秉權嵗數歉梁宋尤甚希聲見州縣刓敝上言當謹視盜賊明年王仙芝反株蔓數十州遂不制擢累歙州刺史昭宗聞其名召為給事中乾寧中遂以為相于濤者宰相琮之姪授泗州防禦使歙州刺史佐淮南楊行密為副使呂季重河東人肅宗相諲之兄子歙縣東南十二里有車輪灘湍悍善覆舟季重以俸募工鑿之成安流因名呂公灘權若訥天水人厯桂歙梓三州刺史盧廷昌范陽人盧瓊范陽人孫緯字中隠武邑人吏部侍郎薛抃河東汾隂人明皇相訥之孫韋瑜隋鄖公孝寛之孫右八人不得其年裴樞字紀聖絳州聞喜人龍紀初進給事中改京兆尹坐與孔緯厚善改右庶子出為歙州刺史景福二年楊行密遣田頵以二萬人攻歙州樞有美政民愛之為樞戰頵兵數却遺行密書請還京師行密以魯邰代樞州人不肯下請陶雅代雅於諸將最寛厚以禮歸樞於朝天復元年拜相竟與唐存亡云呉三人陶雅字國華廬州合淝人楊行密逐廬州刺史郎幼復以雅為左衝山將討定鄉盜田頵既破歙州雅自池州團練使來為刺史田頵為寧國軍節度使天復二年頵既平昇州求池歙為屬行密不許頵遂絶三年十二月行密破宣州殺頵順義軍使汪武與頵連和雅攻鍾傅兵過武所迎謁縛武於軍天祐元年八月前衢州刺史陳璋睦州刺史陳詢皆叛錢鏐附於行密明年鏐圍詢於睦州行密遣雅救之軍中夜驚士卒多踰壘亡左右及裨將韓球奔告之雅安臥不應須㬰自定亡者皆還鏐遣從弟鎰及指揮使顧全武王球拒雅為雅所敗擄鎰及球以歸六月雅會衢睦兵攻婺州㧞之執刺史沈夏行密以雅為江南都招討使歙婺衢睦四州都團練觀察處置等使陳詢不能守睦州奔於廣陵雅入據其城十一月庚辰行密卒子渥嗣為節度王茂章代渥為宣州觀察使與渥不協三年正月壬戌茂章以宣歙二州叛附於錢鏐雅急引兵還歙六月衢婺睦皆復為錢鏐所破開平一年雅使其子敬昭及指揮使徐章將兵襲饒信州刺史危仔昌請降饒州刺史唐寳棄城走是嵗楊氏又得撫表吉䖍四州於是江西之地盡入於楊氏雅在郡凡二十年骨言者呉轅門大將右一人見尉遲樞宣州新安禪院記歐逵者呉順義七年知歙州官金紫光禄大卿檢校司徒兼御史大憲上柱國楊氏以梁龍徳元年二月改元順義此云七年當後唐天成二年南唐一人龔慎儀字世則邵武人仕南唐為禮部郎中建隆元年七月李氏命為進奉使來貢乘輿服御物違命侯時出知歙州王師收金陵諸城皆下宣州節度使盧絳無所歸欲據福建以叛領所部過歙州儀閉門不納絳怒曰儀乃吾故人何故見拒使馬雄攻之城䧟朝服以出為絳所殺會先鋒曹翰齎鐵劵至絳乃與馬雄等數人棄其衆來歸後因陛見待於外未入儀兄子穎先自江南歸朝為侍御史詬罵絳等以手版擊之遂闌入殿門訴言臣叔無罪為絳所殺因俯伏請罪極言絳狼子野心不可留太祖下令誅絳青箱雜記言絳陛見舞蹈次穎遽前以笏擊踣之恐未可據國朝蘇徳祥青州人建隆中進士第一太平興國中知軍州事季維字仲方洛州肥鄉人登進士甲科咸平中以太常博士獻頌聖徳千言真宗嘉之召試中書為直集賢院屯田員外郎時兄流方為宰相每還家相與笑言而未嘗及朝政然終欲避權勢乃請知歙州至郡起學舍時行鄉射之禮代還同判太常禮院終刑部尚書維寛厚喜怒不形於色既没家無餘財趙昻將仕郎守禮部郎中直昭文館上輕車都尉景徳元年州學有昻母張夫人碑昻以元年來方演郡人朝請大夫行虞部員外郎輕車都尉大中祥符二年謝濤字濟之杭州富陽人登淳化三年第嘗以秘書丞知興國軍真宗考吏籍五年無過者擢之遷太常博士一日内出朝士有治迹者二十四人名付中書門下濤在選中後權三司度支判官出知泰州徙歙州官至太子賔客曹脩古字述之建州建安人大中祥符中進士甲科鯁直有風節為監察御史禁中以翡翠為服玩詔市於嶺南脩古以重傷物命論罷乞出知歙州官至刑部員外郎侍御史知雜事歐陽潁字孝叔吉州廬陵人登進士第厯官有能名嘗知萬峽鄂三州大中祥符末以朝散大夫行太常博士知歙州盜有殺民董氏於市者三年捕不獲潁至則得之以抵法又富家有盜夜入啟其藏者百計捕之不獲有司苦之潁獨召富家二子械付獄鞫吏民皆曰是素良子也驚疑互諫潁不聽鞫愈急二子服取其所盜某物於某所皆是僉以為神明後厯知岳閬饒州治七州皆有聲剛果有氣外嚴内明不可犯以是施於政亦以是持身云蘇壽叅知政事易簡之子自越州徙歙州錢仙芝景祐中以校理知州事王琪字君玉成都華陽人皇祐二年以度支員外郎龍圖閣待制知舒州徙蘇潤二州坐疏轉運陳述古在部多凌縱述古降知密州乃以琪知歙州有惠愛及人人為畫像立祠嘉祐元年徙知江寧府東南名州巨鎮多所更歴政尚簡靜疾俗吏飭㕑傳以沽名故待賔客頗闊略間有造飛語詆之者亦不䘏也後終禮部侍郎畫像立祠不足深據此乃丞相禹玉所書故載之張經皇祐中以度支員外郎提㸃利州路轉運使事四年二月降知歙州呂元規治平中以司勲郎中權提㸃廣東刑獄四年二月降知歙州張慎脩朝散大夫輕車都尉元豐九年潘珏通直郎元祐四年王擴右朝散大夫元祐六年黄誥字君謨岳陽人親喪廬墓致毁有芝草之瑞因賜官其謝表云白髮三十何嗟及矣靈芝六十孰為來哉四方𫝊誦紹聖二年以朝散郎知州事顧臨字子敦越州人紹聖中以天章閣待制知州事移饒州董正封承議郎元符元年李度禮部員外郎虞賓字舜臣山隂人自比部員外郎出守曽諤字正臣朝議大夫崇寧末狄樞朝奉郎代曾諤丁湜淮隂人自左司郎中出守劉光衢州人朝奉郎政和七年三月許頌濠州定逺人朝散郎八年正月梅澤平江府人朝請大夫宣和二年四月到官十月召曽孝藴天章閣待制二年十月八日到官十二月移知青州呂灝三年正月到官四月移知饒州右姓氏爵里年月存者則書之不能皆備前朝又有蘇補衮王舉直江渢三人不得其詳附見於此張仲珪右武大夫宣和三年五月到官盧宗原朝奉郎直龍圗閣宣和三年十二月二十九日到任五年九月二十五日除淮南江浙荆湖制置發遣判官自此以下有壁記唐作求朝奉郎五年十二月二十五日到任靖康元年六月七日以病去官上官恢中大夫靖康元年八月二十六日到任建炎二年十月九日受代夏承朝奉大夫建炎二年十月九日到任四年正月五日致仕章苃朝奉大夫四年三月三日到任七月二十一日以憂去官郭東承議郎四年十月五日到任紹興元年七月二十一日罷孫佑朝請郎紹興元年七月三十日到任三年十二月十六日除直秘閣知江州趙詳之左朝散郎三年二月三日到任五年二月十六日受代王禔右朝散大夫五年二月十六日到任七月二日與知秀州曽統兩易其任唐煇徽猷閣直學士左承議郎六年二月四日到任八年二月二十七日提舉江州太平觀呉偉明左朝奉大夫八年四月十九日到任九年四月九日召除直秘閣應天府路提刑曽開左中大夫寳文閣待制九年四月九日到任十一月二日提舉亳州明道宫汪藻顯謨閣學士左太中大夫九年十二月二十九日到任十一年七月十六日移知泉州朱芾左中大夫敷文閣待制十一年七月二十七日到任十二年正月二十二日罷朱異左朝奉大夫十二年二月十三日到任十三年八月五日罷張甸左朝請大夫十三年十月五日到任十五年十月二十五日受代黄積厚左朝請大夫十五年十月二十五日到任十七年八月四日受代何鑄資政殿學士左朝奉大夫十七年八月四日到任十二月十九日提舉江州太平興國宫章僅右承議郎十八年正月二十一日到任二十年三月二十八日受代趙子游右奉直大夫二十年三月二十八日到任二十二年四月二十四日受代施鉅左朝請郎二十二年四月二十四日到任十月十一日召李㳘右朝請大夫二十二年十二月十八日到任二十五年正月二十五日移知太平州胡彦國右朝請郎二十五年二月十日到任任内轉朝奉大夫二十六年十一月四日移知廬州李植右朝散大夫二十六年十一月九日到官任内轉右朝請大夫二十八年四月十八日除荆湘北路轉運判官潘莘左朝散大夫二十八年六月八日到任二十九年閏六月十九日罷洪适左朝奉郎二十九年九月十六日到任任内累轉左朝請郎三十一年二月二十九日除提舉浙西常平茶鹽沈濬左朝請郎三十一年四月二十三日到任三十二年七月一日罷薛良朋左朝奉郎三十二年七月九日到任任内累轉左朝請郎隆興元年八月十三日除本路轉運副使呂廣問左朝請大夫集英殿脩撰隆興元年十月七日到任二年十一月二十七日召錢豫左朝請大夫乾道元年正月八日到任二年正月二十四日主管台州崇道觀季南壽左朝請郎直秘閣二年四月八日到任三年八月十七日罷郟升卿左朝議郎三年十月三十日到任任内轉左丞議郎五年十二月九日受代朱柔嘉右朝請大夫五年十二月九日到任六年二月六日致仕史俣右朝議大夫六年四月五日到任九年四月三十日召趙師䕫右承事郎直秘閣七年八月三日到任任内累轉右宣教郎除直徽猷閣九年三月二十六日改知湖州趙不悔左朝贊郎乾道九年三月二十六日到任任内累轉朝請郎新安志巻九
