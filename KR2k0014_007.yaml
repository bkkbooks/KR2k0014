body:
  text: 新安志巻七宋羅願撰王提刑王提刑汝舟字公濟婺源人生三嵗而孤不好戲弄纔冠登第性豁達以風節自喜所不合不肯降色詞知舒城縣熙寧中嵗荐饑推行荒政甚悉所全活不可勝計後知南劍州時沙縣獲强盜十三人已殺其魁餘十二人皆當死汝舟閱牘得捕盜官利賞增入其贓之狀三日而決皆免死以治行第一除知建州後又知䖍州汝舟才力明爽治無劇易以惠利為本摧伏豪强貧弱得職以故所至人安之三州訟者好傅律為詞若不可破汝舟徐以恩義曉譬皆意折而去哲宗擢為京東轉運判官奏對言厚風俗莫先於教養願詔長吏每月臨視學校教授當限年革少年新進及本貫人為之者又吏貪暴者殆出於天資今雖以此扺罪纔期即叙願永不令為親民之官又言人戸典賣推割不即併歸一戸官司失察遂為詭名久益難曉故賦税積欠者多臣嘗三為縣令每因造二税簿即比對五等丁税儻户眼有多寡不同者以所剩戸數令人户自首并令鄉書手照對收併一處供輸遂無挂欠亦省簿書之費願詔監司檢察若簿書整齊則無積欠之弊有補國計又請立法委監司視縣劇易令能否使易地因立法取願狀連書奏裁監司渉私者以違制論自京東移河北韓忠彦由北京入相汝舟欲漸還里託求江西忠彦至中書為言執政皆以為下遷不可忠彦曰王某以退為進也朝㫖降樣市北珠奏言真宗時詔益州市錦六千疋知州趙稹止市十疋至天聖中仁宗因稹奏對奬其恤民臣元符初在京東准省符市錦未㡬移河北又抛買北珠一珠之直至九十四千陛下即位之初聖政一新錦與珠如不可罷猶願詔有司損其數以留難得之錢少助經費疏奏即日有㫖罷之又言河北小鹽産深冀邢趙洺霸所出甚微自元符二年令客人就所住州縣召保給據往買有往復阻節之勞以故多私買而諸場停積不售願只令就場召保又解池經水患未復請權以河北見積大小鹽通入陜西賣之自江西徙䕫州路提㸃刑獄告老而歸歴官十七任餘五十年未嘗有失閑居閱六嵗安卧而逝年七十九汝舟内行修事祖父母孝繼祖母胡氏没季父持䘮百日而卒汝舟時守南劍上言諸父無在者臣以適孫乞解官接服以終三年下禮官議詔特聽之因著為令始筮仕南豐曾鞏贈以詩曰身役簿書雖擾擾力窮文史尚桓桓李清臣嘗勸習大科不願晚號雲溪翁有文百巻手所校書萬餘巻汪宣徳汪宣徳汲字子遷績溪人年二十登嘉祐中進士第嘗為慈溪令徳門鄉河塞數十年為疏導溉廢田數千頃民歌且祠之以太平州推官鞫贊善大夫陳知規獄方暑繫者百餘多病疫汲解釋浣浴飲食之訊得其情知規復官繫者出為佛齋以報性潔廉與物無忤而政稱彊明卒於元豐中子奕字公偉時方復詞賦取士奕尚少西試太學即為其第三人與弟襄相繼登第友愛尤篤為東流令有書生以妄言繫獄憲使欲置之極典奕以為狂疾奏上果貸死使者以書謝曰微君吾㡬陷失入襄字公弼少從兄遊上庠商河常瓌號知名見之驚喜與定交仕為南陵主簿太守翟汝文引為兵曹薦其文史足用詞有古風書遺朝士言不喜為宣城守而喜識汪主簿始襄在太學有詔擇内舍生為使臣學敎諭以教諸小内侍大司成汪澥以襄名聞時梁師成為提領方貴寵見襄頗禮憚會襄以内舍三試不中當退舍師成從容言於上有㫖特免襄自陳願得退舍不可以襄故亂學校法上使小内侍從襄學者押赴内舍竟不就及登第後師成欲薦以為館職襄自言處學校久方欲試吏州縣不願在册府師成覺其有嫌逺意寖怒語人曰彼耆儒也詎敢浼之至是秩將滿有内侍為走馬承受過縣劾不時賑濟令佐皆停官被鞫或言師成有力焉後改宣教郎押白金詣敵帳用敵中權衡虧其半敵怒甚同行皆股栗襄徐辯竟得直嘗作弔陶朱西子賦興寄髙逺而奕子安世襄子安行皆復登第安世資端厚教後進有法宦不遂卒安行篤行義能官今為金華宰洪尚書洪尚書中孚字思誠比部湛之從孫十四首鄉貢避前達處第二方在太學神宗已聞其名且為内翰蘇公所奬登第試校書郎黄岡尉盜張韜以三百擾境上久不獲中孚單馬出境追及發三矢連斃之元祐中為成都縣主簿雕門蠻叛帥以屬中孚即日度笮橋呼酋長慰撫令自歸人謂膽大於身改秩後多所更歴崇寧初召對擢提舉河東常平嵗省大農費億萬增秩改轉運判官除直龍圖閣升副使賜三品服熙河新邊乏用以金五千萬為助上喜謂得劉晏移漕熙河蘭湟路進集英殿修撰興鼓鑄𣙜酤市易博糴安西米募蕃部弓箭手輦致新邊裕如湟鄯部皆極邊行路苦剽剠創烽火臺置郵𫝊屯要害處以閑田給候人使自耕又請河東戍卒代蘭州坐團者給鎧仗使遇賊得自擊置通川通津堡以扼其喉後召為户部侍郎時方受八寳禮賜如南郊有司告乏中孚未至三十里中使促入都堂議中孚命吏奏辦吏惕息不敢書雖尚書亦然乃獨奏果無乏事吏畏其聰明思有以中之白開封吏庇鄭伸逋負不追者中孚曰后父之外别有鄭伸耶吏戰栗語塞夏人齎寳貨來售中孚坐驛呼使前不可曰我雖微亦使人也遣譯謂之曰爾以貨來直賈耳命酬其半賈夏人謂無戲我中孚曰往者回鶻入貢道而境爾掠其資而有之我特以其舊故不問尚敢校耶賈問知姓氏驚曰初不知河東洪老子也拜而去有詔褒寵上以陜西茶馬課不登問曰神宗朝岷山茶一垜易一馬今茶數倍矣馬不至奈何對曰蕃部日飲酥酪恃茶為命若稍重茶禁不急於馬則馬自至解州鹽池嵗供八十萬池壊後行東北鹽嵗得三百萬而議者欲復解鹽中孚言解池非暴以烈日鼔以南風不可成今厚灌水以積成之味苦而不可食中外已便海鹽之甘矣其肯捨之乎若推東北之法廣之嵗入何止三百萬哉卒如其議尋以徽猷閣直學士知太原府夏人重兵壓境來議地界中孚飭諸將乘便掩擊皆遁去且移書來罷議後以知永興軍入覲上問近嵗乏才之由對言祖宗時近臣有過特㫖放罪所以優其禮而厚責其報身雖在外聞朝廷政令有不當交章論列執政不敢肆臺諫不敢黙小人拱手知難而退自熙豐以來宰相欲行新法畏内外掣肘建言法行自貴近始自廟堂大臣侍從臺諫皆拱手於繩墨之内不敢有所措意近又升走馬承受為廉訪使者以軋外臺之吏由是連帥監司不敢按部吏州縣之官不敢治胥吏上下相䝉茍且成俗風教安得不壊人才安得不乏上歎息稱善後帥真定府女真遣使約夾攻遼許以燕雲地歸中國上密詔河北諸帥經畧之皆以為可許中孚曰臣游邊久熟知遼人情狀昔遼主洪基用其相劉六符之言大蠲燕雲賦役今其國雖弱民心未忘且中國通好嵗久一旦與其臣妾覆滅之臣恐滅遼之後女真未易制也凡數百言會遣中貴人譚稹來議中孚曰誰為此謀國之賊也稹大不樂竟劾使去降待制又奪之時政和六年也城北寨禁山多大木百年矣斬伐㡬盡中孚請削山浚塹以防不虞未報而罷其後識者追歎之以中大夫龍圗閣待制致仕紹興元年卒於家年八十三子彚與諸孫以雍睦稱胡金部胡金部伋字彦思婺源人父紹幼力學嘉祐中林希為州考試官紹首薦禮部尚書品天下魁文以紹為第一晚為剡主簿州遣官分檢諸縣旱七縣訴所檢不實獨紹所檢山隂無訴者守因盡委復視之新昌尤多大族而紹所蠲例下戸後分檢七人者皆衝替紹益知名伋紹聖中與弟伸同登第累歴中外政和四年通判深州廨有菜圃千六百餘畦嵗得錢踰二百萬伋以圃送公使庫時州縣官頗營圃規利河北副將令禁卒賣菜虚價錢者五十六人北平軍稻田務官以菜錢决責兵士致斷腕會糴便使者沈積中以伋事聞詔奬之曰君子不盡利以遺民不茍得以思義公儀休身相魯國怒拔園葵孔奮為姑臧長不欲自潤舊史載之以為美談汝久踐郎省出倅方州遵條詔之嚴挺潔廉之操能卻園利悉歸有司庶㡬古人可勵流俗覆實來上朕用汝嘉於是鞫二人者召伋赴朝終金部郎中胡司業胡司業伸字彦時幼穎悟七嵗父課二兄偉伋為莊周夢蝶詩伸亦隨作末云誰能分夢覺真妄兩悠悠紹異之年十四隨兄游學杭州月試輙先出又數為之首敎官命移案就察之問所用事對如響蘇文忠公為太守聞之遣鞍馬召與語甚見歎異登第試學官授潁州教授部使者列薦崇寧初召為太學正進博士數嵗遷秘書丞著作佐郎與修神宗日歴及禮書除右正言數月以親嫌改符寳郎遷辟廱司業後二嵗責監杭州樓店務繼知無為軍時巢縣猾民有訴令者率斂錢數百千櫝藏置列肆中伸察所訴不實物色之得其櫝與簿書具載所以餉吏者按致其罪慰謝令政尚慈恕民繪其象在學校久於名士多所甄引遭喪亂遺藁存者尚二十萬言從弟侃字彦和始名侔登進士乙科嘗仕為宰去官尋得直竟不復出凡數十年自號柳湖居士恬靜好書晚苦目疾猶使子孫誦而聽之將終自為誌積官至大夫黄侍御黄侍御葆光字元輝黟縣人少孤刻意於學年十六居太學有聲四試禮部不第縣欲以應八行科辭不就從使髙麗補將仕郎以銓試優等賜進士出身調齊州司理閱獄囚枝蔓者一夕遣數百人通判以為疑視牘無不當者上其事進秩修職郎政和三年召除太學博士又以薦者賜對改秩除校書郎後為左司諫以言事忤大臣徙符寳郎七年除侍御史建言常平法壊及乞推陜西監司赴所部燕之禁頒之諸路郊祭百官饔餼用羊數萬屠割烹煎腥羶淋瀝請並支食錢以稱嚴恭之意北方歸明人李良嗣撰北征録平北書大臣主之擢秘書丞葆光論良嗣犯罪亡命蘄於免死既妄撰平北等書以干進萬一語泄致生嫌隙又良嗣私問骨肉消息不絶此其心亦未易量自祖宗至今納疆土攜族帳來歸者不過崇以虚名厚以廩禄置散地羈縻之未聞養之華省因列五害以防微為戒條三省樞密院吏非元豐舊制者其大弊有十革之省費月數萬因請更中外引例破條及無條制直陳乞者令各守成憲又言君尊臣卑剛健者君之徳而其道不可屈柔順者臣之常而其分不可抗引洪範威福剛柔之説以為威福之柄在我和而順我者克之以柔强而弗助者克之以剛用剛克則沈潛之於内所以制姦慝用柔克則發見之於外所以昭忠信先王所以操利勢馭人羣而莫敢攖者以此徽宗令左丞讀其奏於殿中以示大臣知兖州方邵輙至國門求赴堂禀議葆光奏請重竄之上悦面諭曰未嘗敢有人言此者又論崇寧後增置兼局之費有㫖令蔡京裁定京乃陽請一切廢罷士論恟恟上疑不可行葆光言如禮制局詳議官七員檢討官十有六員制造局文武官三十餘員豈無可裁定稱上意者他日因雨澤愆期奏對言君臣同心相濟然後可以寅亮燮理今師臣蔡京開僭擬之路負委任之意啟跋扈之心太宰鄭居中少宰余深皆依違畏避此所謂天氣下而地氣不應者章入不報京隂中以事移卿寺未拜謫昭州安置宣和二年令自便尋以職方員外郎召未至復主管江州太平觀其謝上表云言之未盡悔也何追四年知處州州經宼攘前此民賃官地居者至是豪右增直强請葆光至悉按如其舊輸賦閱囚每事經意為建學請監書閱二嵗除直秘閣再任疾將革聞蔡京罷喜動顔色没之夕家未有繪象索之民間得百餘本葆光尚氣節喜推挽後進開口論事無所隠諱博渉經史文尚理趣素惡積財俸餘以賙親舊為嫁女奉䘮家無所餘郡人斂賻五十萬子由中却而不受相與述其勤事感疾之狀訴於朝得一子官汪丞相汪丞相伯彦字廷俊祁門人崇寧中登第調成安主簿時呂惠卿鎮北京見其文嗟賞數檄主旁郡學用中書侍郎梁子羙薦召會子羙帥定州辟管機宜文字移大名復從之連三帥十餘年皆留自佐及子羙再帥詔繕守備務從宏大子美専倚以辦不數年陪都勢成奏功自宣教郎至中奉大夫宣和二年召對除開封府司儀曹事遷軍器將作少監後擢尚書虞部郎靖康初中外戒嚴工部四司三監長貳諸郎無一人留者凡備禦之職大率兼之所至皆辦召見獻河北邊防十策剴切當帝意即以付尚書省尋直龍圗閣知相州賜金紫陛對極言當世事帝嘉納謂曰兵起北方士悉求南去卿獨以邊警請行真體國之臣加賜衣馬器胄及賞士金帛至相州大修城壁儆師聚糧申明賞罰軍聲甚振冬十月金人陷真定詔移府相州命兼領時太上以康邸出使在磁方敵騎充斥伯彦亟以帛書請王還相州以安人心遣將劉浩帥兵二千衞王翌日躬服櫜鞬迎河上王喜謂曰他日見上當首以京兆薦公閏月王奉檄書開大元帥府以伯彦為副欲引兵渡河謀所向或請出濬滑或請渡王俞或請趨魏縣言人人殊公獨奮曰非出北門濟子城不可抗論詳明衆莫能奪王喜曰廷俊之言是也議既决或猶欲宿留伯彦以為承此冰堅不渡萬一春泮大事去矣遂奉王渡而身為之殿未畢數騎而陷已濟饔人不至乃奉羊羮餅餌以獻時以方馮異王霸遂由大名歴鄆濟達於宋時所將皆烏合屢危賴伯彦調䕶以免先是王已渡遣所乘車來迎屬天寒又解所服絛褐以賜是月奏為集英殿修撰明年二月承制拜顯謨閣待制升元帥尋進本閣直學士王即位南京即日擢同知樞密院事方披荆棘立朝廷百度草創伯彦夙夜匪躬以贊成大業六月知樞密院事駕幸揚州明年十二月拜尚書左僕射會集彌月求罷未報乘輿南渡乃除觀文殿大學士知洪州自是屢黜後嘗知廣州盜數萬方㓂廣東一夕遁紹興九年春以觀文殿學士知宣州召對泣謝上為改容翌日拜檢校少傅保信軍節度使賜鞍馬笏帶茶藥留旬餘燕見錫賚無虚日陛辭至漏下數刻至郡未㡬請祠詔特給真俸自始仕在北方至是歸適四十年擁旄節還家上冡會族婣父老為笑樂時子召嗣知撫州命移本路轉運判官使便侍省十一年以開府儀同三司致仕卒年七十三疾革言不及私輟朝兩日官給𦵏事録親屬十一人賜田十頃銀絹各千伯彦資樂易不事邊幅事上接下以誠未嘗一日去書不觀有表章奏議雜文數十巻中興日歴五巻春秋大義十巻又集三𫝊本末為三十巻程顯學程顯學邁字進道黟縣人程忠壯公靈洗之後登第為仁和尉以捕盜改秩知西安縣政彊明競渡者持仗而譁官兵不能禁守以語邁邁遣一吏持判示之曰不即散與俱來衆驚曰此知縣判也即散去部使者督諸郡水旱積欠郡因移文督税之倚閣逃絶者邁曰衢州數年無水旱何積欠也守不能屈由是佗邑畸零逃絶者皆免考試處州回縣有大辟七事閱案釋其三衆無異議調知鹽城縣宰相劉正夫押勅見其名召與語曰往在太學見君文今為縣又有美政乃薦之徽宗嘉其對除提舉江西常平起家不十年乘使車過里里人榮之民有訟田者二十年不决邁閱其牘問訟者年㡬何曰六十六邁曰爾所齎劵乃慶厯三年時方年七嵗安得妻財置産訟者歎以為神曰早二十年遇之可以無訟嵗旱募流民浚洪州東湖水患為息後入為户部侍郎除提舉措置河北路糴使以辦聞命再任繼除直秘閣中使李彦銜㫖宣諭因語邁西城所田須農具邁送鐵農具一車彦大笑尋禠職罷任太上即位南京召除左司員外郎後遷太府卿提㸃郊祀事務省費十六七因編進命付史館遷起居郎會建州賊葉濃據城稱兵以邁為福建轉運使直龍圗閣按舊給州縣鹽本令鬻鹽嵗有常數用度以足召未至就除集英殿修撰知福州判兵楊勍至白沙聞有備去建州劇賊范汝為陰窺福州統制李捧為所敗邁遣約降有日會謝嚮等奉使募兵遣人誅賊欲自以為功於是復叛而所在盜起率萬人建劍汀邵武皆盜區邁且招且捕所向悉平惟汝為未下乃遣新招降張毅使守古田責以立功又謹守南劍界移制置使兵入屯三田汝為由是不敢窺興化漳泉邁度大將辛企宗及謝嚮等終不能平賊密請王師航海不五日可至福州庶一戰滅賊章十上不報乃奏謝嚮連賊企宗玩宼且賊不可赦上感悟命大臣由海道賊不虞王師至不一日平費不及民乃請録死士後給脇從無歸者粟及田廬掩露胔選循吏撫養留廣東舶米五禺以寛民賦且乞量留大軍得三千人後松溪及汀漳有宼賴以平紹興二年召進徽猷閣待制知温州黥平陽吏四十人他縣猾吏以次遁去上謂宰相曰程邁温州之政光絶前後今之吏師也丁父憂後之信州會議復發運司以邁充使邁以為祖宗時發運司事權甚重今屬官纔八員而無辟選之文則任太重權太輕給緡錢二百萬欲一年有成効三年有蓄積利源太狹責効太速又今二百萬不能當昔時百萬所糴固未廣而倉船稍脚之費皆未知所出若責之州縣深懼擾民且謀不審則行不逺責太速則智者不能善其後乃力辭上慰喻之且令增給糴本陛辭又奏曰昔唐劉晏兼九使財賦悉歸一至國朝始分為三然三司使居内而發運使居外猶相為表裏今天下財賦益分租庸専於轉運常平専於提舉鹽鐵則有茶鹽司鼓鑄則有坑冶司平凖則有市易司户部既總之發運獨存其名耳况今中外責此司甚重而視此司甚輕願詔使明知興復之意而行之如祖宗時則臣不敢辭上曰已詔三省除卿雜學士以增重使權會後省繳奏而止乃置司平江府以秋成和糴各因其郡縣為價稍增之糴四十餘萬而所費糴本㡬半廷臣屢以為言上輙止之尋權知府事又言今糴本尚二百餘萬緡可糴五六十萬石而一司官吏與將來漕運所費比民間價又增什四五則糴買終無補於國虚費用度乃罷就除知鎮江府兼沿江安撫使軍興後為一新官府陶瓦貸民因興修學校鄱陽嵗饑湖多盜上憂之進徽猷閣直學士知饒州奏蠲舟車征算増米價以招商賈不踰月米大至又手條寛恤三十餘事揭於州門民以寧息徙温州至適火後為營官舍千區開河渠立望樓結火保更為新學多士趨勸詔書褒諭轉左中奉大夫進顯謨閣直學士再知福州州有舊招安賊首等二百餘人以使臣廩羈縻之郡人常側目會戍兵還朝因盡遣歸樞密院聽差使尋罷奉祠紹興十五年正月卒年七十八有漫浪編五巻奏議表啟三十巻詩二百餘篇姪孫叔達今宗正少卿太子左庶子凌待制凌待制唐佐字公弼休寧人登元符進士第授大名府司户帥梁子美甚器重之就差夏津縣令河北有疑獄繫者二百人歴十三年十置獄唐佐往决之得其情人皆感泣夏津是嵗旱比還雨隨至時號縣令雨獄上進秩二等召為勅令所詳定官遷光禄宗正丞歴京畿江東常平後知登聞檢院常語侵王黼請祠得南京鴻慶宫翰林承㫖鄭三益薦才堪大用上曰非美髭髯閑於進止者乎即日除開封府司録府尹罷連坐謫衡州酒税後知嚴州號令不煩暇日與諸生講學作易𫝊數萬言進之以部使者劾罷唐佐警敏事親盡禮好周給親族建炎初起提㸃京畿刑獄時道路方梗或勸緩進慷慨遂行進直徽猷閣京畿㓂益充斥與戰數十合殺傷過當三年除知應天府敵騎數十萬圍城城中兵少糧乏外無援誓以死守及陷被執敵欲降之指頸曰此可斷不可降也皆義之劉豫欲汙以樞轄不從留使守應天繼得豫虚實密以蠟書奏朝廷事泄豫捕致大梁怒曰何為見賣唐佐曰國家何負於爾而反面事仇一世皆欲殺爾何獨我也豫猶惜其才繫累日度終不可屈遂引出害之臨死曰恨不見梟劉豫之首豫羈其妻子於穎昌時紹興二年也明年諸將復穎昌妻田氏以唐佐死狀聞詔贈待制已而穎昌復陷不復知其家存亡又有盧諫議臣忠字信仲黟縣人登政和中第建炎初由臨安府司理召累遷右正言上驟欲用之命相者視之曰有膺而無背官不過此矣後扈駕至建康敵騎有逼近御舟者臣忠叱之勢益迫潛水中後數日上求臣忠所在左右記其處以對使没取之拱立如生賜水銀以斂贈諫議大夫與兩子官汪内翰汪内翰藻字彦章婺源人自曾祖以下三世第進士藻幼學精博好春秋左氏及漢書思以文顯當世登崇寧二年第瓊林宴中席頒冰狀元霍端友屬使表謝授簡立成一坐驚歎後為江西提學司屬官徐俯以前輩文章擅名見其詩於僧壁曰我輩人也率洪炎洪芻往訪之還除九域圗志所編修官歴校書著作佐郎符寳郎故相王黼以太學同舍不相中比當國絀通判宣州梁師成方用事薦人多至大官時號隠相聞藻罷使其客呉可通誠欵曰服公名舊矣幸過我禁從可立得藻不往或勸之笑曰若欲使我與可等伍耶到宣州未㡬請祠凡八年終黼之世欽宗即位召歴屯田禮部郎太常少卿起居舍人太上時為中書舍人賜三品服坐試潭州進士何烈失當罷為集英殿修撰領外祠明年復召為舍人權給事中兵部侍郎兼侍講直學士院國歩方艱一時詔命典册皆出其手能道上意所欲時以比陸宣公又因事𫝊古遒麗精切世爭𫝊誦嘗草賜髙麗詔上顧輔臣稱其得代言之體拜翰林學士以所御白團扇書唐杜甫詩紫誥仍兼綰黄麻似六經十字以賜嘗陳所以待諸大將者三事後卒用其策又請續元符以來至建炎改元日厯因命兼領時中外新定乃蒐訪缺文稽采衆論為力甚多尋除龍圖閣直學士出知湖州領日厯如故為顔魯公請廟號取所籍朱勔窗户盡以為廟飾户部和糴米六萬糴四萬而上書自劾詔不問嵗餘復降本錢糴數萬適嵗稔物估相當以辦聞進一官亦不受移撫州繼提㸃江州太平觀翰林學士范冲以為藻所纂日厯經渉嵗月稍見功緒一旦中輟懼積久散逸後人益難措手可因其閑使仍舊纂集從之詔許辟官屬二人賜史館修撰餐錢辭不受上其書凡八百帙遣使賜茶藥進官中大夫除顯謨閣學士知徽州以從官典鄉郡人以為榮移泉州三衙大校閱禁軍伉健者使州具資糧遣送藻以為州竝海宜宿兵備非常留不遣且馳驛聞大校怒至以語侵之免符卒下徙知宣州改鎮江府府經亂後嵗輸上供米不如數轉運使閱庾中見米盡封之猶負數萬軍無以食至則破鐍給之以聞始藻坐王黼故出至是言者猶以為黼黨罷之繼落職永州居住閱七八嵗卒年七十六後二年詔復職且官其二子及徽宗實録成用藻所著為多贈端明殿學士性樂易不飾名譽居官矯然不侵前後典六州多惠利好大小篆有文集行於世又有裔夷謀夏録青唐録各三巻古今雅俗字四十四篇胡待制胡待制舜陟字汝明績溪人建炎初以殿中侍御史彈宰相出知廬州淮西宼盜充斥舜陟治守備增築東西水門首招降劉文舜兵萬餘因以為用時孔彦舟白彦中丁進李勝皆以巨盜合從光蘄壽久被圍命文舜及其將破之解三州之圍張遇自濠州奄至梁縣舜陟使毁竹里橋伏兵河西伺賊半濟擊之劉正彦受命討丁進至則須兵舜陟已先遣文舜破進因拒正彦不與正彦留屯不肯去驛聞於朝舜陟亦劾正彦逗撓時正彦有異志而患兵少舜陟卒不與孫琦兵扺城下舜陟城守拒之索糧不荅而時出兵擊其鈔掠者琦宵遁邀擊得其輜重叛將范瓊破壽春焚掠聲搖淮浙移書遣五騎責錢帛給軍叱斬其四留一騎還報又檄諸郡勿與糧瓊遂由光蘄絶江而南時淮西八州唯廬按堵民繪其象于教弩臺移知建康府四年六月以徽猷閣待制知臨安府紹興中復知廬州先是舜陟去後州遭殘破守武臣責官逋在民者數萬甚急又托贍卒令市販輸金至則蠲罷之潰卒王全請以其衆𨽻麾下招集流散官為築室貸農種食秋登乃償奏官包孝肅曾孫亳敵有揚兵欲南渡者持重不為動後知廣州有功弟舜申舜舉子仰最顯汪少卿汪少卿叔詹字至道歙縣人少敏於為文先是治平後四十年縣無决科者至崇寧中叔詹與同縣二人登第未㡬從弟希旦繼之叔詹言論慷慨嘗權蕪湖縣發運使盧宗原請堤丹陽湖為田方大興役叔詹以為不可成宗原詆以格詔叔詹至京師上封引唐李白詩湖與元氣連風波浩難止為驗徽宗閲之即日罷役擢提舉潼川路常平究鹽井利病奏捐虚額及免逋欠者甚多比還樞密李綱引為編修官太上即位南京命權太常博士充徹幣官儀注多所草定從至揚州議遂駐蹕叔詹以揚州無險固不若且駐金陵徐圖興復因近親士㒟白計時詔自中出宰相難之後卒不可守紹興中知鄂州提㸃湖南刑獄有惠愛以司農少卿總領湖廣荆襄江西六路財賦餉武昌軍凡八年無闕事卒年八十一子若海字東叟十八游太學靖康初國歩方艱太上以康邸出在相州中外隔絶若海夜自京城縋及王於濟州備言京城事詞誼激烈一日至三訪問賜衣服巾履補修職郎充帳前差使從至南京改承奉郎嘗招喻節制江夏軍馬李允文輩及為劉錡請師以勞數増秩後以朝散大夫知道州陛辭上問卿久不見向安在除直秘閣改知江州訓詞有朕起兵時主簿之語其眷異如此希旦字周佐宣和初自虞部郎出知泗州玉師東南下衆數萬糗糧驛𫝊畢給進秩除直秘閣尋賜金紫再任後知袁州方軍興繕治城池斬土軍之妄言徼求者代還江西列城多失守袁獨全父老為立祠紹興中知舒州造瓦貸民以易苫蓋并給耕牛江浙流民多至者終朝請大夫後有將作監丞若容正夫秘書丞若思行夫於叔詹為從子紹興中兄弟相繼登第若容少苦學性端方友愛諸弟當之官母或未欲往輒盡留婦子使娯侍由通判洪州召對稱㫖除將作監丞若思明悟有餘歴任多為達官所知乾道中由國子監主簿入館嘗因奏對上以為深得愛君之義而若容子洪世其科胡殿院胡殿院汝明字𫝊道黟縣人其先育為晉新安太守因亂家焉明星仕梁天監中為太常卿汝明資樂易不事矜飾至議論有未安必反覆求是登第歴南康軍教授無為軍士曹改秩後除宗正寺主簿建炎初召以憂不行後通判鄂州幹辦行在糧料院賜對上稱其老成權監察御史不數日除殿中近例所未有時邊事粗息建言乞經營太學作新人才以備中興官使明年立太學又言頃來賞厚而罰輕官吏為姦者無所懲銷錢為器及散出外域者宜申其禁乞罷州郡添差酒税兵官及外臺緝捕主管官部使者庇姦贓致臺諌論列者使與連坐或有糴買給賣科配之類戒吏毋得暗增虚數緩新田之賦事多見從時新開米芾書帖唯賜從臣詔特以賜出知饒州後致仕累嵗卒年七十七先君尚書先君尚書諱汝楫字彦濟姓羅氏歙縣人冠嵗首鄉貢在辟雝以文為司業胡伸博士毛友所知數置優等登政和二年第為郴州教授眉山唐庚過郴賞其詩練永為提學視事半嵗按部且及境猶未通姓名然永至即論薦歴州縣不求人知數與上官爭事建炎初及紹興二年兩嘗召審察尋補外八年七月召監登聞鼓院除大理寺丞刑部員外郎及對請令命官犯公罪勿取特㫖以終惠臣子又户口彫耗宜少寛養子之禁太上稱善是日拜監察御史後二十餘日遷殿中侍御史論淮南不可棄置度外宜增其備調武人為守選帥守領浙西防海之寄置都統以䕶湖北諸屯趣劉光世出援劉錡及錡立功為請更戌以休其衆間諜言多不同請西府擇謹信者總之革竄名賞籍人以勸立功者江西福建廣南憲臣請使通治羣盜折帛匹八千估太髙乞願輸本色者聽州郡被災傷尤甚及盜賊未息者不宜用田業一槩率錢供軍禁浙東以積榖收物力錢者還餘杭民田增置為牧地者五千畝遷起居郎兼侍講上問或謂春秋有貶無褒此誼是否對曰春秋上法天道春生秋殺若貶而不褒則天道不具矣上嘗曰自王安石廢春秋學聖人之㫖寖不明近日得其要者唯胡安國及卿耳嘗以當轉朝請郎為先大父乞五品服及侍經幄上數問卿父比日安好否輙奏起居飲食狀上常悦論列權倖多所裁抑又言職事官補外廟堂多超越除授請罷監當資序人除郡守知縣資序人除監司未至官者遷御史中丞兼侍讀首請戒中外謹守祖宗成法會編次續降指揮公言囏難以來一時申請多失列聖仁恕之意宜痛刪其不合者馬院官占富陽沙田為牧地馬不至而民代輸如故因鬭有死者公坐臺得其事即入奏請還其地與民上竟開納始趙丞相罷所援引例貶彈者方未已公為副端獨奏言和議之初縉紳所見不能皆同王庶等已黜不足深罪所保全甚衆及是為臺長時執政多由此遞遷會宰相又與執政不叶欲去之公方數求出舊例中丞侍御史不竝置乃除一侍御史已而公遷吏部尚書繼充國信使還申前請降詔不允請益力除龍圖閣學士知嚴州紹興十四年也公時年五十六秩滿請祠以歸父子白首相娯自是不復出凡提㸃江州太平興國官連四任二十六年遭先大父憂未終喪薨年七十先是公嘗閉閣為一書手封以授先夫人曰異日付諸子以聞後十日發書乃遺表其首曰父母之體生則有終君臣之情死而不易讀者壯之累贈開府儀同三司公體貌秀偉音如鐘上嘗謂其南人似北少自植立不交流俗與人言不彊相取下燕居率正衣危坐入朝七年雖不至大位而以全名始終有東山藁奏議外制數十巻朱吏部朱吏部松字喬年婺源人早嵗擢進士第調政和尉用内翰綦崈禮薦召充秘書省正字丁母憂服闋為校書郎兼著作佐郎歴度支司勲吏部郎中出知饒州行狀未出有子熹字元晦登第後一仕為同安主簿讀書求志嘗召不赴乾道中召對除武學博士未至請祠監潭州南嶽廟後除樞密院編修官不就淳熙初詔以熹安貧樂道廉退可嘉改秩領祠觀四方學者推尊之汪樞密汪樞密勃字彦及黟縣人年十八首鄉薦後登紹興二年第調嚴州建徳主簿為人渾厚不妄言同列以誠長者待之不知其長於吏道也中書舍人董弅時為守勃見為言願得一二事衆所不能處者得為裁决之弅擇委數事所處决皆出意表由是深相敬異紹興十三年除太常簿入臺為檢法歴三院御史右諫議大夫兼侍講遷御史中丞十七年除簽書樞密院兼權叅知政事居二嵗數上章求出以端明殿學士再領外祠凡六年後起知湖州為政安靜不尚鞭朴未嘗妄費公家一錢民間至鋟木為語家揭一本置坐隅曰賢哲太守福壽千秋天子嘉之詔進秩三等比退居専以教訓子孫收䘏鄉里為務嵗新陳未接必損價出榖旁近數郡賴之晚節子孫皆以文藝擅名場屋子太常寺主簿作礪凡五上禮部而孫義榮義端同時登第義端為進士第三人説者羙之後有㫖復龍圖閣學士會卒詔追復年八十四金尚書金尚書安節字彦亨休寧人其先唐末自京兆徙幼穎悟强記登宣和六年第調洪州新建主簿期嵗而薦章七上秩滿范丞相引為刪定官當紹興初法令散逸凡専司法皆安節所修次書成會廣中得舊本上之畧同舊例改秩後率遷安節獨滯故官後謝祖信遷寺丞見宰相曰金刪定改官在衆人之前以不事請謁無為言者祖信不敢先之任滿還家明年召見對稱㫖太上皇曰金安節好士人若益涵養有用之才也除司農丞七年五月擢監察御史建言比年棟撓者皆由自用其智無以揆天下之務宜衆建大臣使均任其責尋遷殿中侍御史秦丞相再用方得君進其兄梓知台州連章論其超躐竟罷之尋以急告去朝坐是閑廢十有八年家貧祠禄不給處之自如故相死起知嚴州提㸃浙西刑獄入為大理宗正少卿在卿寺凡四年有言其獨立無援者上曰朕亦知之遷禮部侍郎謝日面諭曰卿久合作從官繼兼侍讀遷給事中今上即位詔給廷臣筆札條當今弊事安節條奏有成法者宜不得輙請用例嚴僥求内降之律及請稽寳元詔㫖詳校入内内侍省御藥院内東門司凡百支費堂除差遣當稍省歸吏部并許官長辟除益清中書之務䕃補文武宜各依本色毋令専求文質妨右武之義在職封駮甚多其在太上朝封還殿院杜莘老出守之命至是論潛邸恩除閣職者尤為切至兩朝皆優容之後拜兵部侍郎數月求去得請給事中胡銓援韓愈留孔戣及近例繳奏上從之隆興二年正月遷吏部侍郎尋權尚書告老益力詔以敷文閣學士轉一官致仕賜對衣金帶鞍馬時去郊祀纔數月特許奏薦不降等陛辭面賜金魚去都多歎羨者太學生百餘人伏闕三上書乞召用乾道六年卒年七十有七安節為人樂易恬退遇人有禮在朝則衎衎正色親喪不入私室與兄相友愛後以不降等恩奏其孤素不問家事誦書或至夜分後進為立祠於縣學新安志巻七
