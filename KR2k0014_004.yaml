body:
  text: 新安志卷四宋羅願撰休寧沿革休寧望縣本漢歙縣之西鄉吳置新都郡析以為縣號休陽治靈鳥山在今縣西二里嗣主名休改為海陽移治萬歲山今萬安山是也晉武帝改為海寧宋大明八年省黎陽縣併入海寧梁承聖中復置黎陽并割黟歙海寧以為新寧郡陳省新寧郡亦省黎陽隋大業中新安郡治于此改海寧為休寧義寧中郡遷治歙縣唐武德初縣治萬歲山舊城開元二十八年析休寧置婺源縣天寶九年縣徙治西十三里則至今因之永泰元年盜方清陷州州民拒盜保于縣之山險二年賊平又析置歸德縣大厯四年省歸德縣本縣在唐為上縣本朝為望縣境縣在州西六十五里其境東西廣長六十八里南北一百七十九里百二十步東至歙縣界二十八里西至黟縣界四十里南至衢州開化界百四十九里百三十步北至歙縣界三十里東南到嚴州遂安界百二十六里西南到婺源界九十二里東北至歙縣界三十里西北到寧國府涇縣界百四十里鄉里其鄉十一其里六十忠孝鄉在縣西南其里孝芝宣仁懷義孝義安樂鄉在縣東其里安樂和孝嘉福吳田長汀積善良安鄉在縣北其里間田安樂羣賢移風還珠吉陽鄉在縣西其里興善大和松溪鼓腹永和履仁鄉在縣西其里永康太平仁義仁德回溪黎陽鄉在縣南其里信行依仁合陽信安懷仁遊山鄉在縣南其里方潭同化重信嘉禾忠義和睦鄉在縣南其里方溪興教輕財富義長樂太清嘉善鄉在縣南其里奉正睦親紹聖從善永豐千秋鄉在縣南其里千秋江津仙鳧回口中平通裏永慶和化承端虞芮鄉在縣西其里常樂靖安趨化新析淳義户口天禧中主户萬三千八百二十五口二萬四千六百三十九客户四十六口四百六十六未經界戶三萬二千八十經界戶萬七千八百七十六乾道八年主戶萬九千五百七十九客户無田畝田園祖額十八萬六千九百五十畝三角十四步屯田三百二十一畝三角十二步經界增多今為三十萬三千九百六十四畝三角二十五步塘五百一十處堨二百一十處租賦夏稅紬八百三十七匹三丈三尺三寸絹八千二百六十二匹一丈七寸布一千八百二十九匹一丈八尺綿五萬六千八百二十一兩四錢小麥一千八百四十七石七斗三升七合錢五千六百一十二貫六百八十二文軍衫布九百七十二匹一丈七寸租課錢十五貫五百七十五文秋稅糙米三萬八千四百二石二斗三升八合鹽錢一千五百二十四貫七百七文租課糙米一百九十三石一斗四合五籥熟米一石四斗七升和買紬三千五百二十五匹絹一萬八百七十五匹酒稅酒以紹興九年所收為額計萬八千二百七十四貫五百六十文商稅按㑹要熙寧十年二千九百六十六貫二百一十六文今以紹興十年所收為額計一千四百二貫四百七十九文坊場十處河渡無城社縣城九里三十步其坊五海寧晝錦宣化惠化永寧社在縣東南先是元豐末管幹河北保甲馬誠奏乞嚴天下社稷而縣社在酒稅務後湫隘不能容壇壝卜遷于城西數請于州及部使者不見聽春秋祈報寄於佛廬及驛舍之廡紹聖四年長安張宓為令白轉運使林邵得錢四萬有竒於是始營五壇為庖庫於其東備祭器焉廟學在縣南紹興六年陳尚書之茂為尉縣人相率從授業乃以差出錢為屋五十楹官廨倉務驛附縣㕔在城內主簿尉㕔並在縣㕔西南常平倉在縣東南隅酒稅務在西南隅良安驛在城內舊名萬歲驛五畬驛在縣南二十五里皇華驛在縣南九十五里舊名憩賢驛道路道路有二一通郡城一通黟縣界山阜率山在縣東南四十里髙五十七仞周二十一里率水出焉寰宇志引山海經云漸江出三天子都在率東蓋此山也而郭璞亦云三天子都山在歙縣界浙山出焉漢書地理志云浙江出黟縣南率山東入海唐盧潘引此以解山海經中率山今地理志率山乃作蠻中不可曉是古有浙水之源皆由率山出而酈道元注水經云浙江水出黟縣南蠻山中北徑其縣縣南博山有石特起十丈上有劒杪時有靈鼓潛發又北厯黟山又北徑歙縣東與一小溪合水出縣東北翁山西徑故城南又西南入浙江又東徑遂安縣南又左合絶溪溪水出始新縣西南徑縣故城南為東西長溪溪有四十七瀨東注浙江蓋其詳如此然酈道元引率山二字為蠻中故率浙江所發之源而直據黟縣為文取黟縣側石鼓山為驗縣側之水雖亦入浙江然未嘗厯黟山黟山之水自别流入歙則道元蓋誤也而率山之水出休寧界中者至歙縣南歙浦然後合揚之水下而為浙江率水未至時歙縣揚之水所併支川巳多勢自足以達矣要之此郡之水皆下為浙故自歙縣言者出黟山自休寧者出率山自績溪者出大鄣山自婺源者出浙山故黟山與大鄣山皆有三天子都及鄣山之名此其發源之著者餘小水不可勝數而唐盧潘作廬江四辨以山海經廬江亦出三天子都特漸江在率東廬江入彭澤西故潘云今率山在歙縣南連延而西曰浙嶺浙水實出其隂又西走音奏彭澤凡三百里并水出山陽者皆西流滙于彭澤廬江逺乎哉是必一水也潘嘗為歙州刺史其所說亦必有據然言山陽山隂之水皆入彭澤則未為當大抵二山之水東南流者皆下為浙江西流乃入彭澤耳浙或作浙音制或作漸義並同獨聳山在縣西五十里髙三百仞周四十里有洞邃深唐乾元間嘗投金龍岐山在縣西六十里髙二百仞周二十三里石壁千尺凌霄花縷絡其上華時如錦屏有室方十餘丈垂瀑百仞西北半壁有大石橋亘兩山其旁有深澗相傳昔有碧蓮花葉徑尺自澗中流出唐天寶中有僧居之石室中猶有龕像講臺石梯之屬乾元中又有道士龔棲霞絶粒隱此山元和四年刺史韋綬感夢置精舍乃名石門下巖曰爛錦巖門上盤石曰雲外座座東之巖曰標霞西巖曰晞陽座東之峰曰凌虛西峰曰逼霄又名巖在爛錦東者金翠巖前澗曰滌煩泉在爛錦前者曰澄心北望四里巖曰瑞聖而逼霄峰今號天柱峰云按石橋巖在岐山舊經既有岐山又别出石橋巖今合為一靈鳥山在縣西二里髙三十仞周五里嘗有鳳出于此方源山在縣南百十八里髙二百五十仞周三十里本名黃土山唐天寶六年改鹿髀山新經作鹿脾在縣西百五十里髙二百六十仞周十五里昔有採藥者遇老人鬚眉皓白指靈藥示之乃遺鹿脾回顧失其所在雞籠山在縣南九十里髙百六十仞周十五里形如雞籠祥符經云唐開元中有異道士謀卜居視黃山曰確而寒視飛布曰髙而無輔至此山曰是宜為葬地髙可至王侯不然者當致妖異時縣人洪真師事之道士晝臥室中真竊視狀如蛟龍候覺遂辭去道士亦去之鄱陽真遂遷父骨葬此山真居浙南回玉鄉本好方頗能以小術動人乃潛謀起事州發兵捕殺數十人而真竟不獲乃即回玉鄉置婺源縣以鎮之松蘿山在縣東北十三里髙百十六仞周十五里山半石壁百餘仞松蘿交映顔公山在縣南九十里髙五十仞周三十八里上有湖廣五畝中多鯉魚昔有顔公隱此山一旦乘風去歲苦旱禱輒應黃土山在縣南九十五里髙二百一十仞周十五里連五畬山有水北流過縣南入衢州常山界白際山在縣南八十五里髙五十二仞周八里東連歙縣及嚴州遂安界梢雲山在縣西二十三里髙百五十二仞周五十二里武洪水出焉舊名郎山天寶六年改遊仙山在縣南四十五里平地特起四十仞周五里南有石壁削成數百尺闊四十餘丈白嶽山在縣西四十里髙二百仞周三十五里中峰四起絶壁斷崖松蘿森靄頂有池水清徹可鑑池西石室方圓五丈寰宇志云白嶽山峰獨聳有峻崖小道憑梯而上其三面並絶壁三百餘丈不通攀緣峰頂闊四十畝有故階迹瓦器池水石室亦嘗有學仙者居之其東北石壁五綵狀樓臺在空中勢欲飛動又如神仙五六人憑闌觀望久視之乃知非耳蜜多巖在縣西四十七里祥符經云木罅中出蜜昔長吏嘗遣人取之梁任昉為太守遂止今不復有寰宇志云蜜嶺有木蜜出木空石罅中所處險逺長吏每遣百姓就采之任昉至罷焉祥符經以此巖為任昉罷取蜜處因以寰字志所載附見然今人多指淳安縣茶園頭蜜山為即蜜嶺此巖為蜜多恐自以僧居取梵語為稱耳石坼山在縣西北四十一里髙百二十仞周六里夾溪水出焉其巖石中坼南當山在縣西三十六里髙八十五仞周四里水源率水出率山北流百七十里合吉陽水溉田三十頃浙溪水出浙嶺東流縣南百一十一里溉田二十七頃一名漸溪古漸池也漢志云漸江水出黟縣南東入海今嶺屬婺源而溪屬休寧古皆屬黟方源水出方源山北流四十里合源坑水源坑水出鹿髀山南流百五十里溉田三十一頃夾溪水出石坼山南流六十七里合吉陽水溉田十頃五城水出縣南三十里北流溉田四十頃寰宇志云傍有五城村古之大鎮五城斜隅相對又有二大墳昔有人發之鐡厚二尺才破則雷雨晦冥人懼而止南當水出南當山東流百五十里溉田三十二頃尼潭在縣西北六十里澄徹百丈石壁旁聳昔有尼居其側古跡斷石村在縣西三里舊名吳口村西南有石壁下臨深溪祥符經云昔兩舟泊此潭一祭一否夜半有神人徙祭者之舟於北岸有石五丈自壁而墜碎其一舟其墜處今為石室因名斷石村廢休陽縣在靈鳥山上其故城基猶存廢海陽縣在今縣十三里萬安山上隋廢海寧縣在南當水口山下寰宇志又有廢北野縣今按北野自在歙縣界中祠廟城隍廟中順廟梢雲廟在縣東揚山廟在西龍王廟游山廟在南夾溪廟在西北道觀崇寧觀在吉陽鄉松溪里舊名白鶴觀大觀元年八月敇改僧寺普滿禪院在忠孝鄉孝義里舊名報國禪院唐咸通六年建大中祥符元年十月敇改建初寺在忠孝鄉孝義里舊名崇法寺唐咸通九年建國朝開寶九年改賜新經云大中祥符元年十一月改賜與祥符經不同新屯寺在黎陽鄉合陽里唐貞觀十年建新經天祐三年十二月建與祥符經不同齊祈寺在和睦鄉太清里唐㑹昌中建石橋院在履仁鄉太平里唐元和五年建先是刺史韋綬夢僧來謁曰能相記否綬不省僧言昔與公同修證今為二千石遽忘我耶綬問所居曰在公部下休寧之石橋巖旦問左右無知者索圖經閲之巖在縣西六十里有石室講堂佛像遣視信然乃建精舍㑹僧元立以游方來問所須願住此巖是為開山第一世護國仁王院在良安鄉萬安里唐咸通八年建星州院在嘉善鄉睦親里唐咸通中建新經貞觀十年二月建吳山院在良安鄉羣賢里唐天祐七年建蜜多院在履仁鄉太平里唐乾符元年建陽山院在忠孝鄉懷義里唐天祐七年建燒香院在萬安鄉長汀里唐咸通十四年建方興寺在和睦鄉方溪里唐貞觀十年建修善尼寺在忠孝鄉良安里唐貞觀十年建嘉祥尼寺在忠孝鄉宣化里唐光化二年建賢宰劉曇淨字元光彭城莒人父慧鏡以孝聞曇淨篤行有父風解褐梁安成王國左常侍父卒奔喪不食飲者纍曰絶而復蘇哭輒嘔血服闋因以成疾㑹有詔薦四科叔父慧斐薦以應孝行武帝用為海寧令曇淨以兄未為縣因以讓乃除西安行參軍吕大防字微仲京兆人治平三年以太常博士謫知縣事先是大防為監察御史裏行與侍御史知雜吕誨侍御史范純仁等言參知政事歐陽修首倡濮議而宰相韓琦等附㑹皆當黜未報因各納補官告牒家居待罪帝命閣門以告牒還之又令中書降劄子趣使赴臺供職誨等繳還劄子并前後所奏九狀申中書堅辭臺職至二月十四日帝閲誨等奏問執政當如何韓琦對曰臣等忠邪唯陛下所察歐陽修曰御史以為理難並立若臣等有罪即留御史若以臣等為無罪則取聖裁帝猶豫久之乃令出誨等曰不宜責之太重也於是誨降知蘄州純仁通判安州大防有是命元祐中為首相葛勝仲字魯卿丹陽人大觀初由禮部員外郎議禮忤權貴出知縣事勤恤民隱奬進士類識金公安節於童幼使與諸子偕學卒顯當世勝仲後為大司成諡文康至紹興中南蘭陵陳之茂阜鄉為尉邑人爭從講學乃相率出錢建庠校以其贏買書千卷之茂日至為諸生講說其成就子弟多顯名為逹官邑由此益多學者自二公發之之茂又勸民甃縣市內外數里城而不擾官至尚書祁門沿革祁門望縣本黟縣地縣西南有兩巨石夾溪相對號閶門而東北有涌流左右雲峰削成其中平坦周回數頃唐永泰元年土人方清作亂新唐書云蘇州亳土人方清因歲凶為盜依黟歙間東南厭苦詔李光弼分兵討平之或云亳土人或云蘇州豪土皆誤也屯石埭城因權立閶門縣以守之至明年平方清因其壘析黟縣之六鄉及饒州浮梁縣地置以為縣合祁山閶門名之曰祁門在唐為中下縣本朝為望縣境縣在郡西百八十里其境東西廣長百四十五里南北百五十五里東至黟縣界五十里南至浮梁界九十五里西至浮梁界九十里北至池州石埭界六十里東南到浮梁界百四十里西南到浮梁界百八十五里東北到石埭界百一十里西北到石埭界一百有五里鄉都其鄉七其都二十有三製錦鄉在西南其都和光遐岑日新安福歸化鄉在東其都歸仁義成沙溪武山鄉在南其都化成尤昌福廣鄉在北其都萬石泉水善和孝上鄉在西其都文溪順定儒教仙桂上下鄉在西上鄉其都晝錦新豐下鄉南塘安定而安福尤昌善和儒教四都又各分上下凡二十有三户口天禧中主户五千六百一十七口七千八百六十三客户三百有四口四百二十六未經界户二萬五千九百有七經界萬二千二百三十三乾道主户萬一千五百七十五客户三千九百六十一田畝田園祖額十九萬九千五百六十三畝三十八步半經界為七十萬有竒今為七十一萬七千六百三十六畝二角六步塘二百三十七處堨九百七十五處租稅夏稅紬三百二十二匹六尺絹三千二百五十四匹八寸綿七千九十九兩小麥二斗七升錢四千九百四十九貫七十四文秋稅糙米萬五千三百七十四石三斗五升五合鹽錢五百六十一貫三百一十一文租課熟米三斗一升黑豆六斗和買紬千九百八十八匹絹五千五百一十二匹酒稅酒以紹興九年為額萬一千八百三十一貫六百四十七文商稅熙寧十年二千九百八十八貫八百八十七文今以紹興十三年為額一千八百三貫五百九十文城社縣城周五里百四十七步坊曰遷善崇賢豐化升俊社在縣西先聖廟在縣南官廨縣㕔在城東北隅丞㕔在西主簿尉㕔在西北監務㕔在西常平倉在縣㕔南省倉在西北酒務在西南鎮場大共鎮在縣北紹興二十三年正月例罷收稅坊場一處河渡無館驛祁山驛在城內文溪驛在西六十里舊名大北驛道路驛路三東通黟縣西通浮梁北通石埭界小路一南通浮梁界百二十里山阜祁山在縣東北一里髙四十仞周二十五里三靣皆石壁中有石室髙五丈廣二丈名青蘿巖亦曰棲真巖旁有涌泉號乳泉味甘山西半壁昔有石丈餘墜溪中墜處有龍骨存焉大共山在縣北五十里髙六十仞與寧國府太平縣分界厯山在縣西八十五里髙二百五十仞北接池州石埭界絶頂有池中有石焉北有管公明仙壇舉根山在縣西七十里髙九十仞梅南山在縣西南七十里髙八十仞與浮梁縣分界水入饒州主簿山在縣西六十里髙四十五仞西南接浮梁界方輿記云昔有黟縣主簿巡厯到此愛其幽竒遂解印隱居終身不返新安山在縣西九十里髙四十仞三新婦山在東北二十里髙四十仞周二十六里方輿記云有三石峰望之如人每春雨初晴霞翠明媚則若彩服靚妝之飾道人山在縣北十五里髙九十仞周二十九里半壁有巖巖前有池昔有學仙者居之赤嶺在縣北百二十里髙三十仞周十五里北屬池州石埭縣舊名血嶺唐刺史馮宿改焉祥符經云赤嶺下有大溪昔人為梁取魚魚不得下遂夜飛越嶺而去人復於嶺上張網其飛不過者皆化為石遇雨則赤故謂之赤嶺而浮梁縣亦因此得名吳都賦所謂文鰩夜飛而觸綸蓋此類云武陵嶺在縣西四十里髙三十五仞周二十八里始時道險狹捫蘿葛乃得上唐元和中鑿為盤道至今利之五峰巖在東北十里昔有韓氏子坐禪於此常降乳虎水源大共水出大共山南流八十里溉田五頃三十畝西南流百二十里入浮梁界大北水出歷山東流五十八里合大共水溉田十七頃十七畝小北水出舉根山東流五十里溉田二十頃西入浮梁界盧溪水出梅南山屈流三十七里合大共水溉田八十頃新安水出新安山西流三十三里溉田五頃三十一畝入浮梁界武亭水出武亭山南流四十五里合大共水溉田八頃四十畝入浮梁界義城水出玉嶺東入沂竹坑溉田二頃二十畝赤溪水出魚亭山西流五十里合大共水溉田十二頃八十畝鱅溪水出武陵山西南流六十里入鱅口合大共水溉田一頃閶門灘在縣南十三里衆水所注夾灘有大石對踴故號閶門自餘怪石叢峙迅川奔注摧艫碎舳十嘗七八經唐世兩賢令路旻陳甘節疏導乃為安流懸雲灘在西南十五里奔浪洑流為艱險之最古跡梅鋗城在縣西十五里沛公攻南陽遇吳芮之將梅鋗與偕攻析酈降之項羽相王以芮率百越佐諸侯封為衡山王都邾其將梅鋗功多封十萬户即此也祠廟城隍廟在縣城西吳長史祠堂在縣東三里唐吳仁歡始因以置縣者也范不婁廟在縣西八十里方輿記云南朝鄱陽尉范不婁領數百人斫明堂木於吳山中木長數百尺川谷阻深不可出懼而據山作亂竟死於此斯亦不足祭已厯山廟在厯山下祥符經云昔管公明學道於此疑後人為立廟厯口廟在縣西鱅口廟在縣南道人山主者廟在縣北並未詳道觀洞元觀在祁山之前相傳梅鋗故宅今民間所祭明府著古冠服旁為垂髫女子言鋗女得仙號梅娘云唐大厯中置觀名龍禪太平興國九年敇改通𤣥今為洞元僧寺悟法寺在製錦鄉舊名萬安寺唐咸通二年建相傳是梅鋗墓今人猶指殿後磚甓為其處寺前有修徑徑外淺水水外髙林過者多謂似天竺山靈隱寺前崇法禪院在縣城內舊名西林水陸院南唐時置太平興國五年十月敕改珠溪夀聖院在福廣鄉舊名珠溪資福院唐光化二年建大中祥符三年敇改有唐時謙禪師塔五六十年前嘗遷之骨身宛然忠國顯親下院在福廣鄉舊名霄溪資聖院唐乾寧三年置大中祥符八年敇改永恩建炎初改今名廣福寶林禪院在仙柱上鄉唐末有僧清素自言從五臺來眉目端秀髮覆額俶儻多異時縣人鄭傳保據號司徒師造其壘求安禪之地傳為言自紫溪入西峰有地數畞無人跡古木清秀澗中有洞穴神龍居之其旁可以安禪師曰吾今夕當飛錫往觀之傳館之於樓扃鐍嚴甚比夜半失之及明寢自若也謂傳曰吾已用錫表其處坤山而壬首自此以往者涉溪三十六度嶺二十四傳使人視之壠上新有行跡他皆如其言大敬異之為築室百餘間白刺史陶雅請於楊氏號上元寶林禪院開壇度僧時光化二年也傳嘗以久旱結采為樓從師求雨師表竹於樓之四隅曰雨於竹外已而果然揚州旱令屬郡遍禱羣祀雅夢偉人自稱汪王為雅言師乃水晶宫菩薩也有五龍可往求之乃請師師曰吾已遣施雨揚州三晝夜矣楊氏封禪大德住山十七年聚僧數百人一旦盡散其衆而逝其骨身在今塔下始師嘗作歌偈有文殊遣我來之語元豐三年賜號慧應大師饒州亦奏請賜神慧禪師紹興十三年八月加神慧永濟禪師先是楊氏遺師紫衣不受求錦襖著之每往還池陽有馮姥者見常迎勞為設酒乃脫襖為贈使遇禱雨暘出而浴之并錫杖鐡笛戒牒皆見存而院以熙寧二年改夀聖寶林隆興間凡夀聖例改廣福云青蘿院在福廣鄉青蘿巖之下唐大厯二年建大觀中僧道清好為禪自以住山不能出乃私榜其院為禪院每使其徒出旁近招僧之遊能為禪者使挂鉢於此卒年九十餘院有辟支佛舍利塔厯口資福院在孝上鄉唐咸通二年建石門禪院在製錦鄉唐光化二年建靈泉院在福廣鄉泉水里唐乾寧三年建崇福院在仙桂上鄉唐咸通二年建吉祥院在仙桂上鄉唐龍紀元年建普安院在仙桂上鄉舊名永安唐咸通二年建熙寧三年六月敇改橫山尼寺在製錦鄉唐咸通六年建東松菴在縣西三十五里官道上先是地當往來之衝而邸舍遼逺暮行兩山間過者患之悟法寺僧子珣少游四方嘗參雲居心印禪師逮老而歸乃當官道為廬舍數十間設薦榻持薪水蔬米以勞迎四方之來者至則如歸時熙寧間也士大夫多為詩美之元豐中王荆公以江東提刑過此止宿亦留詩刻山中其後汪丞相以布衣去鄉里及為少傅仗節歸作詩曰萬夫屹立若臨衝四十年前謁上峰名遂歸來人物改青青惟有歲寒松珣浮梁朱氏子以試經得度晚益精進晝夜坐禪間則誦經尤好為西江月詞誦法華滿二萬過有蓮華生座下以足跳去之年八十一其徒永淨繼之繼淨者應升縣人尤善遇客住菴二十餘年整葺殆遍今年七十餘碑碣新路記在縣南十三里古堤上唐刺史范傳正詞今亡賢宰吳仁歡縣人方清之亂仁歡率衆破賊刺史公孫綽上其事代宗嘉之因置祁門縣授仁歡朝散大夫石州刺史賜金紫旋拜本縣令殁葬縣西二十里路旻不知何郡人元和中為令鑿武陵嶺石為盤道又閶門灘善覆舟旻開斗門以平其隘號路公溪後斗門廢咸通三年令陳甘節以俸募民冗石積水為橫梁因山𣲖渠餘波入于乾溪舟行乃安新安志卷四
