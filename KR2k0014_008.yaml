body:
  text: 新安志巻八宋羅願撰叙進士題名國家懲五季之餘學校不修招選道缺悍夫庸卒攘臂而議於世於是藝祖受命首幸太學思用儒相以風厲天下列聖繼之闢館閣崇科目君臣拱挹論説唐虞先是學者患書籍散佚乃即師弟子所聚曰書院者賜以九經并釋文之屬又詔齎七經疏義并三史於杭州摹𫝊之而後家始有書開天章閣召政事之臣議興太平而後郡始有學置師弟子員或即用其郡之人使為教授而後士始有師又下湖學原闕四字取安定先生條約施之太學著為令而後學始有法承平既久豪傑命世之士興於其間以通經學古救時行道者倡率之道揆明於上儒俗成於下則士益思顯於世然設科賜第列聖所重太平興國中鎖㕔人有顔明逺劉昌言張觀樂史上惜科第不與止授掌書記又五嵗至雍熙二年始令樂史附第一等是以預其選者為世歆羨賢者欲行其義而中人樂就其名以至於今方來者益衆世之説者見其如此以為天下之士捨此固無所用其身不知其始之勸奬成就百年必世如此之難也新安自國初貢士之數蓋少至嘉祐祫饗詔增歙饒州共四人而亦不顯每州所貢之數然異時四方士俗爵位相先游學在外者往往即貫其籍以試如洪湛以江寧呂溱以揚州之類是也崇寧行三舍法貢七人宣和五年復進士科以十人為額紹興二十六年詔罷西北流寓試併入土著視解額最少處參以前榜終場人數率百人解一人而郡終場者千一百有十八人於是稍增解額為十二人而近嵗士益多毋慮二千人云自乾符二年有制科天聖中設武科郡亦頗有其人又有銓試優等獻頌賜第樂成釋褐及以獻策賜官之屬其累貢不第者又有特奏名進士前後皆題其名立之學更三賢守黄公誥汪公藻洪公适為次續之自紹興二年以後官以左右冠銜則特奏名進士始不列不可復得輙因碑所載更訂之附於志太平興國五年蘇易簡榜前二十三名竝通判賜宴迎春苑張秉歙第二人樞密直學士禮部侍郎謝泌歙右諌議大夫雍熙二年梁顥榜初得梁顥以下百七十九人後三日再放洪湛以下七十六人湛文采遒麗特升第三人洪湛休寧比部員外郎從孫中孚端拱元年程宿榜查道休寧第十一人咸平四年試賢良方正能直言極諌科第一人待制二年陳堯叟榜賜御製箴舒雄歙正郎李照俞獻可歙龍圗閣待制弟獻卿子希甫希孟從孫師錫曽孫正圖淳化三年孫何榜印賜儒行篇查拱之休寧許南史祁門轉運使咸平二年孫暨榜俞獻卿刑部侍郎子希元希旦孫叔良呂士元歙明經秦州隴城令子淵溱三年陳堯咨榜聶致堯歙贈禮部尚書子冠卿世卿孫武仲曽孫循矩方仲詢程賓王景徳二年李廸榜前三名用一節呵導餘人雙控馬首遇常參官斂馬側立特奏名五舉以上及曽經御試六十二人賜同進士出身閔惟慶歙屯田員外郎子從周曾孫師文洪融特奏名五舉御試賜第大中祥符元年姚曄榜廷賜袍笏方溥方仲弓五年徐奭榜官給印紙起草并摹印御題賜之俞希甫和州推官聶冠卿翰林侍講學士許俞黟知大冶縣按孝行録祥符七年登第而進士登科記無之似是明經也天禧二年王整榜汪震婺源司封郎中子宗顔孫榖曽孫藻元孫愷六世孫鴻舉魏平仲天聖五年王堯臣榜閔從周歙都官郎中孫師文聶世卿太常少卿呂淵弟溱丘濬黟殿中丞八年王拱辰榜賜大學篇自後與中庸間賜孫扶黟孫揆黟都官員外郎景祐元年張唐卿榜喻琳績溪歸姓葛職方員外郎曹矩休寧都官郎中奚舜卿黟俞希元張僉寳元元年呂溱榜第一人將作監丞呂溱禮部侍郎孫抗黟甲科工部郎中廣西轉運使子適迪遇孫畧俞希孟殿中侍御史孫正圖汪信臣婺源汪澄婺源程珪特奏名程説特奏名慶厯二年楊寘榜馮式祁門員外郎張蒼舒婺源朝請郎孫挺黟太常博士胡遇汪宗顔都官員外郎贈中大夫子榖孫藻曽孫愷元孫鴻舉董安六年賈黯榜孫適汪師道婺源職方員外郎孫僎皇祐元年馮京榜舒介夫黟著作郎二年許元以發運使稱職特賜出身五年鄭獬榜聶武仲姪循矩王汝舟婺源朝散大夫䕫州路提刑胡宏績溪姪舜陟舜舉汪榖奉議郎子藻孫愷曽孫鴻舉汪師熊婺源嘉祐二年章衡榜先達題名碑汪伋下有孫迪按孫抗之子迪在熙寧三年葉祖洽榜中此榜孫迪自邵武人王淑績溪胡彭年婺源汪汲績溪奉議郎子奕襄孫安世安行四年劉煇榜俞叔良甲科壽春尉六年王俊民榜俞希旦朝議大夫贈金紫光禄大夫治平二年彭汝礪榜張逢婺源四年許安世榜俞師錫朝奉大夫汪適正婺源熙寧三年葉祖洽榜孫遇孫迪汪茂婺源特奏名六年余中榜孫冲黟宣徳郎汪鴻祁門陳綣特奏名九年徐鐸榜賜官錢印小録舒升中黟元豐二年時彦榜方劭婺源宣徳郎孫适子畧洪中孚休寧禮部尚書龍圖閣待制弟中和胡安節婺源江霖黟以下特奏名奚戭黟宣義郎五年黄裳榜程書言祁門宣徳郎聶循矩胡鋐婺源俞易直歙奉議郎以下特奏名鮑天一八年焦蹈榜舒彦中黟弟夷中姪賓王俞應之婺源朝散大夫呉鑑休寧以下特奏名孫逖黟奚羣黟鄧醇歙奚紳黟曹曄黟子文姪夬及元祐三年李常寧榜金天受休寧提刑六年馬涓榜汪奕宣教郎知徳興縣子安世程望之婺源特奏名張大亨婺源紹聖元年畢漸榜王悰婺源改名愈秘閣修撰從兄慥黄徳明黟程詵績溪特奏名滕申婺源胡紹婺源封中奉大夫子伋伸弟之子侔四年何昌言榜罷詩賦舒夷中胡伋金部郎中弟伸從弟侔胡伸國子司業汪路婺源承議郎知貴溪縣子利往王舜舉祁門直秘閣提舉弟舜中奚知常黟王慥奉議郎孫畧汪愷朝請大夫元符三年李釜榜黄天衢祁門程邁黟顯謨閣直學士姪楫之姪孫叔達凌唐佐休寧南京留守贈待制方洙婺源周穗婺源汪舜昭黟呉源祁門李權黟王汝賢婺源特奏名方勃婺源崇寧二年霍端友榜汪藻翰林學士贈端明殿學士胡侔以上係龍飛第一甲竝從事郎職官改名侃朝散大夫胡剛中祁門朝散大夫孫汝器汪次言婺源余黨婺源汪伯彦祁門建炎宰相曹夬本州通判弟及從弟文汪滋績溪特奏名三年貢士鄭南榜江致平婺源正字五年蔡薿榜汪天鱗績溪王舜中廣州通判曹文閔師文南安軍通判崔耀卿歙朝奉大夫余器婺源汪叔詹歙司農少卿朝請大夫子若海葛致績溪特奏名大觀二年貢士王俁榜何昂休寧朝奉大夫三年賈安宅榜汪希旦歙朝請大夫虞部郎中直秘閣呉敦復休寧胡舜陟徽猷閣待制大中大夫弟舜舉康澤民祁門武舉張洪婺源此以後特奏名胡多聞祁門承奉郎蘇侯祁門張坦歙洪中和政和元年黄葆光黟銓試優等賜第侍御史二年莫儔榜盧臣忠黟左正言余采歙汪發婺源胡汝明黟殿中侍御史羅汝楫歙吏部尚書龍圖閣學士子願孫似臣唐咨黟李莘黟汪廷直婺源類試省元屯田員外郎胡銓婺源胡良祁門特奏名汪臨婺源四年洪子陽免省學録樂成賜第江琳同上子致平程嘉量休寧獻頌五年何㮚榜汪襄奉議郎主管亳州明道宫子安行楚衞歙復州儀曹胡天矜婺源汪芑婺源俞正圖汪掀婺源鮑安世武舉俞斌顯婺源武舉黄理黟武舉汪思婺源特奏名程協祁門周知和祁門八年嘉王榜胡醇文林郎知沅陵縣周隠歙王建婺源葉上達祁門朝請大夫朱松婺源吏部郎中子熹胡昂宣和三年何渙榜舒賔王梅居實歙湖南提舉六年沈晦榜余賔興婺源池州通判兄赫汪利和婺源朝奉郎王昺婺源正郎知吉州子允恭金安節休寧吏部尚書敷文閣學士宋廓休寧教授姪松年王筠婺源曹及傅源祁門汪處厚婺源建炎元年汪若海國學貢士獻策朝散大夫直秘閣知江州二年李易榜汪僎黄汝能黟秀州通判韓邦光婺源文林郎知安福縣胡舜舉朝請大夫知南劍州張穎婺源弟碩汪杞汪利往紹興二年張九成榜復詩賦汪臯會黟奉議郎汪勃黟簽書樞密院端明殿學士孫義榮義端胡溢婺源承議郎程楫之濠州通判五年汪應辰榜賜御書中庸縢愷婺源司户張敦實婺源朝散郎樞密院檢詳諸房文字兼皇子慶王府贊讀兄敦頥汪廓婺源余赫汪若容歙將作監丞朝奉郎弟若思子洪汪冠卿黟建昌軍通判孫及歙通直郎余康乂婺源胡表東婺源汪逌婺源子祴余豳婺源八年黄公度榜宋松年承議郎汪彦中奉議郎張敦頤黄士龍黟十二年陳誠之榜汪俁祁門教授汪若思秘書丞朝議郎王允恭呉授姪孫俯偁程叔達十五年劉章榜復聞喜宴汪安仁婺源程九萬婺源汪安世占州永豐簿李綺婺源從政郎福州教授十八年王佐榜鄭之純歙徳興尉汪端彦婺源朱熹婺源俞舜凱歙特奏名第一人教授二十一年趙逵榜程大昌休寧黄時伸婺源李多文祁門朱安國休寧陳王業祁門宣徳郎胡摶婺源承議郎知吉州豐永縣弟持二十四年張孝祥榜汪逺猷休寧太學正宣教郎從弟泳汪安行績溪知澧祝華婺源陳孚先休寧李知巳婺源兄炳汪祴二十七年王十朋榜呉偁鄭顯文歙靖州教授程説休寧張碩康景傑祁門三十年梁克家榜胡俊傑祁門汪鴻舉金端臣休寧臨安府録事㕘軍三十二年李炳上舍釋褐嚴州教授隆興元年木待問榜胡持方有開歙江介婺源呉天驥休寧曹熙休寕朱晞顔休寧乾道二年蕭國梁榜祝浩婺源龍飛榜第二甲從事郎職官呉俯太學録羅願歙朝奉郎知鄂州姪似臣從姪孫南仲黄何休寧胡汝器五年鄭僑榜汪義端第三人兄義榮王炎婺源章元崇歙方恬歙省元詹洙婺源張震歙呉箕休寧從兄師禮呉師禮汪義榮汪泳八年黄定榜賜御書益稷陳篆休寧汪洪淳熙二年詹騤榜汪必達黟弟必進胡思誠績溪汪必進許詢堯祁門省試第六呉從龍休寧呉發歙李思中汪廷直休寕姪澧髙昌孝休寕汪澧休寕吳上元何國于正倫許彦逺黟季曰思歙叙義民夫名之所謂君子者豈有常哉義之所在焉而已已誠嚮義則人操名以從之一為不義則人操名以去之而世之學士大夫得此名者常多以其講學明而趨操定宜不陷於不義為足以當此然其間固有操名而去之者甚可懼也至於閭閻之人先王之所以望之者有不若學士大夫之詳然不敢忽也自霸者齊威之徒民猶勉於為善與其為善於鄉不如為善於里與其為善於里不如為善於家是以匹夫有善可得而選至漢氏猶有孝弟力田之科而鄉善三老率衆為善與縣令丞尉以事相教後世為治益簡吏與民益疎凡吏之所施設者皆非教民之具必待其刲肝股致祥異幸而吏又以為意然後得與於表閭賜帛之寵至於謹身强力率妻子治田桑以奉事其親聯其兄弟而睦其族黨者上之所望於下在此矣而有司以其無顯異不復言大率老死而無聞是所勸者不可常而可常者勸有所不及也夫置小星之人所以見録於二南萬世𫝊頌者特以其施之中林無人之中而不忘敬則以為好徳知賤之服役於貴而不敢肆則以為知命如是而已耳豈若後世之云者哉然民生後世循性而動乃亦有自然過絶於人者雖不必合中道要其心主於為義以此知十室之邑必有忠信而人之性善可以為堯舜信矣誠令世之長民者視其人以三代之民而教之以三代之物察之以三代之法其不為三代之俗者則寡矣自黄芮以孝書唐史其後篤行之民因事偶見者僅數人類而録之毋使其無𫝊焉黄芮黄芮歙縣人事親以孝聞唐建中初繼母洪氏疾病芮刲股饋羮而愈貞元中父卒廬墓號泣晝夜不絶聲遂終身不捨去墓側産芝十四本木連理者四刺史盧公上其事詔旌表門閭今縣西九里黄屯村是其居處也始因宼盜黄氏之先與其族人聚徒屯此故名黄屯芮太和五年卒章氏二女章氏二女者歙縣人章頂之女也母程氏與二女登山採桑為虎所攫二女號呼搏虎虎遂棄去母由是獲免刺史劉贊嘉之蠲其户税改所居合陽鄉為孝女鄉以表之觀察使韓滉因是奏贊治有異行詔褒遷焉新唐書但云㓜女搏虎又無姓名而祥符經載其父母姓氏特備且云二女俱搏虎今縣南陳村山上有大姑小姑廟云又城陽山下有孝子廟不得其姓名汪廷羙汪廷美婺源人孝友純至義居數十年聚族四百口旦暮食必同席有未至者不敢先廷羙節嗜欲身衣繒布非因祭不食肉親喪盡哀不應賔客遇忌則終月齋肅祥符中東封赦減天下賦十之二廷美亦減其佃者租十之二乾興頒遺詔衰絰號慕營佛齋者七日幼為鄉官人嘗賀以一縑後悔倍償之嘗以秋冬賑糶或勸須春廷美曰家欲蓄藏待價貧人乏食於爾安乎逺賈有鬻香者去後發其裹得金追而還之嘗使兄弟子鬻縑帛進賢界中買銀數百兩以歸廷美察其贗不復言他日袖而棄之淵里人或竊其鵝問之曰夏至將以祭先廷美曰彼貧乃有孝心助以魚酒又有從質麥種十石者過期遇之紿言種敗無所收廷美還其質更遺麥三石以償其費性不嗜殺牛罷老不堪用者終飼養之子姪諸孫有過未嘗形言但訓以自昔興替之家嘗有抵辠匿者吏以為當坐家長廷美時年六十九或言稱七十宜免廷美曰吾已失訓又增年以免罪是誣官也不可會有赦遂免郡守欲奏表門閭力辭見聽時號汪長者將終徧為書别親舊翌日而卒年八十九慶厯中知縣秘書丞蔡巽摭其事刻之石後三十年知縣劉定又表處士王徳聰以為孝友信義至孫汝舟顯於時葉氏女葉氏女者歙縣人親没鞠於叔父母叔父為衙前吏坐逋官錢五十萬繫獄女以香置頂自灼從昏達旦中夜獄官夢帝命使審其獄果前界吏所負其後叔母有疾晝夜拜叩有光曄然刲股進之遂愈卒皆制喪三年女自幼不願嫁至是於舍後即山為菴廬所事像設忽左右生兩竹旦旦有甘露降竹上太守黄誥為詩序以為唐世列女五人或報父仇代弟死或廬墓終身或父兄戰死縁邊䕶喪凛然與烈夫哲士爭不朽名若葉女者何遽不及至其養心治氣深達性命之理優游自得疑若過之其見重如此好佛法每誦經有大蛇下聽嘗以偈示小本本以為演暢天然云時有鄭姑亦自幼修鍊兩人相遇語歡甚人竊聽之輙為猥下之語聞者往往捨去預自營宂甓皆作九龜將終西向右脇臥兄子請曰姑自幼重修今不跏趺無以厭人望女笑崛起端坐而逝又嘗語其㛐必母焚我其家竟以僧禮焚之舌不壊有骨綴舍利無數年八十一墓在縣治側葉氏世柔循為親刲肝股者前後五人又紹興中休寧陳克已母有疾女刲股婦繼之克已又刲其肝母疾尋已内翰汪公欲奏之幕官有不同者乃止詹惠明詹惠明婺源人小名念一父直紹興中坐鬭殺鄰人妻阿姚惠明年二十二知父必死詣里正及縣求代皆不許縣以獄上惠明隨至郡乃手為牒自言無以報罔極之恩幸有二弟可以養母乞以身代父死齧指出血詞甚哀至太守曾公開告以在法無代哭掩面而出五訴不見省方盛夏坐府門外以火艾自灼其頂且數十壯曽公自外禱雨還見而憐之使以狀來母特自苦明日至廷下公方閲狀忽割右耳擲聽事上血淋漓左右皆大驚公竟為奏八年五月報下詔減其父死而釋惠明始惠明繫獄待報父見之罵曰吾年已老殺人償死自其分爾有妻子不歸視來此何為惠明終無言至是引出官吏紿以得請擁入市無悔色呼曰養子待老積粟防饑代父償死萬世留名至市曹始宣恩㫖縱之人皆伏其誠曽公又按令及赦文孝子順孫事狀著者許以聞乃奏以為惠明事與漢緹縈相類願於本鄉錫美名仍量賜粟帛庶㡬使人知犯法者雖有罪而為善者必加賞不以父之有罪而掩子之為善於以風示四方在孝治之朝誠非小補事下禮部及太常檢照禮書無故事唯國朝會要太平興國七年九月深州陸澤民嚴昭男承留年十六詣闕進狀乞代父死先是縣所由張重進詣昭督税因而鬭詈昭毆重進死法償其命故承留請焉太宗義之免父死而役於州仍賜錢一萬俾助瘞重進尸一本云邢超子神留年十六詣闕上書願代父死詔以減死論仍賜重進萬錢為棺斂具二説微異雖有故事而情犯不同禮部以太常所申難以引用乞下本州依赦令常加存恤從之郡乃給賜錢三萬帛二疋米二石明年縣改所居嘉福里為孝悌里板書其事揭之門後四年父母相繼卒既葬乃委妻子出游更名惠明以修治橋梁道路為事至今猶存叙仙釋學者多疑於鬼神然言有物又云世無仙特有隠君子至漢劉向乃取古之隠者務光彭祖老𣆀楚狂接輿之屬皆論以為列仙豈古之仙者不欲自異而特欲以出處之迹衆所知者見於世耶君子之於仁固靜而壽其靜者疑於隠其壽者世則以為仙特所從名之異耳要以盡人之性則氣志昌大而神不散越有决不與萬物俱泯没者此在吾術中矣考之前世𫝊此者皆祖黄帝老子至秦猶以博士領其方而號其人為列仙之儒明猶有所本非若後世夸者之𫝊也由漢以後又有浮屠氏之説乃更以一死生為務其道要使人决擇以發明其固有則死之與生惟其所遇而無益損乎其真是以蕩然肆志無怵惕乎胷中又豈所謂朝聞道夕死可矣者非耶自唐書始列神秀於𫝊至國朝景徳中詔纂其源流為景徳𫝊燈録此其人皆著見於世不可揜矣若吾州許宣平之操真古所謂隠君子者人特以其後裔為嘗有見之者而著之仙自餘二家學者併及醫卜皆以次列之覽者擇焉而已矣方儲方儲字聖公歙縣人後漢時歴句章長郡五官掾母喪負土成墳種松栢嘉木數千本致鸞鶴白之瑞後對策天下第一拜洛陽令夜輙還寢室向曉而去不動户樞嘗遺隻履於牖下母命藏去章帝以儲善天文當郊祭問之儲勸帝母往其日風景明淑帝遂行儲稱疾不從比發雨雹如斗死者千計使召儲已死帝甚傷之喪至家母啟視之無尸唯有隻履因取前履合之良是宋明帝嘗祠以太牢追封龍驤將軍黟縣侯按嚴州圖經唐左臺監察御史張行成撰方仙翁廟碑稱儲兄儕關内侯行南郡太守弟儼忠烈太守丹陽五官雲麾將軍又載儲所歴官及言駕鶴乘空等多舛不可據今秖從祥符經載其畧許宣平許宣平歙縣人唐景雲中隠於城陽山南塢絶粒不食顔如四十許人行及奔馬時負薪入城賣之擔上挂花瓢及曲竹杖醉歸獨吟曰負薪朝出賣沽酒日西歸借問家何處穿雲入翠微每拯人艱危救其疾苦訪之多不見唯壁有詩云隠居三十載築室南山巔靜夜翫明月閑朝飲碧泉樵人歌壠上谷鳥戲嵓前樂矣不知老都忘甲子年好事者題之於洛陽同華𫝊舍間天寳中李白自翰林出覽之曰此仙人詩也乃游新安渉谿登山累訪不獲題其菴云我吟𫝊舍詩來訪真人居煙嶺迷髙跡雲林隔太虚窺庭但蕭索倚杖空躊躇應化遼天鶴歸當千載餘是冬野火燎其菴不復知所在後百餘嵗至咸通七年郡人許明奴家有嫗入樵南山有人坐石上食桃甚大謂嫗曰我明奴祖也嫗言嘗聞仙翁已得仙多年宣平言爾歸為我語明奴我常在此山中乃與嫗一桃食之而美嫗自是増食顔童體輕中和後兵荒相繼明奴徙家避難嫗入山不歸後人時有見之者身衣藤葉行疾如飛逐之升林木而去聶師道聶師道字宗微歙縣人少入老子法中事道士於方外後得内𫝊服松脂法乃與同志登績溪百丈山採芝夜半峰頂月明有天樂起東南紫雲中久之聲益近至石金山少止兩山相距三十里然頂上相望纔咫尺少時歉小鼓復通奏笙簫金石絃匏以拍節大鼓其首清揚不類人世至雞鳴止山下居人是夕皆聞之同行者歎曰方採靈藥而所聞如此此亦君得道之證也後泊南嶽招仙觀聞蔡真人舊隠去洞靈源不逺山中時有見之者廼辟榖七日獨往日暮有樵者坐谿上告以蔡君所居深逺不可到東有人家可宿樵者因凌水而渡師道目送之東行見草舍籬落主人類農者年可三十許問適見樵者否此蔡道者也因投宿啟黄甆合得茶飲之絶佳明旦行有老父問所從來謂曰蔡君父子偕隠此山昨昔所宿即其子也折草長尺餘形似薑苗師道咀之而甘因使取水遂失所在自是益精健還觀已月餘日乃知彭真人亦嘗隠此山也後歸鄉里每入山虎豹遇之皆弭耳馴伏拊之乃起或以所採薪藥令負還以故歙之近山頗有猛獸而不為害後將復往南嶽聞漢梅福梁蕭子雲皆隠玉笥山中乃三游郁木坑見丈夫布衣烏㡌年若五十許人相問勞已謂曰子宿業已淨應有名玉籍雖未即飛升當亦度世我謝修通也本居南嶽與彭蔡偕隠已三百餘年知子嘗遊洞靈源吾適為東華君命主玉笥山地仙兼掌清虚觀墳土祀今子與吾宿有分故得相見然梅蕭日中為小有天主所召恐未便還非可待也師道跪謝之同行數里忽有草舍新潔命師道坐木馬上已坐白石鹿上俄有丱角以湯飲師道神氣灑然修通指架上素書令抽取一巻曰習之當得道我有弟子紫芝在九疑山往見之𫝊我語必為子盡其㫖矣儻不見者第投書於毛女溪上洞中且題石壁致吾意言訖忽不見師道已在郁木坑外蓋七日矣素書言西王母理化衆仙之要然不可盡解遂至九疑訪紫芝或言毛女溪有一隠者莫知其名人或見之師道累求不獲乃投書題石後嘗夢神人稱紫芝告以疑義嵗餘還山房田頵圍新安師道白太守裴樞夜縋見頵頵為斂兵又為請陶雅為守楊氏據有江淮召至廣陵建真元宫處之使為人祈福號問政先生一旦謂弟子曰我為仙官所召言訖而逝比斂棺有聲視之若蟬蜕然因就葬之數日有自豫章來者言見之於道以一小童自隨云離南嶽多年今當暫往耳所至多宿舊遊觀宇半年後又有見之於衡陽者云歸洞源矣後二十年問政故居之上數有雲鶴盤旋衆請於楊氏發所藏衣冠歸葬自揚至歙千餘里其上常有雲氣兼鳴鶴翔導至山三日而散楊氏加贈銀青光禄大夫鴻臚卿從孫紹元聶紹元紹元字伯初母程氏始孕便畏葷夢天人指其腹曰此子當證道果長好文史尤精𤣥學嘗詣金陵受戒籙是夜夢入一城官府嚴肅中有朱衣者凭几謂紹元曰此司禄之所也可自閲籍籍上圗形旁題云聶紹元十八入道二十授上清華壇二十六往南嶽遂掩巻而寤久之還問政山築室號草堂事母勤瘁不交流俗自號無名子世多以鍊師稱之忽晨起沐浴戒家人以伯祖有訓宜世勤修鍊母忘太上教俄有四鶴集於屋有光自空而下逺望疑以為火至則無他而紹元已化矣先一夕告母曰胡將軍至可備酒菓至是若有就坐者詰旦僕夫自外入云鍊師與三道士衣朱緑乘馬武士冠帶從者數輩燁然南去鍊師回首語之曰吾往南嶽矣最後一人云為語宅中謝貽我酒菓嘗撰宗性論修真秘㫖各一篇學士徐鉉及弟鍇稱之曰呉筠施肩吾不能過也丘濬丘濬字道源黟縣人天聖中登進士第因讀易悟損益二卦以此能通數知未來興廢早嵗游華陽洞求為句容令秩滿以詩寄茅山道友曰鳴鳯相邀覽徳輝松蘿從此與心違孤峰萬仭月正照古屋數間人未歸欲助唐虞開有道深慚巢許勸忘機明朝又引輕帆去紫术年年空自肥歴官至殿中丞嘗語家人曰吾壽終九九後在池州一日起盥沐索筆為春草詩詩畢端坐而逝年八十一及殮衣空衆謂尸解光禄大夫滕甫元發為太守為記其事葬於九華山後數年有黄衣人持濬書抵滁州家人啟封持書者忽不見書中云吾本預仙籍以推歩象數謫為太山主宰鄭姑鄭姑者少蘇公龍川畧志云歙州鄭仙姑之父曰鄭八郎學道者也家於歙之東嶽廟前家有一小閣姑幼與父居閣上客至父見客閣下姑自上捧茶湯下率以為常然人未嘗見閣上有煙火父死斂棺中不葬姑言父非死也如是數十年未嘗出城門人或見之百里外亦畧言人災福以此歙人大敬之予為績溪令欲一見會解縣到郡謁之聞其舊宅嵗久摧壊是嵗大風雨夜中屋毁有聲鄰居疑其壓死旦往視之偶有一木斜倚牀上牀得不壓而姑鼾睡未覺人尤異之予問其年曰八十矣然處女也予詰姑年八十而不嫁何也曰吾誦度人經故爾予曰度人經安能使人不嫁曰此經元始天尊所説元始天尊生於天地先立於天地外安得不爾予曰姑悞矣安有人能出天地上者曰此無他蓋亦道耳予曰道則能爾然何與姑事曰君謂道不在我然我身何者非道予歎曰姑乃知此耶明日畧訪我當具一齋姑曰我隨有而食不擇葷素明日即至畧能飲酒食肉予問以養生曰君今如器已破難成道予徧以術問之如導引嚥納燒煉皆曰非是予曰竟以何者為是徐曰人但養成嬰兒何事不了予曰嘗有人於百里之外見姑豈嬰兒往耶微笑不答予偶復謂曰姑家在嶽廟前廟中望水西山林極佳姑亦嘗至廟上否曰我道家不信神佛未嘗往也予曰道家不信神可也如佛與道何異佛説般若心經與道家清靜經文意皆同姑誦清靜經予覺其不習佛法因問之曰經所謂五藴何物也曰五行是也予笑曰姑未嘗學佛而遽忽之可乎五藴則所謂色受想行識是也姑黙黙而已程惟象程惟象婺源人以占算游京師言人貴賤禍福若神家近三靈山故自號三靈山人英宗潛邸時惟象預言其兆既貴得賜御書王荆公贈詩云占見地靈非卜筮算知人貴自陶漁謂此也而詩人梅聖俞之屬皆有詩送之耆老猶及見其家有御書樓者獨其占驗事多逸或言惟象有子𫝊其術宣和中太守盧徽猷嘗汎令占卦成而色不懌問何所宜曰是於占皆無所宜矣獨可以興土木耳曰何以言之曰卦為困於文有木焉其外一横一從若今匠之尺者二所以製夫木也盧公喜曰吾欲大為譙樓為是占也是役也度山而材具工徒無缺其占則從矣而論卦乃爾何也張擴張擴字子充歙縣人少好醫從蘄水龎安時游時同學六十人安時獨喜擴後聞蜀有王朴善脉又能以太素知人貴賤禍福從之期年得衣領中所藏素書盡其訣乃辭去南陵有富人子傷寒不知人氣息僅屬擴視之曰此嗜卧證也後三日當蘇蘇則欲飲欲飲與此藥必熟睡覺當得汗也已而果然當塗郭祥正子患嗽肌骨如削醫多以為勞擴曰是不足憂就坐飲以藥忽大吐使視涎沫中當有物也視之得魚骨宿疾皆愈在建業有婦人叩門求醫者擴不在其弟揮為診之及歸揮具言其狀擴曰弟與藥如是且瘳矣此其脉當嫠居三年左乳下有誌也驗之信然嘗有調官都下者擴診之謂曰蝦游脉見不出七日當死後五日得通判齊州喜曰張擴妄言耳我適得官何謂死哉又二日晨起進盥仆地即死建中靖國初范忠宣公方召而疾作問曰吾此去㡬何擴曰公脉氣不出半年公曰使某得生至京師則子之賜已遂與偕行至京師奏補擴假承務郎未㡬公以不起聞董正封知歙州擴以太素切其脉曰承議今嵗當奏子正封自以官不應格又非郊嵗以為疑適宛陵有幕官至者與語及之客曰是不可信彼亦以此語許吾州守矣會徽宗登極守臣子弟例以捧表得官崇寧中黄誥待淮西提刑擴謂曰大夫食禄不在淮西行且還朝矣然非今日宰相所謂宰相者猶未起起則有召命不滿嵗當三遷又曰大夫不病而細君病憂在九月及蔡京當國誥被召還嵗中自户部吏部遷左司郎中而妻劉亦適以九月卒尚書蹇序辰知應天府擴謂曰尚書無官脉旦夕當有謫俄被㫖放歸田里復見之曰當得州果得杭州汪丞相微時祁門宰陳孺使徧視在學諸生次至公曰君位至宰相然南人得北脉名宦當繇北方起未㡬登第調北京大名主簿不出北京積官至中奉大夫中興遂為上相謂胡殿院曰君當登第然心脉未圓嵗在辛卯見之曰不出此嵗矣明年果登第擴後以罪謫永州至洪州晨起見帥曰擴今日時加午當死後事以累公帥曰何至是擴曰吾察之血已入心矣退使人伺之及期卒揮字子發𫝊兄業為人純孝有常士大夫多愛重之智琚智琚姓李氏其先居冀州趙郡典午世東遷遂為新安人父禕仕梁為員外散騎侍郎琚年十九便自出塵聽坦法師釋論未淹灰管頻聞精義坦即隋齊王暕之門師也次聽雅公般若又聽譽公三論年二十七即就敷講無礙辯才衆所知識説經待問亟動常倫口不言人服無受色後三屈指逝於常州建安寺武徳二年弟子常衍為立碑西陽王記室曹憲為文定莊禪師定莊禪師新安人牛頭自法融禪師𫝊三世旁出十二人莊其一也無機縁語句茂源和尚茂源和尚歙州人得法於吉州性空禪師平田來叅源欲起身平田把住曰開口即失閉口即喪去却任麽時請師道源以手掩耳平田放手曰一歩易兩歩難源曰有什麽死急平田曰若非此箇阿師不免諸方㸃檢謙禪師珠溪謙禪師歙州人得法於雲居道膺饒州刺史為謙大造藏殿謙與一僧同看次謙喚某甲僧應喏謙曰此殿著得多少佛曰著即不無有人不肎謙曰我不問這箇人曰若此則某甲亦未曾祗對珍重謙後任兠率山而終瀾大徳瀾大徳者興唐寺僧名清瀾性孤髙飽叢林九華杜荀鶴贈詩云祗恐為僧心不了為僧心了總輸僧瀾荅詩云如何即是僧心了了得何心是了僧世多𫝊之與婺州僧貫休相善以詩文往還今精舍往往有瀾所為碑塔在寺後雪山子雪山子道茂歙縣紀氏子少時每遇盛夏輙以昏暮伏草莽中求以身施蚊蚋者二十年始住休寧普滿院時郭公三益為尉間數與語郭公由是好佛法後住通州白狼山晚歸自號覺菴未嘗為人白椎或問之荅曰是第一義者可輕以假人耶有妻死求出家者茂終不納曰彼一時所激非為法來也此人再娶已有買妾竟如所料大觀中郡守使其鄉僧行月住天王院月自言雲門下求與茂通法屬茂不荅及茂去世月言彼非坐滅乃其徒偽為之守使檢尸檢者踏其要股使伸伸已隨結焚之西關渡項骨諸根不壊煙所及雖水皆得舍利有池陽百問行於世寧道者寧道者婺源汪氏名道寧壯嵗以道者游四方蔣山泉禪師許為法器還家棄妻子祝髪叅五祖演禪師誦金剛有悟演印可之辭去游潭州天寧為第一座尋住報慈開福政和三年十一月四日沐浴小叅次日告衆曰晷運推移日南長至天地一陽生萬物敷奥義生死與去來從來無忌諱華藏門開主伴俱備師子翻身象王游戲如今不究根源直到龍華三會某甲作道人四十年為僧三十五夏始作道人時日誦金剛經二十巻在明州育王山燒浴誦至於此章句能生信心以此為實不覺脚在湯桶脚皴桶破當體獲解脱道證本元常無奈彼處宗師驀頭印證自此徧叅明州諸尊宿雪竇老良禪師過天台叅湧泉覺至開先見心印到衢州叅紫湖誠入廬山見羅漢英説禪祖偈至圎通叅法鏡禪師將住一年渡江到三祖見宗禪師深入㫖趣得游戲三昧到太平見清禪師提趙州狗子無佛性話師資方順透身便退回至白蓮峰下再來菴前見一蓬頭老人提忠國師古佛淨缾話如削下千金重擔自此之後方脱去貼肉汗衫無奈業縁未盡紹報慈開福道場某甲初七日與大衆相别脱去殻漏子别有前程出家佛子徹髓徹皮三昩海中游戲自在輪迴界内任意升騰所以俱尸城畔㨯示雙趺熊耳峰前新携隻履前人不了累及後來畫様起摹至於今日又道吾紫磨金身今日即有明日即無若道吾入湼槃非吾弟子道吾不入湼槃亦非吾弟子於此檢㸃得出不唯穿却黄面老子鼻孔亦知報慈落處其或未然報慈與麽來滿世無相識水月與空華誰堅復誰實住院經五年都盧如頃刻瑞雲散盡春風生失却文殊遇彌勒咄至初七日升坐衆纔定即已逝矣得其法者月菴道果而郡僧覺文嘗叅之文歙縣楚氏子與兄道才皆出家游方有聲道才叅東林總住威勝軍天寧自號海上横行才道者而文嘗住蘇州穹窿山云宗白頭宗白頭者名嗣宗歙縣陳氏受業水西寺試經得度年二十游方叅徑山睿深見器重去即龍門逺道林勸江浙廬皖荆楚湘漢之間凡菴居屏處禪林所稱者輙造而問之聞洞下有覺首座在大洪山宗壽長七齡僧先一夏服訓累年殆忘寢寐覺嘗問皓月當空時如何宗云正是恁麽時節反覆酬荅忽有省後從覺於泗州普照覺去遂代之時建炎初也開堂云喝井菴畔似真似偽斷足巖前乃精乃粹遂為覺拈一瓣以酬法乳諸方乃知洞下一宗復有人矣尋住常州善權及明州翠巖雪竇嘗示人曰大衆體究此事第一不得依様畫胡蘆第二不得去古人背後义手第三不得守株待第四不得無繩自縛何謂依樣畫胡蘆如今學者不肯退歩休歇一向用心强作道理見古人立箇拳也立箇拳劃箇圎相也劃箇圎相提起座具拂袖便行及至窮究着黒漫漫地何謂古人背後义手學者已事不明日夜商量古人公案這箇説話又如何那箇問荅又如何設或會得祗是别人底被他言語攪縛得來不成腸肚豈不見道若要提唱宗乘須是從自已胸襟流出何謂守株待有一種學者認得箇影響秪管泥在一處或良久或退後認着不忘一生無動轉長沙道百尺竿頭坐底人雖然得入未為真百尺竿頭須進歩十方世界是全身何謂無繩自縛學者在衆中不肯親近尊宿决擇此事但認過自家休歇一向癡坐從朝至暮秪管瞌睡所以道透網金鱗猶滯水迴塗石馬出沙籠若是本分坐禪人孜孜念念未嘗暫時與此事有絲毫隔行住坐臥常在其中不見洞山在方丈坐有贊歎者云僧家好終日無事山云莫如此説僧有僧事俗有俗事山僧在此無剪指爪底工夫且道洞山在方丈中作箇什麽恁麽見得僧堂裏亦不是閑坐處若不恁麽見去盡是虚度光隂直須念念無間斷歩歩無間斷時時無間斷處處無間斷有僧問曹山如何是無間斷底人山曰曹山今日傷盃僧曰某甲不會山曰東西不辦即是到這裏作麽生體悉久叅髙士共相證明後學初心各自努力將終書偈曰全心自照無佛無人諸縁不共時至便行其全身建塔於雪竇而翠巖取其大衣藏於無際菴閱世六十九坐夏五十四宗貌清癯氣韻平澹慈忍無嗔恚徑山杲少所許可嘗贊之曰太湖三萬六千頃之渺茫即師之口也洞庭七十二峰之峭峻即師之舌也不動口不饒舌已説未説今説當説也大竒也大竒此是吾家真白眉新安志巻八
