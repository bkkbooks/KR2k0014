body:
  text: 新安志卷一宋羅願撰州郡沿革徽州新安郡軍事禹貢職方氏揚州之南境春秋時屬吳吳亡屬越越滅屬楚秦并天下置黟歙二縣屬鄣郡漢武帝元封二年改鄣郡曰丹陽而使都尉分治于歙成帝鴻嘉二年以黟為廣德王國立中山憲王弟孫雲客於此三年薨無子地入於漢平帝元始二年復以為廣德王國立廣川惠王曽孫倫為王傳子赤王莽篡位貶赤為公明年廢而改黟曰訴鹵光武中興復為黟獻帝建安十三年吳主孫權遣威武中郎將賀齊定黟歙分歙為始新新定黎陽休陽并黟歙為六縣遂割於丹陽置以為新都郡其後避嗣主孫休諱改休陽為海寧晉武帝太康元年平吳以黟之廣德故國為廣德縣𨽻宣城郡何承天宋志稱廣德漢舊縣沈約以為二漢志並無之疑是吳所立按吳志吕䝉領廣德長吳録張純補廣德令則廣德在吳為縣矣然不知所屬至晉書乃顯𨽻宣城云改新都郡曰新安改新定縣曰遂安宋大明八年省黎陽併入海寧止領縣五梁武帝普通三年割吳郡之夀昌來屬復為六縣自秦漢鄣丹陽及吳新都晉新安皆𨽻揚州宋孝建元年分揚州之會稽東陽新安永嘉臨海五郡為東揚州自後或併或分梁元帝承聖中分海寧黟歙三縣更置黎陽合四縣立新寧郡與新安並正屬揚州陳省新寧郡及黎陽縣而新安復屬東揚州祥符經云天嘉三年省新寧郡按陳書天嘉四年以新安新寧八郡置東揚州則三年初未嘗省要是陳省之耳隋開皇九年改郡為歙州改始新縣曰新安縣又併遂安及梁所割吳郡夀昌未屬者皆入新安縣以𨽻婺州於是縣之存者黟歙海寧三縣而州治黟仁夀三年取婺州之新安并復立遂安以𨽻睦州於是二縣故地迄今不復今嚴州淳安遂安是也大業初復以歙州為新安郡治休寧義寧中治歙武德元年例改郡為州太守為刺史四年越國公納欵於是因其境土以歙州為總管府使持節總管歙宣杭睦婺饒等六州諸軍事未幾改命王雄誕為使總管歙睦衢三州七年二月例改都督府貞觀元年罷都督府永徽五年析歙縣置北野縣開元二十八年正月九日析休寧置婺源縣永嘉元年盜方清陷州州民拒賊保休寧之山險二年賊平因析置歸德縣又以平方清因其壘析黟及饒州之浮梁置祁門縣又以宣州旌德冦王萬敵平析歙之古華陽鎮置績溪縣而北野歸德二縣至大歷五年省於是州復統六縣元和六年九月升上州自罷督府後或𨽻揚潤二州或屬浙江江西道節度及宣歙觀察團練使天祐二年刺史陶雅以楊氏承制拜歙婺衢睦四州都團練觀察處置等使唐亡吳楊氏南唐李氏相繼有之皇朝開寶八年下江南於是始復得共職貢於天子𨽻江南東路為望宣和三年五月二十四日詔改歙州為徽州分野禹貢淮海維揚州周禮東南曰揚州而不言所直之宿漢地理志吳地斗分野也粵地牽牛婺女之分野也而丹陽等郡盡吳分也郡在漢為丹陽都尉治正當斗分天文志又云斗江湖牽牛婺女揚州此郡雖於古屬揚州然揚州地廣故特取地理志丹陽郡為據晉書天文志丹陽郡入斗十六度會稽郡入牛一度按古丹陽歙縣地與會稽之富春接是斗牛之交也自南斗十二度至婺女七度於次為星紀於辰在丑故此郡為星紀丑南斗十六度風俗自虞夏以州論風土漢用戰國時封域大者兼星以三二數連秦漢二十餘郡地廣則論其略後世郡狹則俗亦别新安故秦二縣在山谷間地廣逺自漢世常使丹陽都尉分治於此逮為郡之後吏治益詳又稍割其三陲以為他郡益狹易治然其人自昔特多以材力保捍鄉土為稱其後寖有文士黃巢之亂中原衣冠避地保於此後或去或留俗益嚮文雅宋興則名臣輩出其山挺拔亷厲水悍潔其人多為御史諫官者山限壤隔民不染他俗勤於山伐能寒暑惡衣食女子正潔不淫佚雖饑嵗不鬻妻子山谷民衣冠至百年不變自唐末賦不屬天子驟增之民則益貧然力作重遷猶愈於他郡比年多徙舒池無為界中歙為負郭縣其民之弊好委人事泥葬隴卜窆至擇吉嵗市井列屋猶稍哆其門以傃吉嚮休寧俗亟多學者山出美材嵗聨為桴下浙河往者多取富女子始生則為植檆比嫁斬賣以供百用女以其故或預自蓄藏始秦黟地廣今更為小縣俗淳儉績溪俗有二由徽嶺以南壤瘠賦重而民貧其北壤沃賦平人有餘則柔循然愚民嗜儲積至不欲多男恐子益多而資分始少蘇公謫為令與民相從為社民甚樂之其後里中社輒以酒肉饋長吏下及佐史至今五六十年費益廣更以為病婺源阻五嶺其趨鄱陽徑易唐末常使總浮梁德興諸縣鹽𣙜且專其兵與鄱通封疆則民俗近之前世賢吏多表其民之良以為勸祁門水入於鄱民以茗漆紙木行江西仰其米自給俗重蠶至熏浴齊潔以飼之此其大凡也賢則察之以施化否則拂之更歸咎於俗封建漢廣德夷王雲客孝景皇帝八世孫别自中山靖王勝中山自靖王五傳絶四十五嵗成帝鴻嘉三年六月乃以黟為廣德王國立雲客為王立三年薨諡夷王無子國除景十三王𫝊云復立憲王弟孫利鄉侯子雲客是為廣德夷王諸侯王表云雲客以懷王從父弟子紹封獨成帝紀載雲客是憲王孫按雲客之祖孝侯安於憲王為弟其父戴侯遂於懷王為從父弟則雲客乃憲王弟孫懷王從父弟子表𫝊所言是也憲王孫無封利鄉者紀脫一弟字耳廣德靜王倫平帝紀王子侯表中山靖王𫝊皆作倫獨廣川惠王𫝊作愈顔師古曰音愈諸侯王表又作倫今姑從紀表孝景皇帝五世孫别自廣川惠王越景十三王𫝊立戴王弟襄隄侯子愈為廣德王王子侯表亦言倫是襄隄侯聖之子而諸侯王表乃言倫以戴王子紹封亦當脫一弟字廣川自惠王四𫝊國除者十五嵗平帝元始二年夏四月丁酉以故廣德國立倫為王秦惠王四年薨諡靜王居攝元年王赤嗣三年王莽篡位貶為公明年廢中山靖王𫝊稱雲客弟廣漢為廣平王薨無後平帝復立倫為廣德王奉靖王後按諸侯王表廣漢至王莽時猶在安得遽言薨無後此廣德王倫自以廣川系絶故封考之廣川惠王𫝊可見非續中山也中山子孫侯者二十餘人不應取於見絶之廣川明矣宋新安王子鸞字孝羽孝武皇帝第八子大明四年九月自襄陽改封食邑二千户母商淑儀有寵子鸞愛冠諸子朝士為上眄遇者莫不入子鸞府國商貴妃薨帝為立寺以新安為號新安王延年文帝曽孫泰始二年十一月壬辰封紹子鸞後齊新安王海陵恭王嘗為之以永明十一年十一月辛亥封邑二千户梁新安王瑀字時文明帝子也九嵗而封後入隋歷唐至尚書左僕射太宗嘗宴侍臣詔一坐最貴者先把酒長孫房公相顧未言瑀遽引杯上問之對曰臣梁朝天子之子隋朝皇后之弟唐朝宰相天子親家翁上撫掌極歡而罷陳新安王伯國字牢之文帝第五子天嘉五年八月已卯封本紀云封新安郡王然陳以上封王不言郡蓋衍文唐新安郡王徽太宗皇帝之孫濮恭王泰之子新安郡王佟𤣥宗皇帝之孫信王珵之長子新安郡王欣代宗皇帝之孫嘉王運之子正元四年四月封官太僕卿新安郡王洙憲宗皇帝之孫絳王悟之長子太和八年十一月封右十一王皆以天子骨肉疏封唯漢廣德兩王實建國於此餘或采美名以為號不皆之國然漢魏以下王不之國朝廷命卿大夫臨郡則稱內史行郡事故東晉謝靈運王羲之為會稽臨川內史南朝亦往往有新安內史是郡猶為國而內史特代王為治名號猶係於其民也故采而列之僞楚亦常以桓冲之子謙唐武氏亦常以武三思之子崇烈為新安王皆假竊名器不足汙簡牘至唐潁王子僤封歙國公汾州刺史王詮封歙縣男之類蓋自鄶以下者微不復道也境土郡境在京師之東南統縣六曰歙曰休寧曰祁門曰婺源曰績溪曰黟始漢末以古黟歙二縣分為新都郡地廣大後又稍稍割之蓋古歙縣地之在今者為歙為休寧為績溪為婺源為嚴州之淳安為遂安古黟縣地之在今者為黟為祁門為廣德軍之廣德為建平凡三郡十縣今所存者唐歙州新安郡之境而已非復漢之新都也然在唐猶號大州凡東西廣長四百一十九里南北二百八十二里治所始漢建安中置新都郡立府於始新今嚴州淳安縣治是也其後薦割以𨽻婺睦於是隋歙州始治黟酈道元水經注云吳立始新都尉於歙之華鄉令賀齊守之後移出新亭按華鄉即始新縣華一作葉而賀齊乃新都都尉言始新都尉者誤也但新亭不知所在大業中遷治休寧萬嵗山義寧中遷歙縣烏聊山唐及國朝因之宣和三年睦冦方臘既平部使者遷其城於溪北三里民不以為便事聞㑹除盧宗原為守有詔同徐閎中相度宗原以為新城地形不正周四里有餘北皆重山才能為三門距溪數里茶鹽載卸者弗便瀕澗卑濕為壘善崩截山圍築外髙內庳瞰臨城中又無濠塹不足以為固內之則頑石岡隴虛占其半崚嶒峻仄不可以建居止餘皆荒草砂礫之地夏秋山水暴出灌注城內雨雪則停潦為泥鹽米斷絶又頑石不可為井土井六七味惡易濁汲溪則人以為苦民以其故不願舊城據山下平原大勢端正周七里三十步左有長溪春冬水面二十丈夏秋濶一里許湍流百尺循城西南而下便於載卸其右則倚山為城亦臨深溪繞城東北不可踰越市皆甓甃民居寬廣井泉且千所向特以城壁不全故不能守今若因故基修築足為險固以此民情願還得㫖以舊城為州以新城為歙縣且令以漸修築而新城亦卒不為縣今民間猶號新州宗原城舊州畢明年八月與士民復歸于舊州城社城壁之設因山溪以為險山起於東北至南而止故因而續之以為城溪亦源於東北抱城而轉至西南而下故假之以為隍乃穿九井使隂相灌輸上通銅井下通釡底皆溪流之深為潭者也其外羅城周四里二步髙一丈二尺子城周一里四十二步髙一丈八尺廣一丈三尺五寸唐大中九年修子城中和三年又修羅城至五年增廣城之南北總之為九里七步咸通六年即城之西北為隄以禦水光化中因隄築為城命曰新城自南唐及國朝無所考宣和中既平睦冦詔盧公修築乃計其工費聞於朝為羅城如唐中和五年之制然其地在今僅號七里三十步乃啓六門東西則一南北各二有富州豐樂表城紫陽通濟太平之名門皆有樓又環以敵樓不復為子城而於儀門外直南數十百步為譙樓面勢雄正其外為宣詔班春之亭先是譙樓在東故常穿州治之東廂以出既南作新譙乃以舊譙基在東者為門號迎和門五年春三月城既訖役奏乞令知通都監季申部仕者任滿以相付書於歷庶幾勿壞且奏其屬功於朝改轉各有差又往往即大甎隱起為文凡百餘言以戒後之人使毋忘冦難壞則修之其光化中因隄而築號新城者隄既益摧遇溪水溢時髙於平地二三丈故常捐之以為桑野今號新城園紹興二十年火災市人以為承平時譙門東出則城中列肆不耗士子登第者衆乃遷州榜及鼓角於迎和樓而虛南向譙樓不用乾道八年夏五月前趙侯集六縣各新沿城一門而州則恢度東南譙樓既具費及今趙侯成之而城樓在西者其旁為一丈夫嶷立金花帽錦袍持弓矢引滿以射西方號藺將軍如是古矣按藺將軍名亮歙縣人隋開皇九年平陳併黟歙入海寧以𨽻婺州廢歙州為新安鎮以亮為將主之蓋前則接平陳之役後則接大業之亂此其人必嘗緩帶登陴以弓矢靖難有功於斯人者故歷唐以來設之不廢社在城之南隅道路趨京之軌道出東門指績溪由寧國縣入其府濟黃池入太平州渡采石江歷和州及其縣全椒滁州及其縣來安泗州及其縣臨淮自虹靈壁以入于宿取亳之永城南京之穀熟入南京過寧陵拱州以達于雍邱陳留至京門為二千六十五里捷則北出踰箬嶺望道泰麻村凡百九十里得寧國府之太平縣歷黃柏嶺曺店凡二百里得池州之大通鎮過江歷蔡家店石鼻村百三十五里得無為軍之廬江縣又百四十五里自航步入廬州又歷下塘廟史源村凡二百五十里至夀州又自蘇村闞潭村王家市賢祥村金鈎鎮雙樓市凡四百二十里以入為亳之鹿邑縣又七十里則太康縣矣經咸平縣凡百九十里以入于京門為千六百里此其道往往不過都歷邑者商旅之所以為徑易也舟行自西門泛溪勝二百石沿新安江而下百二十里以出於境由淳安至嚴州歷桐廬富陽過浙江入臨安府又經崇德至秀州經吳江至平江府經無錫至常州經丹陽至鎮江過揚子江至揚州髙郵軍經寶應至楚州歷淮隂虹靈壁三縣至宿州歷永城穀熟至于南京經寧陵至拱州以達于雍邱陳留入京門為三千九十二里今兹趨行在所者舟行六百三十里陸行則南出歷昌化於潛臨安餘杭為三百六十里其四出八達之道東出百里至于境又二百二十五里至寧國府西出二百七十里至于境又三百三十里至饒州南出百里至于境又二百六十里至臨安府北出七十五里至于境又二百八十五里至池州東南出百里至于境又二百四十里至廣德軍西南百五里至于境又二百五十五里至嚴州東北百里至于境又四百六十五里至池州西北二百七十里至于境又七百五十里至闕州闕户口吳新都郡不載户口之數晉新安郡統縣六戶五千宋統縣五户一萬二千五十八口三萬六千六百五十一隋歙州統縣三戶六千一百五十四唐舊領縣三戶六千二十一口二萬六千六百一十七天寶領縣五戶三萬八千三百二十口二十六萬九千一百九永泰元年冬十月丁亥分宣歙饒户口於秋浦縣置池州國朝天禧中主户十二萬一千一百五口十八萬三千五百二十八客戶六千九十八口八千七百六十四其每縣主客之數各附其縣中元豐中主户十萬三千一百一十六客户二千八百二十八未經界户十六萬一千一百四十七此經界時所具祖額不的知何年經界户九萬七千二百四十八乾道八年諸縣主户十一萬二千五百九十五客戶七千四百八十八合以城內外户一千九百三十一總為十二萬二千一十四然自元豐以後不言口數要以郡境土較之狹於晉宋五之二以户口率之多於前代不可勝計有以見國家世世仁厚涵養生齒之效其在郡城中者乾道户千二百八十一口六千八百五十八城外戶六百五十口三千二百八十一粗為可考凡六縣民去為僧尼者千有二人為道士者四十六人姓氏諫氏元和姓纂云周禮有司諫子孫以官為氏漢有治書御史諫忠見風俗通今望出歙郡余氏風俗通曰戎人由余之後世居歙州新安及下邳汪氏古諸侯汪芒氏之裔春秋時魯有汪錡以童子死齊師聖人稱之唐歙州刺史汪華居新安故望出新安今黟歙之人十姓九汪皆華後也陳稷州刺史汪綱陳亡自歙州徙河間故又有河間汪氏右鄧名世姓氏辨證云耳按汪芒氏之裔在周為長狄與常人不類獨祖汪錡者近是然鄧名世以為汪王所居新安而又言陳世汪綱自歙州徙河間則是由陳以上固有居新安者矣姑著其說以待知者仰氏五代有仰仁詮為刺史千姓編云今新安吳興皆有此姓聶氏元和姓纂曰衛大夫食采於聶因以為氏辨證云望出河東及新安查氏顯於文徽為南唐樞密使至國朝祕監陶待制道皆其孫也本音如乘槎之槎鋤加切真宗嘗與道語及姓氏因謂之曰卿豈不聞京師以仵作行人為槎家乎宜求音之近而雅者稱之又問姓所起引春秋會吳于柤在加切以對自是改稱音若柤云查氏有孫藻仲文在荆南廣覽好文自言其上世事如此隆興中侍郎郭籥乃其兄子也凡海陵荆南之查皆出新安姓氏之書又往往載吕氏俞氏皆郡之先賢然不言望出此郡又自昔喪亂中原衣冠多避地來此如謝諫議泌晉太傅二十七世孫魏太尉羽去鄭公十世許司封逖去睢陽太守五世皆自見其事中不列於此潛氏黟有潛氏村昔有人避地家石洞中門徑悉為松蘿所翳每求鹽米晨出夕還人無知者時人號為潛氏迄今潛姓者數十家同為一村坊市坊舊十有二曰宣化曰望仙曰紫陽曰興仁曰化成曰問政曰增明曰和福曰司晨曰通濟曰育材曰安集乾道中尚書郎錢侯數因民刲肝股為增立坊曰孝童孝義之屬今往往有存者官府州衙在子城之西北正南曰設㕔防守庫在東廂之樓甲仗庫在西廂之樓儀門在其南軍資庫公使酒庫分為左右在儀門之南又南則舊譙樓在焉宣詔班春二亭在譙樓之南設㕔之右為小㕔小㕔之前為簽㕔自餘賓次吏舍如他州之儀皆宣和中盧徽猷所建其堂房之外有紫翠樓有靜治燕香之堂先是纍數守以正堂為不利避弗居至丞相洪公乃敞之以御賓客致尊賢之意號舍蓋堂而自唐大中以來有黃山樓北望天都諸峯國朝咸平中集賢李學士復踞城西北隅建清心閣宣和後皆以次起廢而黃山樓亦踞城為之號黃山堂堂側有兩古木洪公常作亭其間號浮丘今雖廢民猶指其處又改後圃雙杏堂曰芙蓉堂舊别有四寶堂以郡出文房四物為義通判軍州事一員諸州置通判自建隆四年始陳恭公安定先生皆嘗來為此官㕔在州衙東舊有棣華堂宣和中吳郡李彌綸兄弟繼踵故名州學教授一員㕔在州學之南軍事判官一員咸平中魯肅簡公嘗為之㕔在紫陽坊軍事推官一員㕔在判官㕔之側兵馬都監一員㕔在司晨坊教場之側添差兵馬都監一員㕔在通濟坊兵馬監押一員㕔在孝義坊録事參軍一員熙寧三年十一月十九日詔陜府江寧府鄆青齊杭越蘇婺宿夀宣歙䖍洪吉潭廣福建等州録事參軍係繁難去處今後並差職官知縣及奏舉縣令人充其料錢數多資序不該請者並支錢十五千㕔在州院之側司理參軍一員五代時諸州馬步院判官特以牙校充選建隆中改馬步院為司冦置參軍以及第進士九經五經并在銓選人為之其後改曰司理㕔在本院之側司法參軍一員㕔在慈孝坊司戶參軍一員㕔在和福坊監在城酒稅一員僦居無定處廟學先聖廟及學自唐至國朝在城之東北隅太平興國三年知州蘇補闕遷羅城東門之內街之南烏聊山上景德三年嘗修之嘉祐四年以山髙地狹不足容衆徙於南園熙寧四年又以南園瀕江地卑常有泛溢之患復遷烏聊元祐初再徙南園紹聖二年黃朝散還之於東北隅米禮部芾為書所為記世所𫝊歙州新學記是也宣和中焚于睦冦紹興十一年汪內相始復營建左廟右學規制雄麗愈於他郡中設知新堂闢八齊以處學者曰殖齊懋齊益齊裕齊育齊定齊覺齊浩齊紹興中藏御書周易尚書毛詩周官中庸春秋左氏𫝊論語孝經孟子樂毅論羊祜𫝊并法帖御製文宣王贊七十二子贊損齊記凡四十八卷貢院貢院自宣和後不復設遇嵗大比則毁學之齊壁以納之坐講堂及廟兩廡皆滿乾道四年郟侯規大成殿之東故間地增買民地六百二十餘丈為屋東西八十間長廊廣厦使士各以其藝别為位最後則堂以處較藝者自是學舍無毁撤之患士得去此隘盡思於為文且以稱登能天府之意餘所買地頗當廟學前者皆虛之又盡撤學前小屋直南而出以達于逵氣象宏敞是秋遂以試進士明年登第者十人有為禮部第一御試第三人者士子宜之放生池國朝因唐之制天禧元年詔淮南江浙荆湖舊放生池廢者悉興之元無池處沿江淮州軍近城上下各五里並禁採捕紹興十三年詔天下郡各為池而嵗以誕聖日縱魚鱉其中以網罟入者論如盜於是郡鑿城西壖地以應詔至十八年尚書郎章侯增廣之作恩波堂好生魚樂之亭後十數年屋為溪潦蕩去尚書郎錢侯復新其堂而池當春夏往往與溪滙冬月水泉縮魚無所賴乾道八年祕閣趙侯徙堂於其右百步篁竹中亢爽之地而臨溪流以放生如天禧故事館驛轉運南行衙在慈孝坊北行衙在司晨坊新安驛在通濟坊倉庫州倉在孝義坊常平倉在州倉之側酒稅務在市心面南公使庫在州治小㕔前醋庫在城東門外舊有茶倉草場楮場之屬今皆無有刑獄州院在司晨坊面東司理院在司晨坊面西大中祥符二年五月饒歙二州奏獄空將降詔奬諭銀臺司以為州司司理院互有獄空不應編敕之文自今乞委刑部㸃勘旬奏禁狀不謬者具奏降詔從之營寨祥符中有駐泊營屯駐營各二水軍營騎射保節營及新舊牢城營各一今所管廂禁軍凡六指揮禁軍威果營在城東北隅額管四百一十人忠節在西南隅額三百一十人武雄亦在東北隅二百五十七人廂軍效勇在東北隅一百五十人牢城在西北隅百五十人壯城在西南隅百人其起置不可盡考按皇祐五年閏七月詔淮南江東東西荆湖南北路諸州軍新立就糧禁軍教閲忠節軍大州五百小州三百人其額在舊忠節之下新忠節之上則忠節之制久矣嘉祐四年五月詔江寧等諸帥府新招禁軍以威果為額請受如宣毅例每指揮不得過四百人諸州置威果當沿此而始熙寧二年正月樞密院檢會近令淮南江南兩浙福建等路將廂軍團結教閲武藝欲支與威邊請受以州軍小大立定人數自三百人至百人仍改軍額內江南曰武雄從之蓋其可考者如此其外五寨管界寨在歙縣西百八十步王干寨在歙縣東南百里黃山寨在歙縣北百里深渡寨在歙縣南四十五里中平寨在婺源縣東七十里每寨百人皆以巡檢主之凡禁軍九百七十七人廂軍四百寨兵五百總之為千八百七十七人郵傳五代以來天下郵傳皆役平民建隆二年始命以軍人代之六縣省遞三十五鋪每鋪十人歙休寧祁門黟則又有斥堠三十八鋪每鋪八人凡六百五十四人祠廟新安之神諱華姓汪氏績溪人隋將寶歡之從子少以勇俠聞大業之亂以土豪應郡募平婺源冦有功尋為衆所推保據郡境時四方割據建號者衆乃稍以兵取旁郡并有宣杭睦婺饒五州帶甲十萬建號吳王為政明信逺近愛慕部內賴以安全凡十餘年唐武德四年以籍土地兵民遣使納欵于唐髙祖嘉之制曰汪某往因離亂保據州鄉鎮靜一隅以待寧晏識機慕化逺送欵誠宜從褒寵授以方牧可使持節總管歙宣杭睦婺饒等六州諸軍事歙州刺史上柱國封越國公食邑三千戶七年朝于京師貞觀二年授左衛白渠府統軍事參掌禁兵十七年改忠武將軍行右積福府折衝都尉太宗征遼東為九宫留守比還稱其忠勤二十二年三月三日薨于長安永徽中歸葬歙縣北七里雲郎山郡人思慕立祠於刺史宅西偏大歷中遷于烏聊山號越國公汪王神自唐刺史薛雍范𫝊正相繼增葺他縣亦處處有祠及國朝東封秩羣祀郡人方演知州事上唐所賜誥命為奏請追封靈惠公政和四年三月賜廟號忠顯七年十二月封英濟王宣和四年以隂相平睦冦加顯靈隆興二年閏十一月以能禦災厲加信順乾道四年三月進封信順顯靈英濟廣惠王夫人錢氏唐左武衛大將軍九隴之女乾道五年六月追封靈惠夫人新唐書本紀王以武德四年九月甲子歸唐而杜伏威傳及王雄誕傳乃載王與雄誕戰覽者因以為先戰後服以資治通鑑考之王九月歸唐十一月自與伏威將雄誕戰是時王與伏威皆已受唐命戰自其私忿非因戰之後始歸唐也按唐告稱其識機慕化逺送欵誠則是王自知天命非戰而後服明矣今唐告見存其辭則李百藥顔師古所作可以考信故國朝賜廟額父子並稱忠云王有八子舊稱八郎君紹興十年賜廟號忠助乾道九年正月咸賜侯爵建仕唐為朗州都督府法曺賜封忠惠侯璨費州涪川令封忠利侯達以征荷魯龜兹髙昌功爵上柱國襲封越國公封忠應侯廣遜皆左衛勳府飛騎尉廣封忠濟侯遜封忠澤侯逵薛王府户曺封忠仁侯爽岐王府法曺封忠德侯俊鄭王府參軍封忠祐侯而忠顯廟之前則有岱嶽廟後有城隍廟城隍在唐世州縣往往有之李陽冰以為祀典所無吳越則有至開成中睦州刺史吕述以為合於禮之八蠟祭坊於水庸者是亦近矣烏聊東峯又有靈順廟其神五人皆封公事見婺源縣卷中而近嵗民間又祀孚惠廟本出於信州傳云神石敬純東晉時人前趙之從子為父報讐山為震鳴故信州人祀之本朝封至八字王焉附汪王廟考實王諱行狀云王諱世華避唐太宗諱去上字按初封告在武德中無所謂世字雖秦王威望素隆然王以稱孤之餘方為國屈不應於此時諱諸王二名而預為之避也考一時歸唐者如王世充李世績皆無所省世績在貞觀時猶復如故至髙宗初即位有司請改官制中有治字者以避上名髙宗以貞觀時不諱先帝二字詔之有司奏曰先帝二名禮不偏諱上既單名臣子不合指斥以此知未嘗偏諱也後改民部與昏葉等字及世績之為績皆在髙宗時諱親之典安有當貞觀時為人主則不諱而在武德時才為藩王人反為避哉然今相傳云王有二弟世英世榮或曰初實二名既貴自欲從省要不為唐諱設也氏族之姓氏以汪姓出汪罔氏亦曰汪芒孔子所謂書皆漆姓守封嵎之山者在虞夏商為汪罔氏於周為長狄於春秋時為大人又海外西山經有汪野李善以為汪氏國在西海外然則汪罔其氏而汪野其國也顧所居距中國遼逺而哀公時魯乃有汪錡者以死齊難為聖人所褒故內翰汪公志其宗人司城墓推姓所起亦先本汪罔又採或說云汪姬姓也魯成公支子食采於汪因氏焉汪罔之汪見於傳記而姬姓之汪特出於今里中所傳故內翰兩存之竊嘗以汪罔之人世皆長大號十倍僬僥氏在春秋間蓋嘗至矣兄弟四人各適一國以死其適魯者曰僑如魯之亞卿以名其子而太史又志其藏以為異也然則所謂汪罔之後者何從而容於魯乎藉令在魯已傳數世其質尚當與常人異孔子之答吳客何至近捨本國之汪而逺稱封嵎之長狄大人以為證耶春秋正義亦引蘇氏云國語稱大人者屏居夷狄不在中國由此觀之謂汪氏為諸侯之裔似稍近人情至俗所傳譜自成公以下有一世某二世某云者仍其舊而言也行狀稱州望安二年龍驤將軍文和為會稽令因世漢建亂避地家於新安文和之名他書無所見沈約宋書云龍驤將軍晉武帝始以王濬居之然則自濬之前安得有此官也近世臨川鄧名世作姓氏辨證言王始居新安故望出新安今黟歙之人十姓九汪皆王後也又云陳稷州刺史汪綱陳亡自歙州徙河間故又有河間汪氏按綱之由新安徙既在陳時則汪氏之居此舊矣豈得言自王始乎太平興國中有為王廟記者言王乃隋將寶歡之族子或謂陳隋以上始處此邪本之龍驤則荒逺就王為說則簡陋俱未適中故內翰至此略而不言若以新安之族由王而望始著則可爾境土行狀所載王事出於故老所傳凡有初起假竒怪以動人者不暇决擇然其本末猶得以粗見承議汪公所作傳特為整潔至王師正刪略太甚師正他郡人不深為稽考務欲每事貶損如言兵則云得數千人言地則云據郡以守夫以數千人守一列郡而遽建號雖妄庸不為也方隋亡時蜂起之將不可勝數其以姓名載於唐新書本紀之首者四十有八人王之名在十數人之中此非小弱也功濟六州之民而心識天命所在亦豈可忽哉史之所書雖略然資治通鑑載王據黟歙等五州有衆一萬則與行狀及汪傳所書略相類矣唐之命王以六州蓋因其所有就畀以節不然王特以一州內附唐何所利復割他郡附益之哉然云五州猶有未合者蓋通鑑特載於歸附之日豈疆場之設一彼一此在當時存者五州歟抑欲言據黟歙外復有五州致略其文歟較其實則所謂六州者蓋皆嘗有之不可掩也至於兵之多寡則據一時籍獻之數容有罷歸者通鑑及新書又言王甲兵甚鋭夫以鋭兵而數至一萬則餘卒固不止此矣豈若師正之云者哉治所新安郡治自昔屢遷今治歙縣烏聊山之西則實始於王烏聊者郡之形勝自漢建安之亂縣人毛甘以萬户守之逮王之起復屯其上後因遷治其旁云而行狀及傳乃言王初起時以箭所下處立城指績溪縣東之祠為其故處按今績溪雖有故城而圖經載隋開皇十一年州治黟大業中為郡治休寧義寧中治歙縣之烏聊山義寧所治非王孰始之其城於績溪當是草創營壘其後卒遷今治爾此王所規畫故表之納欵願嘗以王廟食此邦踰五百年而民愛敬之久而愈新者不惟能出雲雨禦災厲亦由其起不失正道始終出於靖民故天下方亂則以身蔽六州之人及其粗定聞真王而遂歸之事合天心為天所相是以生享其祚而沒食其土以能悠久然則不鬬一民不煩一旅間關自託於唐者乃王之大節本意不可以不白也今武德告命具存所以褒表者其語明甚而舊書本紀不著歸唐月日新紀雖於武德四年九月甲子書降至列傳杜伏威遣王雄誕來伐又不著其已受唐命反更追書稱王時事遂使覽者徒見紀傳所書皆在四年因指為一事意王負固纍嵗而伏威雄誕以天子之命來討力窮勢蹙至是始降爾則與告命所謂逺送欵誠者豈不相戾邪蓋雄誕來伐雖亦以此年然王送唐欵實先之所謂九月甲子者月九日也告命以此月二十二日下則欵之至唐與其封拜皆不出九月中而雄誕之來乃在是冬謹按資治通鑑王遣使歸唐載於九月而雄誕來伐别載於十一月則是歸唐之後已受封拜而伏威雄誕自以私意伐之爾是時伏威之於唐未為純臣王之歸唐也必思以忠自列耻因之以成事故籍其土地兵民遣使間道越伏威之境以歸之天子意伏威之黨相與竊議疾王歸唐之事不出於巳因襲之以為巳功此淮隂擊已降之類初不害王之先識也若夫王之屈於伏威雖出於不得已然彼方以行臺自名而雄誕實左右之吾為唐行臺屈爾肯遽出其下哉說者又以雄誕既戰之後唐室以其前後功亦除歙州總管管歙睦衢三州疑若右雄誕者不知唐於此時亦未能全制東南來者斯受之爾王既以六州自歸則因以六州畀王逮伏威自以行臺而襲王為已功唐亦不得而却也此正淮隂之事也豈天子亦欲見王而為之遣代邪故未幾遂朝于京師嘗試考王歸附之初髙祖以大國重使見處與其一時褒崇之語及貞觀之間典宿衛者二十年太宗逺伐委之管鑰非夙嘉其節而深信其心何以及此告命所表雖漢甲令稱忠殆不若此之明也不考此而云云豈不誤哉官閥王入唐除左衛白渠府統軍及忠武將軍行右衛積福府折衝都尉及九宫留守按六典左右衛有諸曺及親勳翊五府及武安武成等五十府所謂白渠積福蓋五十府之列也始武德初依開皇舊名置驃騎將軍以掌府衛七年改為統軍後又採隋折衝之名改統軍為折衝都尉然則統軍及折衝一官也忠武將軍者與冠軍雲麾等凡十將軍謂之散號將軍以為加官其有職事則髙者為守卑者為行此於官帶行字者忠武正四品上折衝乃統軍所改統軍正四品下故也然自始封國公則已在一品矣九宫留守亦環衛官人夫行狀及傳皆云夫人錢氏唐功臣九隴之女按九隴家世雖本東南人然以新舊書考之自其父在陳時為隋所獲沒入為𨽻故九隴事唐公以善騎射常置左右則錢氏當隋初已在太原兩家方微不應涉千里而聘若王入唐始婚則王以隋開皇六年生至武德五年年三十有七矣中間稱王十餘嵗亦不應未有配偶又丞相汪公云王以六州所興提挈八子歸諸朝天子嘉其忠封越國公命諸子班環衛則王未入朝之先已有八子矣計錢夫人之前容有夫人逸其姓氏者以其時考之當如是不敢臆斷也諸子名位既大抵出於入朝一時恩命則歷官皆不當止此而王之胄嗣亦將不止於八今自歙及杭睦間往往祀所謂汪九郎者云王之幼子豈錢氏之出歟抑在八子之中而其羣從相與為次第故至九歟當以待知者廟貌汪台符廟記稱貞觀二十三年父老請建祠堂於㕔事之西大歷十年刺史薛雍遷于烏聊東峯元和三年刺史范傳正又遷于南阜即今廟是也中和四年刺史吳圓克荷冥應復新棟宇按今烏聊山之祠相傳云雍嘗以王功德奏聞奉敕立廟然必於山者則以王初起嘗駐兵其上故也山起州之東北而極於南所謂東峯者今人别謂之東山所謂南阜者即此山之最髙處今人呼為廟山薛雍者蒲州汾隂人髙宗相元超之曽孫有宰相望為吏部侍郎典選大歷九年五月乙酉坐事貶歙州刺史范傳正鄧州順陽人自比部員外郎出為刺史尋歷蘇湖皆以政事修理聞舊史在良吏傳中吳圓之名不見於史今歙縣士人汪德符藏其所補十將鄭稹兩牒乃光啓元年三年所給也圓中和四年在郡明年改元光啓其褒稹詞略云登陴將匝於星灰禦侮頗勞於蚤夜當是時秦彥逐宣歙觀察使竇潏而陳晟逐睦州刺史韋諸四封方擾捍禦之事蓋無嵗無之所謂冥應者必嘗控王以求助而感其隂相也圓仕使檢校右散騎常侍兼御史大夫碑記汪台符記唐末所作時楊行密有江淮其將陶雅實守此郡記所稱僖皇嵗庚子盜起曺南者黃巢也淮王𢎞農公者王則行密嘗封淮南王而公則其子渥也司空潯陽公者雅也行密以景福二年八月取歙州逐唐刺史裴樞自池州召雅既修廟又嘗崇王墓而垣之復立石人石獸之屬雅在郡凡二十餘年龍集壬戌者昭宗天復二年也自始至此蓋十年矣台符本郡人好學力耕號有霸才宋齊邱忌而殺之江南野史有傳祀從今所在王廟有二武士介而兵立於門首土人謂之毛甘將軍汪節將軍毛甘者歙縣人漢建安之亂率衆保烏聊為吳將賀齊所破因此置新都郡事見吳志汪節者績溪人唐神䇿將軍家在大徽村其母嘗避瘧於村西福田寺外感於金剛神已而生節及壯有神力長安東渭橋石獸重千斤節獨徙置之又能負石碾碾上以木架牀設龜兹樂一部曲終略無難色德宗甚加寵異事見太平廣記記所引歙州圖經今不復載矣二人與王雖異世民間特以有功及材武故類而祀之又廟中有繪宣城長史淮安長史云者或曰即王二佐天珤鐵佛入唐所得官民禱王必右考實之文先是郡太守郟公精意在應政成欲傳廣其威靈得告命於官府得詩文於金石復訪求遺事於是州之人士及耆老王實輩各致所聞既已詮次願於公辱禮闈知已之分竊從假觀之亦欲一出意見而卷帙既定方亟於攻木不敢有所動搖獨念王歸唐大節自我先侯及丞相內翰兩汪公今致政尚書金公皆有翰墨力為發明輒復考其欵附月日與王雄誕戰伐先後蘄以益信前說說始萌芽又旁訂凡語及王者十一事以備採擇考實辨疑先侯詩語也故本之乾道五年九月朔州民羅願述新安志卷一
