body:
  text: 新安志卷六宋羅願撰叙先逹昔者春秋之世楚屈建之信聞於諸侯其大夫誦之以為晉卿不如楚意楚之賢晉無以當之至建問晉范㑹之德於趙武武告以夫子之家事治無隱情於國無愧辭於鬼神者建退而誦之則晉先賢之風烈建曾不足以得其萬一逮魯叔孫豹聘於晉則又以為晉范氏之先僅可謂之世祿而魯有先大夫曰臧文仲者既沒而言立然後可以謂之不朽由此言之世之賢者可有既乎是數者不惟其人之差品固若是亦習於所聞各以其國之賢為足以矜於天下也夫賢之所在人猶以其於已為近而矜之又况善行之發於吾身而令聞之施於吾體者乎榮亦至矣然則進德修業又安可後哉新安自程靈洗以節顯梁陳間唐及五代相繼有人逮聖宋則名臣輩出夫豈惟其土之多賢要當以世論之若梁員外散騎侍郎李禕太常卿胡明星唐中書舍人吳鞏南唐宰相馮延已勤政殿學士延魯樞密使查文徽國朝尚書郎舒雄太子左贊善大夫吕文膺虞部員外郎方演及近世名卿大夫未得其行狀者皆不敢輕有所附著以存蓋闕之義前世羽林將軍盧元卿刑部郎中程皓則又不知其世謹録知者見其左程儀同程儀同靈洗字元滌海寧人侯景之亂保黟歙以拒景梁元帝授譙州刺史資領本郡太守後助王僧辨鎮防及武帝誅僧辨靈洗率所領來援其夜力戰於石頭西門軍不利遣使招諭久之乃降按陳書只云軍不利謂靈洗軍也而南史云武帝軍不利今從陳書帝深義之授蘭陵太守仍助防京口及平徐嗣徽有功除南丹陽太守封遂安縣侯後隨周文育西討王琳軍敗為琳所拘尋與侯安都等逃歸纍遷太子左衛率武帝崩王琳前軍東下靈洗於南陵破之虜其兵士并獲青龍舟十餘乘以功授都督南豫州刺史侯瑱等敗王琳於柵口靈洗乘勝逐北據有魯山召為左騎將軍天嘉四年周迪重冦臨川以靈洗為都督自鄱陽别道擊之迪又走山谷間遷中護軍出為都督郢州刺史廢帝即位進號雲麾將軍華皎之反遣使招靈洗靈洗斬皎使以狀聞朝廷深嘉其忠為增守備給鼓吹一部因推心待之使其子文季領水軍助防時周將元定率步騎二萬助皎圍靈洗靈洗嬰城固守及皎敗乃出軍躡定定不獲濟江以其衆降因進克周沔州禽其刺史裴寬以功改封重安縣公靈洗御下嚴刻士卒有小罪必以軍法誅之然號令分明與同甘苦衆亦以此附焉性好播植躬耕稼别水陸所宜刈穫早晚雖老農不及伎妾無游手竝督以紡績至於散用資財亦無所吝卒贈鎮西將軍開府儀同三司諡忠壯配享武帝廟庭程都督程都督文季字少卿幼習騎射多幹略果决有父風弱冠從靈洗征討必先登陷陳靈洗與周文育侯安都等敗於沌口為王琳所執武帝召陷賊諸將子弟厚遇之文季最有禮容深見賞文帝嗣位纍遷新安臨海太守尋乘金翅助父鎮郢城華皎平文季父子竝有捍禦之功及靈洗卒文季盡領其衆起為超武將軍仍助防郢州文季性至孝雖軍旅奪禮而毁瘠甚至服闋襲封隨都督章昭逹率軍往荆州征梁梁人與周軍多造舟艦置青泥水中昭逹遣文季潛道戢往盡焚之又夜入其外城殺傷甚衆既而周兵大出文季僅以身免以功加通直散騎常侍太建五年都督吳明徹北討至秦郡秦郡前江浦通涂水齊人下大柱為杙柵水中文季前領驍勇拔開其柵明年率大軍自後至攻秦郡克之又别遣文季圍涇州屠其城進拔盱眙仍隨明徹圍夀陽文季臨事謹飭御下嚴整前後所克城壘率皆迮水為堰土木之功動踰數萬置陳役人必先諸將夜臥早起迄暮不休軍中服其勤幹每戰常為前鋒齊軍深憚之謂為程虎陳書云程獸南史云陳彪皆以唐諱虎字故也以功除散騎常侍帶新安內史纍遷北徐州刺史加都督後隨明徹北侵軍敗為周所囚授開府儀同三司十一年自周逃歸至渦陽為邊吏所執送長安死於獄是時既與周絶不之知至德元年後主始知之追贈散騎常侍詔傷其廢絶降封重安縣侯以子響襲封吳御史吳御史少微新安人第進士長安中纍至晉陽尉與武功富嘉謨同官友善先是天下文章以徐庾為宗氣調益弱獨少微嘉謨屬詞本經學雄邁髙雅時人慕之文體一變稱為吳富體少微撰崇福寺鐘銘嘉謨作雙龍泉及千燭谷頌尤為作者推重并州長史張仁亶待以殊禮坐必同榻時魏郡谷倚為太原主簿亦以文詞著名時號北京三傑中興初吏部侍郎韋嗣立薦少微嘉謨同時為左右臺監察御史少微卧病聞嘉謨死慟哭賦詩尋亦卒有文集各五卷谷倚後客死文章遺失少微子鞏開元中為中書舍人新舊唐書皆稱少微新安人惟唐御史臺記稱少微渤海人按祥符圖經亦載少微於歙縣人物中今從之又舊書文苑傳稱吳富文集各五卷經籍志三人集各十卷王校正王校正希羽歙州人凡稱歙州及新安人之類皆據所出書録之得其縣者自書縣詞藝優博天復元年登第時年七十餘先是昭宗新平內難聞放新進士詔知貢杜德祥有孤貧屈人宜以名聞特敕授官故德祥以希羽曹松劉象柯崇鄭布顔應詔各授校正其制云念爾登科之際當豫反正之年宜降異恩各膺寵命松舒州人學賈司倉為詩此外無他長時號松啓事為送羊腳狀年亦逾七十象京兆人崇希顔閩人皆以詩卷及第年六十餘號五老榜汪處士汪處士台符歙州人博學能為文好王霸大略唐末見天下方亂乃力耕不出南唐先主輔政移鎮金陵往上書陳民間九患先主覽之且加條問為宋齊丘所抑齊丘始字超回台符貽書譙之曰聞足下齊先聖以立名超亞聖而為字齊丘慙改字子嵩後使人誘與飲酒夜縛其口沈石城下先主聞而惜之及升元中更檢校民田物産以三等定賦又使民輸粟請鹽罷其科借商旅賣鬻則征之過者則否舟行無力勝之稅郡縣吏胥降而有限凡數十年民得以小康皆自台符發之台符所為碑或以管驛巡官九江巡使等冠銜此一時祿仕之賤者故依江南野史稱處士舒狀元舒狀元雅歙縣人幼好學才辭敏贍南唐時以貢入金陵吏部侍郎韓熙載好接誘後進茍有才藝必延致之雅以文贄一見如舊與為忘年交在門者凡數十人推雅為首雅輕黠敏給熙載狎之後主立頗疑北人熙載懼愈肆情坦率家伎百餘人時操獨弦琴使雅執板隨房歌鼓以為笑樂㑹熙載知貢雅以狀元登第然內外亦無異辭歸朝厯將作監丞太宗於禁中造閣取四庫書數萬卷藏之時祕書監李至因薦雅及杜鎬等入充校理自太平興國中編纂文苑英華淳化中校史記前後漢書至道中修續通典校定周禮禮記公羊榖梁傳疏及别纂孝經論語正義咸平中校七經疏義雅必預焉纍遷職方員外郎咸平末出守舒州以守職勤恪為稱樂其風土有終焉之志秩滿乞致仕就掌靈仙觀雅嘗慰薦王欽若後欽若為言大中祥符三年直昭文館卒年七十餘弟雄登端拱中進士第官至尚書郎吕侍郎吕侍郎文仲字子臧新安人南唐時第進士為大理評事歸朝纍遷少府監丞預修太平御覽廣記文苑英華轉著作佐郎太宗聽政之暇日閲經史患顧問闕人太平興國八年始以文仲為侍讀尋又為翰林侍讀賜緋魚寓直御書院立本官班多以日晚召見出經史令讀或就訪外事時侍書王著書學葛湍亦直禁中文仲以書史著以筆法湍以字學深承顧接至道初上嘗草經史故事三十紙召文仲讀畢因刻石令內侍齎數百本藏江東名山福地道宫佛廟及分賜髙逸不仕敦朴有行為州里所稱者真宗咸平二年以楊徽之夏侯嶠及文仲竝為翰林侍讀學士邢昺為侍講學士先是侍讀名秩未崇及置此職班秩賜翰林學士祿賜如之設直廬於祕閣侍讀更直侍講長上日給尚食珍膳夜則迭宿日具當直官名於內東門進入召對訪問或至中夕中謝日賜與如翰林學士受詔集太宗歌詩為三十卷嘗以御史中丞鞫曹南猾民趙諫獄忽御寶封軒裳姓名七十餘人令窮治皆昔委諫營産買妾者文仲從容奏更請察其為人密籍姓名候薦選對揚之日斥之未晚從之景德中終刑部侍郎集賢院學士文仲富詞學有器韻善應對久居禁近周密詳審嘗使髙麗清潔無所求逺人恱之每使至必詢其出處時吕端吕祐之亦嘗為使三人皆寬厚文雅國主王治嘗對使者劉式語及中國用人必應以族望如唐之崔盧李鄭者式言惟賢是用不拘族姓治曰何姓吕者多君子也後以其子士永為奉禮郎姪孫從政同學究出身兄孫溱大魏太尉大魏太尉羽字垂天婺源人唐鄭公之後真宗名臣傳云羽自言鄭公十四世孫按陳無已作魏嘉州銘稱司徒謨之子别居歙之婺源其後四世而至羽然則羽乃鄭公十世孫耳初仕江南為昭文館校書郎出為雄逺軍判官今太平州是也王師渡江道出城下羽歸欵轅門太祖聞而嘉之特拜太子中舍命知興州尋知京兆府屬河間守將以征賦𣙜酤之入盜為已用遣羽覆實期年得羡餘以億計因言本州録事參軍郭震十年未代河間令崔能前為即墨未滿歲而移遷調之司頗未均一太宗以其敢言詔加褒轉後為戶部郎中上疏願省三司職官之半可以責成仍條利病二十事下有司議皆以為便遷鹽鐡最上案判官立位為三司判官之首上以唐世尚臺閣目卿監為冗官欲復古優其選擇諸曹正郎有才望者竝補少卿監以羽為祕書少監嘗請簿計王府僚吏之過乞依唐置封駮司命大臣領之事皆見從上稱其有心計通明吏道真宗即位厯禮部侍郎卒年五十八以其長子玠為奉禮郎玠卒羽妻自陳家貧無祿録其子校書郎瓘為奉禮郎後贈羽太尉羽强力善處繁劇在三司出入十八年習知財賦之事查祕監查祕監陶字大鈞休寧人世仕南唐祖文徽工部尚書陶明習法令仕為常州録事參軍歸朝太祖命大理試以律學除本寺丞纍轉侍御史權判大理寺咸平五年遷祕書少監復判大理先是中書以朱摶議法不當請用陶真宗曰比聞陶亦深文宰相言當今習熟法令少如陶比者遂可之楊億知審刑院陶屢攻其失遂命代億仍賜金紫卒年五十景德二年以其子前崑山尉慶之為太常寺太祝張度支張度支諤字昌言歙縣人能詩有吏才仕江南為祕書丞通判鄂州王師南下與州將許昌裔叶謀歸欵太祖召見勞問賜賚甚厚授右贊善大夫蜀平選知閬州太平興國中就除西川轉運使先是中土罕習舟船諤以其軍分𨽻諸州自是無覆舟之患後以三司度支判官出為荆湖江浙等道制置茶鹽副使以子秉故纍贈太子太傅許司封許司封逖字景山歙州人題名碑言許逖祁門人而安定先生為許俞作傳言黟縣人今從歐陽公所作行狀言歙州唐睢陽太守逺五世孫曾祖儒不義朱梁自雍州入於江南終身不出祖稠仕江南參德化主軍事父規嘗羈旅宣歙間歐陽公言逖世家歙州而許氏家譜乃云規嘗羈旅宣歙間豈是時僑居之日尚淺故云爾耶聞旁舍呻呼就之曰我某郡人也察君長者且死願以骸骨屬君因指槖中黃金十斤曰以是交長者規許諾敬負其骨千里并黃金置死者家大驚愧之因請獻金如亡兒言以為許君夀規不顧竟去聞者益以為長者以子故贈大理評事逖少仕江南為監察御史李氏國除以族北遷獻其文得召試為汲縣尉冠氏主簿二歲縣民七百人詣京師願得以為令遷校書郎知縣事數上書太宗論北邊事時趙普為相四方奏疏不可其意者悉投二甕中甕滿輒出而焚之獨稱逖為能曰其言多與我合後以太常卿知鼎州州雜蠻蛋喜攻劫少年百餘人私自為名號夜出掠逖至皆亡入他境約候逖去乃還遷國子博士奉使兩浙江南言茶鹽利害省州縣之役皆稱㫖出知興元府府有山河堰舊溉田四萬餘頃世傳漢蕭何所為乃躬治木石大修之堰成歲大豐得嘉禾十二以獻遷主客員外郎京西轉運使徙荆湖南路地南接溪洞諸蠻歲出為州縣患逖召其酋諭以禍福迄三歲不以蠻事聞及滿來朝真宗面稱其能㑹有司言荆南久不治以度支員外郎選知府事府轄北路兵馬於荆湖為大府故常用大官至逖以材選員外自逖始明年遷司封賜金紫徙揚州州居南方之㑹仕官於南與死而無歸者家多寓焉子弟恃法得贖出入閭巷為不法至破家逖捕其甚者笞之曰此非吏法乃吾代若父兄教也子弟愧悔稍就學問為善人風俗大化還在道卒逖慷慨能自立於時事母及兄遂以孝謹聞常戒其妻事嫂如姑未嘗敢先其兄食衣雖弊兄不易衣不敢易初違命侯遣其弟朝京師逖友金惟嶽當從以家屬託逖惟嶽果留不返逖善撫其家為嫁其女數人李氏國亡逖乃載其家北歸以還惟嶽蔡君謨為逖弟迥作傳云金惟嶽以文詞名江南迥與之善惟嶽常從後主弟朝京師俱留不遣金陵平迥奉惟嶽之族歸汴即謂此也至迥為惟嶽取其子自見迥事中厯官四十年不問家事好學喜孫吳兵法初在江南數上書言事得校書郎遂遷侍御史王師圍金陵李氏大將李雄擁兵數萬留上江隂持兩端李氏患之以謂非逖不能召雄逖走上江以語動之雄即聽命已而李氏以蠟書止雄於溧水逖曰此非柵兵之地留之必敗乃戒雄曰兵來勿動待我一夕吾當入白與公兵俱入城逖去王師挑之雄輒出戰果敗死逖至收其餘卒千人而去以子贈至工部侍郎五子恂恢怡元平恂黃州録事參軍恢虞部員外郎怡太子中舍簽押淮南節度判官㕔公事元最顯平字秉之與兄元相友愛稱天下少卓犖不羈善辨說亦與元俱以智略為當世大人所器寶元中朝廷開方略之選以招異能陜西大帥范文正公鄭文肅公皆以平所為書薦召試為太廟齊郎調海陵主簿多薦其有大才可試以事者平亦慷慨自許欲有所為未及用嘉祐中卒年五十七子瓌璋琦琳璋真州司户參軍琦太廟齊郎自恂至平皆孝友如其先人故士大夫論孝友者歸許氏許承旨許承旨迥字光逺逖之弟南唐時士以權利輿服相夸迥獨好擊劍負氣以貧事母不少屈王師伐金陵逖為光慶殿使分護北城迥以光慶殿承㫖從攻益急矢集如雨逖被重傷戒迥曰我將死主矣汝歸慰吾親迥以身蔽逖逖罵曰君親忠孝我與汝均有不可乎迥乃去及逖歸朝為冠氏令部役築魏城賊李潛者號强桀所過摽掠入冠氏問令在否曰令魏城下獨其弟迥在耳潛曰吾固聞許迥之為人即領徒去迥兄弟既載金惟嶽之族於京師惟嶽有子先因亂失所之後聞淝水巨盜李某俘以為已子李日殺奪道上州縣莫能禁惟嶽泣謂迥曰吾且死誰當收之惟公為能出吾子迥時在魏徑之淝水將至盜二人遮刺之迥曰李氏若豪雄欲殺義士者無所事刃盜驚止迥前泣謂曰汝所俘者吾兄弟子也吾聞義者哀人之急而勇者明已以信汝豈效草間無知輩耶盜迎舍迥厚飲食之還金氏子當是時迥以節勇聞河北大官屢欲薦之於朝迥曰寧能浮游江淮不能就刀尺間以活竟終淮上年五十八迥及二兄皆孝友王荆公稱之以為迥事母如逖之孝事兄如逖之為弟蓋慷慨有大義者子㑹為進士方壯時亦慨然好議天下事後為太廟齊郎謝諫議謝諫議泌字宗源歙縣人自言晉太傅安二十七世孫少好學有志操賈黃中一見竒之謂人曰此子材器不羣異日當顯名於時登進士第知龍州青川綿州彰明縣三遷殿中丞代還獻所著文二十篇古今類要三十卷召試中書以本官直史館賜緋時言事者衆詔閣門非涉僥望乃許受泌抗疏陳其不可又乞依唐分經史子集為四庫人掌其一太宗嘉之遂以泌兼知集庫淳化中王禹稱請羣官謁宰相須朝罷於政事堂樞密使於都堂皆同時接見以防請託泌以為若此是疑大臣以私也夫以萬幾屬任輔臣非接見賓客何以究知外事若止都堂候見而咨之曽無解衣之暇古人云疑則勿用用則勿疑設若杜公堂謁見之禮豈無私室塞相府請託之漸豈無他徑上覽疏嘉歎從之仍以疏送史館㑹修正殿泌以為不當施采繪亟命代以丹堊且奬其忠藎拜左司諫賜金紫并賜錢三十萬嘗對便殿上稱其狂直敢言泌奏曰陛下從諫如流故臣得以自竭昔唐末有孟昌圖者朝上諫疏暮不知所在詩人鄭谷為詩閔之前代如此安得不亂上動容久之後為虞部員外郎兼侍御史知雜事上元觀燈特預召自是為例未幾為三司鹽鐡副使時外舅魏羽為使以親嫌換度支副使真宗即位改主客郎中知虢州在郡上疏以為致太平無出姚崇所獻明皇十事臣記雍熙末年趙普嘗以此獻先帝深以為然俄命普入相尋普病北狄擾邊未及施行今北狄已息繼遷請命正是行此十事就太平之日至於者不急之務削煩苛之政不用小人不與奔競之流以官爵開直言之路此皆致太平之術陛下十行其八九矣又繼遷小有不恭不足深責平城之事至弱也漢祖行之以安天下近代石晉用景延廣之言以絶和致天下橫流豈得為强聞彼所貪嗜者禽色利欲漢祖明皇所用之計正可以弭敵心又自古輔佐聖明建萬世之基立不拔之策者未有不由宿舊大臣未聞市井之徒塵走之吏能為之也願陛下察此則纎人不敢萌心大賢得以畢力矣疏奏上頗嘉歎後知福州代還民刻石於所經之橋名曰去思泌名知人少許可平生薦士曾不過數人後皆至卿相每欲發薦牘必設几案置章其上望闕再拜曰老臣又為陛下得一人王文正公旦即其所薦也知襄州日鄧城令張逸有善政縣去州十餘里泌暇日乘小車從數吏渡漢水至鄧城界以觀風謡或載酒邀逸野飲吟嘯終日而去薦逸官至樞密直學士為時名臣西祀還授泌右諫議大夫判吏部銓盥沐巾褐端坐而終身不欹側時年六十三歸葬鄉里録其子衍為太常寺奉禮郎衒為將作監主簿張密學張密學秉字孟節太平興國中試進士儀狀豐麗屬詞敏速美書翰太宗嘉之擢置第二出入中外纍厯要職為度支員外郎知制誥同判吏部流內銓唐故事首曹罕兼制多退為行內諸曹遷首曹自此始後知河陽澶滑二州真宗北巡迎謁境上俾預從官侍食駕還召歸東封詔與知制誥王曾訪問所過耆老送閣門引見并具州縣繫囚所犯聞奏祀汾隂為留守判官時向敏中以尚書為留守秉出入與之聯騎少所撝抑時議以為非後以樞密直學士再知并州將行上作五言賜之卒年五十六録其二子遹逖竝為大理評事秉好潔輿服飾飲膳以詫賓客家貧質衣以給其費人頗譏之小魏太尉小魏太尉瓘字用之以䕃補校書郎為開封府倉曹參軍㑹上元與內侍督作燈山而內侍詸索擾人瓘密以狀聞詔為杖內侍於省中監襄邑稅門人魏綱上章詆天書流海島瓘亦坐停官後知衡山縣衡山祠旁舊禁採伐而寺僧倚中貴人輒犯禁無敢問瓘捕送於州州將依違不為决瓘疏不已卒抵以罪厯提㸃廣西刑獄轉運使溪洞婦人緣逋責沒雍州為庸使者二千餘人悉還之劉鋹時舟船皆計口有稅而雷化廉髙竇五州獨未除瓘為除其稅罷柳州無名之役四百人後以太常少卿知廣州廣素無城為築城環之又疏江東門鑿東西澳為水閘及儂智髙入冦圍廣州五十日不能下朝廷以為功時瓘方知越州特遷工部侍郎集賢院學士使復知廣州給禁卒五十得便宜從事代還糾察在京刑獄時議開六塔河而塞商湖北流瓘往視之以為不可其後决河卒不可塞而德博之民大罹昏墊五溪蠻叛除龍圖閣直學士知荆南朝廷方議征討瓘以為五溪之險師行鳥道而諸將貪功生事非國家之利條三策招安為上守禦次之攻守為失不報後卒招安之以吏部侍郎致仕卒贈太尉年七十一子縯纁絳綋紳純絪綸紀紹綽綸以才擢守吉州紹字承之以父任為將作監主簿嘗知虞城縣禁蒱博而盜止留守下其法管當合流鎮歲大饑度請報不及事乃先發廪後以聞旁近賴之通判絳州行州事新廟學具師徒士故沈浮俗間檄縣諭出之講試以時紹與其屬過焉後以右朝散郎知嘉州自唐開元獻荔子而近世樂用朱桑所産久益微不給求而刑者衆嘉祐中有賢守哀之作二詩刻石以諷紹將行貴要多求者摹其石詩以報黠賈奪人鹽井更數守訟不决紹刑而還之為人孝友和審不受私居無子弟過出有吏能常有勞再登格而賞不及亦不自言紹聖初卒子汶查賢良查賢良道字湛然與陶同祖父元方以䕃厯殿中侍御史太祖平江表元方隨李煜納欵為滑州掌書記道器量𢎞偉趣尚平淡至性慈孝動遵禮法在滑州母病綿惙調進藥劑經旬不解帶母思鱖魚方冬市無有道泣禱於河鑿冰解衣取之得鱖尺餘以饋母疾尋愈居喪絶酒肉盛寒布衣徒跣杖而後能起太宗遣使採訪川峽知州通判能否多不稱者唯李虛巳薛顔邵曄及道等七人被詔奬諭咸平四年擢賢良方正能直言極諫對策第一移左正言直史館京東漕運使真宗喜談經嘗命馮元講易謂曰朕不欲煩近臣久立欲於齊亭閣選純孝之士數人止如同人便裘頂帽橫經竝坐暇則薦茗果盡笑論削去進說之儀遇疲則罷元薦道及李虛巳李行簡三人虛巳母喪明醫者曰浮翳泊睛能舌䑛千日者可勿藥自愈虛已䑛之二年遂復明行簡父患癰痛楚行簡吮之敗膏不唾於地父疾亦愈上立召之日令陪侍喜曰朕得朋矣將祀汾隂命道權判留司尚書都三館道求扈從以杜鎬代之天禧二年以龍圖閣待制知虢州卒年六十二道為人輕財重義初就試貧不能上道親舊斂錢三萬遺之道出滑州過父友呂翁家翁喪無以葬母兄將鬻女以辦喪事道傾槖悉與之且為嫁其女是歲罷試時人以比郭代公又有同僚死女為人婢道贖之以嫁士族在官雖俸入豐厚分給宗族孤寡為畢嫁娶者十餘家以是常匱乏所至務寬恕胥吏有過未嘗笞罰民有訟捕負者或出巳錢償之嘗出案部路旁有佳棗從者摘以獻道即計直挂錢於木有文集箋表行於世安定先生孝行録稱詣黃河禱祝垂釣獲魚而范蜀公䝉求及玉壺清話皆言鑿冰得之今從蜀公說又安定稱字真之蜀公兩處皆言字湛然云俞待制俞待制獻可字昌言歙縣人其先居河間晉永嘉之亂徙新安端拱初登第厯歸州軍事推官權領州事㑹李順反川峽官吏多有棄城城中老幼亦亡去獻可料州兵屯沿江柵以遏奔者不能禁得亡命二人斬以狥衆乃定後以御史中丞王嗣宗薦為監察御史建言天下所上瑞物不在圖牒者毋得以聞厯提㸃廣西刑獄初撫水蠻數內寇獻可以為前守吏姑息之過請發兵窮討之丁母憂特起為轉運使卒平定之為立互市築塞以扼其險自是蠻人不復犯邊推功官屬未嘗自言仁宗時擢龍圖閣待制權吏部流內銓子希甫希孟皆登第希甫終和州推官希孟皇祐中殿中侍御史希孟孫正圖復登政和五年第云俞侍郎俞侍郎獻卿字諫臣獻可之弟始學師友其兄彊力敏給以儒術自任後遂相繼成進士名聞當世調芍陂尉仁廟諸臣傳云安豐尉而劉元父為作志云芍陂臨事明察善鉤人情推顯至於隱以故盜不敢發發又輒得有僧積財甚厚其徒有告其出遊者獻卿揣其有姦曰吾與而師善不告而去何也告者色動因執之得其所瘞尸一縣大驚調昭州軍事推官陳進亂嶺南轉運使以象州守懦不任事檄獻卿往護之及至守已謀棄城遂止之教堅壁治兵守得免誅賊亦不至部昭民往輸之粟及事平議留昭民伐山林以治官府獻卿曰役病矣不可示信請期三日許之民知不久役皆勸功趣事事如其素初昭州積錢巨萬獻卿盡用以糴榖至是賴以供軍陳進平上功第一仁宗即位轉侍御史為三司鹽鐡判官上言天下榖帛日益耗物價日益髙民力安得不屈今稻苗未生而和糴桑葉未吐而和買轉運使務刻剝以增其數歲益一歲又非時調率營造一出於民是以物價積髙而民積困也嘗以景德中西戎內附北使通好最盛之時一歲之用較之天禧五年官吏要冗財用贏縮色役多寡釋道增减其利害較然可知况自天禧已來日侈一日又甚於前夫巵不盈者漏在下木不茂者蠧在內陛下宜知其有損於彼又鑒其無益於此與公卿大臣朝夕圖議而拯之則天下幸甚上納其言為罷諸宫觀清衛兵省浮屠老子祠醮及他無名之費以巨萬計淮浙鹽歲耗十三萬尚書經費不足命往視之至則條廢舊弊以新法從事吏盡償所負又增五百萬石㑹兄為鹽鐡副使乃徙開封府判官時陜西兵食不足方擇轉運使宰相數進擬無合意者因言獻卿天子識其名曰是前使淮南者可其奏至部三日得半年之儲終歲餘二年食雖一切方略然民不以為病涇原塞外武延川本羌地諸將欲為已名請築堡鑿壕獻卿奏以為不可許未幾寇果至殺掠將士塞所鑿壕而去徙京西因入對言將帥范仲淹明鎬可大用及條上邊策甚備後以集賢院學士知杭州嘗因暴風江湖溢决隄勢不可禦獻卿大發卒鑿西山石作隄數十里民便之賜書褒諭元昊叛西邊大擾獻卿時知宣州詔問所欲施行條上十餘事朝廷稱其知時務晚以工部侍郎告老轉刑部致仕獻卿為人髙明剛嚴論議立規矩似不能容物至持獄平易不妄有所輕重其在京西錢丞相為許州厚賓客之奉嵗費千萬執政素不恱且疑其有私㑹獻卿奏事至京師因開端問之獻卿對無他世以為長者卒年七十六子希楚司門員外郎希元進士及第早卒希及虞部員外郎希旦登第終朝議大夫而希楚子叔良獻卿族孫師錫師錫弟之子舜凱皆登第師錫官朝奉大夫凡俞氏登第者十人顯者甚多洪比部洪比部湛字惟清休寧人世仕江表湛幼好學十嵗能屬文未冠録所著十卷號齠年集以進士有聲於時雍熙二年廷試見黜真宗既賜進士梁皓以下百七十九人第翌日詔殿前不合格及南省不奏名進士內文采可取者令再試帝復御崇政殿內出廷燎賦淡交如水詩得湛以下七十六人竝賜及第以姓名附本等湛以文采遒麗特升第三人後以右拾遺直史館賜緋坐與宋沆等上書忤㫖落職知容州纍遷比部員外郎移知郴舒二州咸平二年召試皇帝孝德頌詔復歸館判三司都磨勘司知制誥同知貢又修起居注坐知貢日受賄除名流儋州移惠州道卒年四十一詔以子幼給錢一萬官為護喪歸後以為例仁宗諸臣𫝊云任懿以銀二百五十兩賂王欽若登第後被告上方顧欽若厚懿更云湛湛使陜西還而獄已具官收湛贓家無所有乃以所假梁皓白金器輸官人多寃之湛美風貌俊辨有才幹方議修綏州宰執向敏中馮拯贊成之而吕䝉正王旦以為不便使湛馳驛相視條奏七利二害卒修之凡五使西北採訪邊事上甚眷待有意擢任之預曲宴賦詩深被賞激有集十五卷聶內翰聶內翰冠卿字長孺歙縣人冠卿傳云師道葬歙州遂為州人按問政先生傳師道家世在歙但沒於揚州自揚州歸葬耳七世祖師道楊行密版奏號問政先生鴻臚卿父致堯登咸平三年第贈禮部尚書冠卿登第為連州軍事推官秩滿以文謁翰林學士楊億大器賞之於是大臣交薦召試學士院入館閣校勘仁宗時纍厯中外遷工部郎中景祐中李照改定大樂引冠卿為檢討雅樂制度故實官别詔與馮元宋祁修撰樂書為景祐廣樂記又以警嚴一奏曲不應再用乃製奉禋歌以備三疊詔冠卿及照造辭以配聲下本局歌之是年郊祀遂用焉冠卿特遷刑部郎中直集賢院後為賀契丹生辰使其主謂冠卿曰君家先世奉道子孫固有昌者嘗觀所著蘄春集歌詩極清麗因自擊毬縱酒命冠卿賦詩康定二年入翰林為學士丁母憂起復兼判昭文館未幾兼侍讀學士冠卿每進讀左氏春秋必引尊王黜霸之義以諷一日墜笏既退上顧問內侍曰冠卿清羸如是何也對以居喪毁戚所致乃出禁中湯劑賜之因告歸營葬至揚州卒詔以其弟太常博士世卿通判宣州後又以宋卿為校書郎冠卿嗜學手未嘗釋卷有蘄春集十卷河東集三十卷子友仲平仲儀仲文仲公仲慶厯二年友仲以正字升親民任使平仲文仲竝以太廟室長升正字儀仲熙寧中虞部員外郎通判衛州四年十二月判大名府韓琦言王拱城危急儀仲抱疾馳赴總徒修築因此病亡特賜絹百匹文仲子循矩登元豐中第世卿天聖中進士皇祐中為職方員外郎知萊州㑹通判井淵為盜所虜御史以為言世卿坐降知信陽軍後終太常少卿子武仲南仲微仲恭仲武仲登皇祐中第許待制許待制元字子春世以孝謹稱鄉里父亡一子當官兄弟相遜久之曰吾弟才後必庇吾宗乃以元補郊社齊郎魏泰東軒茟録云王章惠公隨知揚州許元以士子上謁自陳唐許逺之後章惠率同僚上表薦其忠烈之家乞朝廷推恩通判以下皆不從章惠遂獨狀薦之朝廷以為郊社齊郎而歐陽公為元銘志稱得父官故從之徙廣陵力耕以養母厯泰州軍事推官戍軍千人自海上亡歸州守聞變不知所為詰其所以來三人前對元叱左右執之曰惑衆者此爾其餘何罪勞其徒而遣之遷鎮東軍節度推官知丹陽縣縣東練湖决水一寸為漕渠一尺故法盜決湖者罪比殺人會歲大旱元請借湖水溉民田不待報决之守遣吏按問元曰便民罪令可也竟不能詰所溉萬餘頃歲乃大豐再遷太子中舍監揚州博鹽和糴倉知如臯縣所至民愛思之為吏喜修廢壞其術長於治財自元昊叛河西兵出久無功天下勞弊三司使薦元材命主𣙜貨元言先時賈人入粟塞下京師錢不足以償故錢償愈不足則粟入愈少而價愈髙是謂內外俱困請髙塞下之粟下南鹽以償之使東南去滯積而西北之粟盈此輕重之術也行之果便是時京師粟少而江淮歲漕不給大臣以為憂參知政事范仲淹謂元獨可辦乃以為江淮兩浙荆湖發運判官至則治千艘浮江而上所過州縣留三月食其餘悉發而州縣之廩逺近以次相補不數月京師足食乃考故事明約信令發斂轉徙至於風波逺近遲速賞罰皆有法凡江湖數千里外談笑治之不擾而用以足先是官造船多虛破釘鞠已入水不可稱盤乃取新船焚之火過得其釘鞠之數校所破才十之一自是立為定額其處事精密如此初以殿中丞為判官已而為副為使每歲終㑹計來朝上必加恩禮再遷尚書金部員外郎數求解職上謂輔臣曰發運使總六路州軍八十有一其財貨調用幣帛菽粟歲千百萬宜得人久任今元纍章求解朕思之不若奬勵以盡其材賜進士出身除侍御史遷工部郎中天章閣待制凡在職十三年乞郡至八九乃以知揚州歲餘徙越州泰州嘉祐二年卒年六十九先巡江淮歲漕京師者常六百萬石其後十餘歲歲益不充至元為之歲必六百萬而常餘百萬以備非常逮去職有勸元進為羡餘者元曰吾豈聚斂者哉為人善談論與人交久而益篤居家孝友所得俸祿分給宗族無親疏之異子宗旦揚子縣主簿宗孟守將作監主簿許長官許長官俞字堯言父遂善事母里母勵其子輒曰汝獨不慙許伯通乎祥符中封泰山加恩羣臣仲父逖當遷以讓遂乃以遂為將作監主簿俞風貌魁傑襟局峻整尚節槩不妄交游下茟立言慨然有濟世意逖器之曰吾家千里駒也少喪母事父以孝謹聞所欲雖千里必致後以貢如京師安輿扶持僦居都下俞與妻子同糲晨夕進膳必珍厚公卿聞者率俸佐之父年垂八十謂俞曰覩汝登科吾沒無憾矣祥符七年果登第授涔陽從事歸有日父疾篤俞晝夜供侍浣濯必親或問之俞言浣濯於家人之手慮其厭也居喪毁幾滅性家貧假貸終大事或厯父所經由涕泣永日嘗寄泊揚州通津佛舍方春閉室靜坐未嘗出偶過琅山别院馬上忽泣下僕問其故曰我父嘗寄處此也士流服其孝服滿詔超資授揚州從事嘗知大冶縣縣人至今稱之二子均垍為進士呂狀元呂狀元溱字濟叔曾祖裕贈兵部尚書祖文膺官至太子左贊善大夫父士元字佐堯咸平二年擢明經為醴陵尉厯彭原四會太和隴城縣令為人剛介有節長於為政醴陵太和皆大邑民喜鬬訟往往因事中吏以法吏多不免士元日與長吏爭曲直下為邑民伺候終無毫髮過失可得民卒愛思之四會近海俗雜蠻夷士元尤知其人利害事所經决後有欲輒改更者民必自言於庭曰此呂君所決豈可動耶後人亦莫能改也入仕三十餘年以一縣令之祿衣食其族四十餘口雖薄而必均生淵溱淙淇淵登進士第嘗為祕書丞溱景祐五年試進士為第一授將作監丞康定中獻其所業召試學士院賦及詩三入上等除著作郎中直集賢院至和中以翰林侍讀學士知徐州當辭特命於資善堂賜宴以餞之仍詔自今由經筵出者以為例時蔡襄韓絳皆相繼出守而歐陽修賈黯亦求郡知制誥劉敞疏論邪正進退之分正臣常難進而易退邪臣反是呂溱蔡襄歐陽修賈黯韓絳皆有直質無流心議論不阿有益當世誠不宜許其外補使四方有以窺朝廷啓姦幸之心而殿中侍御史趙抃亦上言近日正人賢士紛紛引去憂國之士為之寒心上悟頗留修等溱嘉祐三年知和州坐言者奪職分司南京熙寧初擢為樞密直學士給事中卒神宗手詔曰呂溱立朝最孤知事君之節絶跡權貴故中廢十數年無人肯為達之者朕近擢領要務頗著風績今忽淪亡甚可嗟悼又溱家貧一子幼騃可令常賻外量與優給及一行葬事官為辦集庶示將來以勵臣節贈禮部侍郎溱為人喜自貴重知杭州日接賓客不過數語時人目為七字舍人開敏善議論一時名人多推許之孫工部孫工部抗字和叔黟縣人其先棄廣陵以避孫儒之亂抗少孤力學寄食浮屠山中步行借書數百里升樓誦之而去其階數年具衆經遂博極羣書為文操筆數百千言始同學究出身厯官後登進士甲科知潯州當是時人未趨學抗改作廟學召吏民子弟秀者親據案講說勸誘以文藝未幾旁州士皆來學學者由此遂多以選通判耀州兵士有訟財而不直者安撫使以為直抗爭之不得乃奏决於大理大理以抗所爭為是用其議編於敕慶厯二年擢監察御史裏行奏彈狄青不當沮敗劉滬永洛城事又因日食言隂盛以後宫為戒仁宗大獵於城南衛士不及整而歸以夜明日將復出有雉隕於殿中抗奏疏即是夜有詔止獵蠻唐和冦湖南以抗按撫奏事不合因自劾乃知復州後稍遷都官員外郎提㸃江南西路刑獄有言常平歲凶當稍貴其粟以利糴本者抗言此非常平本意也詔又從之儂智髙反抗即出兵二千於嶺以助英韶㑹除廣西轉運使馳至所部而智髙方煽上遣大臣部諸將兵數萬擊之方時搶擾抗驅散亡吏民轉芻米又以餘力督守吏治城修械屬州多全而師飽以有功勞遷司封初抗請斬大將之比者發騎軍討賊及後賊所以破滅皆如其策卒年五十六官至工部郎中抗為州務整齊大體闊略細故與賓客談說絃歌飲酒往往終日而罷聽用僚屬盡其力事以不廢在御史言事計曲直利害如何不顧望大臣以此無助自少為文以類集之為百卷子適邈迪適遘適從王荆公遊年十四議論著書已驚人登第後終永州軍事推官邈嘗為縣令荆公亦稱其好學能文自迪以下及孫略皆登進士第新安志卷六
