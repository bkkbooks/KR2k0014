body:
  text: 新安志巻二宋羅願撰叙物産生人之道致物以為養物備則養豐養豐則生足樂生足樂則喜為善喜為善則重犯法重犯法則服教訓服教訓則上尊安故古公與其妻胥宇味其董荼則以知周原之美而蹶父為其女相攸覽其有川澤魴鱮熊羆猫虎則以為韓土之樂然則物産之所聚是良國也雖然有道葢所謂穀與魚鼈不可勝食而材木不可勝用者亦繫於其政穀粟新安之穀大率宜秈而不甚宜秔土人謂秈為小米秔為大米其秈有大白歸生小白歸生又有紅歸生米粒紅成熟最早然不廣種少蒔以接糧耳有桃花紅者穀粒微紅而米粒正白亦先熟古太守秩之任昉去郡唯有桃花米二十石是也太平寰宇志云今休寧縣尤多為飯香軟又有冷水白有筆頭白穟端少許不生穀如筆之象有肥田跂大率秈不耐肥唯此種能於肥田中自植立也有早十日有中歸生又有晚歸生近八月社熟米色不甚鮮明占禾本出於占城國其種宜旱大中祥符五年詔遣使福建取三萬斛并出種法而布之江淮浙之間亦曰旱稻秔有大栗黄亦名硬稈栗黄有小栗黄此二種有常不至瘁有蘆黄遇熟則顆粒多往往倍收故一名富不覺然不熟亦連畎皆死珠子稻顆圓如珠烏鬚稻芒正黒有婺州青其來自婺州有葉裏青其長没人擌色責切皆藏葉中有斧腦白有赤芒稻並早而易成偕號為六十日然不叢茂人不多種有九里香亦名五里香有馬頭紅穀粒紅而米白亦有香然稃厚米少有萬年陳其色如糯有沙田白有寒青寒青最遲糯有青稈羊脂白矮之名白矮釀之多得酒有牛蝨穤顆粒大難為地力價髙於白糯有早歸生盡六月可熟有交秋糯七月熟米亦好釀之可以及社節然無叢箭其粒赤而長故又名金釵糯有秧田穤善耐肥蒔之早者亦可及社大麥則有早麥中期麥青光麥又有髙麗麥亦呼髙頭麥挼之則粒出然難為地力有糯麥宜為飯小麥則有長穬麥麩厚而麵少白麥麵白亦少赤殻麥麩薄而麵多蕎麥姿荏弱榦赤花白不類他麥秋種而冬食火麻則有早晚中期三色又有梅麻梅雨後始可拔其油麻則有白麻早成有赤殻麻或落地自生多變為大炭麻又有六合麻圓而六稜凡菽苧菜草子皆有膏油但可照灼至服食須麻膏豆有大白小白大紫小紫大黒小黒褐豆大青而黒者為豉極良有油緑豆視緑豆尤小宜為粉有紅斑沙豆大如緑豆羊角豆纎而長藊豆者大莢實籬上豆也實或白或黒龍牙豆者大如皁莢又有豌豆秋豆尾秋豆尾秋一名米豆可雜秔為飯粟則有早粟寒粟寒者晚也有毛粟成亦晚有薑葉赤者無芒又有赤稈白稈有望秔青有糯粟山中人以為酒則味澁而不清令人善酲有罌子粟結房如缾罌如髇箭華艷好而實細美非他粟之類其穄有三黒穄者秈穄也赤穄者穤穄也秈穤本稻之名秈瘠而穤腴故穄粟之類借此以别之二穄皆長大如蘆故俱號蘆穄紅黄穄則低小格以古則秈秔稻也穤稌也大麥小麥來麰也火麻蕡也油麻胡麻也豆菽也粟粱也古者米帯稃皆謂之粟粱之粟尤小故後世直以為粱之名也穄稷也音之變也蔬茹蔬亞於穀故后稷能殖百穀百蔬而蔬不熟之歲為饉然則此不録至五穀又只載其總名而獨録草木之華非為政之急蔬之美者有石上之芥焉細者益辛薑蓼芹芥辛菜也葱䪥韭蒜葷菜也芹生竹中曰竹芹生水中曰水芹蒜之大者曰胡蒜自西域來者也蓼蕎氣葷如小蒜而長本草以為乳婦食之良蘭香羅勒也避石勒名世稱蘭香胡荽亦諱言胡故稱圓荽又有芸薹此皆蔬之同臭味者也苜蓿者漢離宫所殖其上常有兩葉丹紅結穟如穄率實一斗者舂之為米五升亦有秈有穤秈者唯以作飯須熟食之稍冷則堅凝穤者可摶以為餌土人謂之灰粟軍達頗稜唐世自外國來者也頗稜以所出之國為名胡蘆菔甘而不快於口蘆菔則土人雜香葇以為葅百合似蒜而不葷鼠黏之根為牛旁芋即蹲鴟預藥似藷葢嘗以為貢唐世諱預至本朝治平間復諱其上字今謂之山藥茭首者菰根是也菌之為物美而類甚多或能殺人亦使人善笑其最下者曰麥熟菌所謂軟濕青紅者也木耳者古燕豆之芝也石耳生大山之崖山羊所不能縁也垂綆以取之地蠶者澤蘭根也肥白而促節大如三眠蠶以冬掘取之亦曰地筍也蒟蒻者黄獨是也以灰鬻之歙人所用為䘮食也葛則饑歲搗取其粉蒸之以接糧枸杞詩之芑也芙味苦説文所謂江南食以降氣者也土人摶粉為餌假以為色青緑而可喜菾菜其味甜也周花蔓生而穟略如豆花香蒿所以㸃食為香也蘇所以煮飲為香也決明明目至苣則損矣苦蕒苦苣也苦薏花如菊菊甘而薏苦故諺曰苦如薏也蔓菲以芼雉羮及馬蘭繁縷薺莧藜蕨皆物之旅生者貧者所資也藜赤莖而多枝利以為帚亦曰獨掃藋似苜蓿而青白陸德明以為堇所謂堇茶如飴者土人謂之灰藋徒弔切瓠甘瓠也𤓰有胡𤓰越𤓰有崑崙之𤓰崑崙𤓰者茄之别名其色有如銀者藥物庶草之繁廡其施於藥餌者芝蘭芍藥兔絲昌羊昌羊石生而細者為昌蒲大觀中繪本草术所出之州七歙與一焉陳藏器以為麥門冬出江寧者小而潤出新安者大而白陶隱居以黄連出西間者色淺而虚不及東陽新安諸縣掌禹錫又以為香葇壽春及新安有之石上生者莖葉細而尤辛香用之益佳彼人謂之石香薷此見於前載者也火杴狶薟也香附子者莎根是也􅗰珠者薏苡馬援所載者也萹竹射干也蝦蟆衣者車前車前芣苡也蒼耳巻耳也陵霄縁髙林絶壁而為華所謂苕之華也羊蹄秃菜也言采其葍者也樟栁者當陸所謂莧陸夬夬者也三白之草土人為之五葉白始生而青入夏則葉轉而為白田家候之每三葉白時農事亟矣五葉皆白則農者益閑至秋皆復青金罌結實如缾罌味甘澀霜後取之以熬糖又取甜藤以代飴菝葜之根赤用藏鳬子亦曰金剛藤旁其先歲七日採其枝葉挿門戸以禦厲土人謂之旁皮其根為烏藥巵藍與茈所以染也今西安之染者用歙之茈菊種類尤多頃歙人有王子發者為圖凡八十一種牡丹出於黟本自洛移植其後歲盛中興無洛花好事者於此取之然無益於俗不足廣載黄精者生山之隂視其華之白以别鉤吻土人號為甜蕨亦曰胡孫薑僊靈脾者淫羊藿是也天仙之藤其子為馬兜五倍子大者如桃其中皆蟲一名敷檻桃桔梗之大而無心者為薺苨或用作假葠賣之於他郡厚朴之薄者或刮其皮以物煮之為假桂又有地黄茯苓五味茈胡白芨黄蘖旋覆菴䕡木賊穀精五加細辛鶴蝨百部通草木通𤣥參狼毒栝樓地松萍艾苦參謹火忍冬萱草巻柏萞麻草犀杜仲蒴藋音朔濯茜草蜀葵金星地錦葎草夏枯蘹香薄荷覆盆草烏瞿麥芫花白斂前胡及天門冬霹靂矢何首烏之屬木果木則松梓槻柏檮榆槐檀赤白之檆歲聮為桴以下淛河大抵松檆為尤多而其外則紙漆茶茗以為貨桑之類有花桑遇葉少時亦可以食蠶柘有青柘有柿柘柿柘葉如柿結實如楮而絶紅然能病蠶黄柘最少而最宜蠶䡤堅而不彫實小於橡或甘或苦檜則土人謂之圓柏桖葉如柀而子赤材理麤謂之桖柏栟櫚葉大如車輪樟豫章也橡則櫟也石柟聳而䝉密古之交讓也楝之實甘故為鳳所食冬青歲晏不彫所謂萬年枝也相思似之巖桂秋後作華四出而絶香山中人謂之小相思山桂葉銳而可喜木堇以夏華桐首春而榮其别有三桐材輕利頃歲有悞發貞觀中藏者其桐棺如故問之鄉人云桐材既乾復以其膏漬之則終古不壊梧碧梧也有乳者也栁與楊之類最多柜栁枝弱黄楊性堅以閏為厄椿樗白楊紫荆狗骨皆散木也楓散木也而有香梁任昉為太守調香二石始入三斗遽出教止之烏臼可為燭而歙之人不取南燭叢生春晚苗葉紅赤照耀山谷道家用作䭀飯其色青故又謂之青精飯非人家庭館所植南天竹也檻結穗霜後白如鹽而酸醎椒欓茱萸所以去濕皁之為物莢經所謂宜皁物者也夜夾蓂者夜合也可以治繭即合歡蠲忿者也總小木之多刺而無枝者楖栗小木可用以為杖柞以為櫛石膚之屬以為炭以為艣枸以為鞍詹戒木髙華白而下垂花如百合棗或脆而多津或大而理疎丁香棗者紫黒不類棗其蒂核皮肉正柿之絶小者耳一名牛乳柿葢古之㮕也山棗似橄欖而圓剥之正白如涕栗則或毛或澤小者獨顆而圓狙公所賦芧也榛花長而實細枳椇味在枝杪霜後絶甜一曲一直如枅之承栱故一名曲枅一名木蜜一名堅枸木以其材為柱能敗室中酒味古以椇為婦贄今不復貴木𤓰實小不及宛陵槙樝者苦木𤓰而不臧者也香樝甚小所謂榅桲也棠甘棠也棠有霜後黒而糜者曰青沙爛梨之類多種大抵歙梨皆津而消其質易傷蜂犯之則為瘢故土人率以柿油漬紙為囊就枝苞封之霜後始收今出丁字橋者名天下近城多楊梅南朝時太守所採任昉以冒險多物故而停絶銀杏葉如鴨蹠實外有皮山中人貯之及柿之紅者以為酢椑似柿而青黑所謂烏椑之柿也本草圖經椑柿出宣歙荆襄閩廣諸州柿美而益人椑又制丹石毒柀之小而美者出於黟古稱柀出玉山世以為上饒而漢志歙有玉山未知孰是其木為什器几案則明潔而宜漆爾雅曰檆柀按二物葉甚相類但檆聳而柀垂柀又有佳實此為不同耳其外則桃李梅杏含桃來禽枇杷胡桃安石榴橙橘柚之屬大率山寒不宜橘柚種者築池中為交午之道列植其上水氣四面薄之則不畏霜雪婺源則有金橘竹有苦淡紫斑䈽筀之名老竹長尺則曲桃枝四寸有節慈竹叢生不離母又四時有筍一名四季竹對青竹枝簳皆金色唯一邊起枝處青碧大率金碧相煇可愛休寧有拜竹苦竹之極大者也婺源苦竹之筍大者為花菌筍又有冬筍縝理而甘祁門時有猫頭竹水族歙居山間無大陂澤其谿流清淺春夏潦水注之則深往往有魚而不常得疏池以養者多鯉鯇與鯖鯉黄鯇黑而鯖青大率相類首春鬻魚苗者來自湖口界中買纔數寸日取草飼之又蓄鰱其中使相從以長鰱鱮也大頭而細鱗魚之不美者也是數魚者不過終歲盈尺矣其隨水所在而有者為鯿為鯽為烏鱧為鮎為鱖鯿古之魴也鯽鮒也烏鱧比他魚為鮏古之鱧也以其與鯉音相近故以其色繫之也鮎古之鰋也其大而多鬚者曰鱯鱖巨口而細鱗其牡文采尤鮮明繫之溪中可以致羣牝或以鮮明者為鱸鱖亦曰蘆花鱖大率盛夏藏石罅中徒手捫得之仙人甯封子所食石桂也重脣乗桃花水而上味極腴陸機所謂吹沙小魚蓋古之鯊也童魚亦以二月來小而為羣首如科斗古之童子魚也白條白如銀即鯈魚也石斑青而揚赤夏月食其子令人善嘔土歩鱗黒而肉白即土父也鯶魚鬛赤一去極逺絶有力者鱤州南大潭中截溪為網大率鯿鯉鯈鱖色别為羣唯鱤為大將其羣以先欲觸網破則羣魚隨之而出網不破往往悶絶此魚之豪横耿介者也鱒赤目多獨行或二三相從見網輒遁鮰魚味美而不常有魚略似鯇多纎骨黄尾魚如而尾黄婺源謂之黄姑魚鰌伏泥中䱉黄質黒章黄䰲䱀䰲也色黄無鱗搦之有聲亦名黄顙鰻長如蛇伏深泥中負黒抱白無鱗而甚腴掌禹錫云鰻鱺五色者出歙州舊經又有檻都不知何魚也谿中小魚凡五六十種鱖有三竹管鱖體圓蘆花鱖長大板鱖似鯽乃石鱖也䱀䰲亦有三有長而纎者有頭大而促者有極小如指者名各不同石鯽長而尾紅旁皮魚似石鯽而尾青石活魚常在石中鉤子魚黄公魚皆以春三月團聚而上梭子魚首尾銳其大如指師官魚亦如指大有長鬚四五略如䱀䰲沙鰌上脣如鷹咮長者尺有五寸古僂儸魚色黒斑有蟲寄其腹中或一或二大者如負螌小者如鼠婦穴其髯旁以食餘不可勝載其外骨則龜鼈螺蚌倮蟲則蛙蛇之屬羽族羽物則翬雉五色黄鳥䵩而黄公布穀也食麥即去鵓鴣者䳕雄也斑鳩最拙古之頒鶞也青鳩色蒼緑人多蓄之鶉小而善鬬鶻嘲能為聲秭歸候歲而先鳴鴞逢春則聲圓美而可喜至夏不復鳴故詩曰懐我好音夏鷄以五六月終夜號田中竹雞如鷓鴣天將雨則為泥滑滑之聲蠧蝝聞之則化而為水白鷴大如雞白質黑章其穉純黒南越尉佗所獻也耿介不可馴古稱黄山之馴者伏以家雞山雞文采似白鷴而小緑雞色緑皆雉之類鷹鷂善搏啄木善啄鵀戴勝也頭有華勝故以降于桑為蠶事之候山鵲色蒼緑咮足皆赤特其首尾輕翹而好為聲要為鵲之類水鵲甚似鵲而小好在水旁人以其聲為喜也烏大而反哺慈烏小而多聲鵯鵊鳴將旦體雖小鷹與烏不能敵也其尾如匕一名青鵶一名鵶臼燕雀伏翼棲集人家者也胡燕大而越燕紫其巢亦異百舌反舌也哵哵一名花鵒能為聲其在瓦中色蒼者為鸜鵒婆餅焦者巧婦其巢如刺韈也摇鶤者脊令行則自摇其鶤也喚姑大如鳩黑色長尾唯兩翅赤而不鮮其音呱呱淘河者鵜淘去河水而取魚也鸕鷀約頸以環使没水取魚為人用者也魚鷹翔水上以兩爪搦魚挽就水次啄食之小鮮則銜以飛鸌兩翼白其鳴自呼好在田中又有鳥大小如鸌黑而長喙林宿而水食其聲澌而不揚令人惡聞者名曰賣瓦鳴則當晴鷺之類而翼下紅者曰紅鶴翠碧鸂􅠃鵁鶄皆水鳥也俗之言駕去鵝者鸛也白頭翁者頭白畫麋眉似畫也在水曰水畫在籬塹中者曰塹畫小者石畫亦取其聲以候隂晴白練小雀尾如曳練也山雀如家雀稍大而微赤青菜言菜色也囷子似山雞而小無尾徒河切鳥一名楚雞尤愛其羽中矰弋則守死不動郡國志曰翎下有青紅相應如垂綬其狀如蜀雞背若朱蛇又有紅鵲鷓鴣山鸚鵡同力自囷以下凡六物祥符經所書獸類吳赤烏中新都言白虎見宋元嘉中太守到元度又得白熊以獻皆見於史土人以熊之髙大而似馬者為馬熊庳小似豬者為豬熊野豕有竒牙大者數百斤類能傷人冬伏於深谷聚籜之下獵者矛簎之號槍鬆豕豪如簪長五六寸能激以射人蝟似䑕而毛勁縮之如栗房其皮可以治練山羊角細而騘色能越峻險大山乃有之豺似黄狗而長數十為羣好竊羊以食狸有猫斑者有豹文者牛尾貍的顙而大尾蟄則不食䑛掌而肥别名曰白額亦曰玉面貍也竹狗似之而臊貛豚體促可三四斤顙亦白獺之小者土人謂之㧓鰌鯪鯉四足而巨鱗其光如鯉能陸能水可以已蟻螻山中時有鹿麝而尤多􅕱兔狐沐猴之屬􅕱之騘色者麖其大如􅕱而黒者俗謂之郭舊經有獐猨則未知二者之果有否也䑕之豐尾者曰栗䑕亦曰松狗漢侍中所珥貂也鼯者五技之䑕大而有翼飛且乳夜呼為怪祥者也䑕狼似䑕而要脊長善捕䑕亦以媒鳥雀畜擾其畜擾有蜀馬亦頗有驢騾馲􅦢之屬馲􅦢者馬父驢子也水牛色蒼而多力其角如環古所謂吳牛也黄牛小而垂胡色雜駮不正黄土之所産亦有從江西來者自績溪以往牛羊之牧不收歙之南境羊晝夜山谷中不畏露草豚買於宛陵界中中家以上歲别飼大豕至二三百斤歲終以祭享謂之年彘而方輿記以火肉石芥為民之珍其餘則雞犬鵝鶩雞髙而善鬬者所謂魯雞也烏雞冠珥皆青肉色如墨時或有之號能已病貨賄舊稱歙有金與銀而今無有以國朝㑹要考之出金之州十出銀之州四十有二歙無預焉良木之産則巳見於右方而茶則有勝金嫩桑僊芝來泉先春運合華英之品又有不及號者是為片茶八種其散茶號茗茶而紙亦有麥光白滑氷翼凝霜之目今歙縣績溪界中有地名龍鬚者紙出其間故世號龍鬚紙大抵新安之水清徹見底利以漚楮故紙之成振之似玉雪者水色所為也其歲晏敲氷為之者益堅靭而佳漆則諸邑皆有之山民夜刺漆插竹筧其中凌曉涓滴取之用七刮筒中磔磔有聲其勤至矣歲旱則益少天時雨汁則又不佳研出於婺源之龍尾山肇於唐開元葉氏墨出於歙之黄山肇於唐末李超廷珪父子自南唐以來貴之物有盛衰工有良苦不能如其舊簟出於休寧所從來久梁沈約彈歙令仲文秀横訂吏黄法先輸六尺笙四十領笙即簟也又有楓香及蜜刺史任昉棄而不取土人為楊行宻諱謂蜜為蜂糖云蠟本出武都山谷蜜房木石之間掌禹錫以為宣歙唐鄧伊洛間尤多又有白石英陶隱居云今醫家用新安所出極細長白澈者壽陽八公山多大者不止用之僊方大小並有用惟須精細無瑕者叙貢賦新安為郡在萬山間其地險陿而不夷其土騂剛而不化水湍悍少瀦蓄自其郡邑固巳踐山為城至於四郊都鄙則又可知也大山之所落深谷之所窮民之田其間者層累而上指十數級不能為一畝快歩剡耜不得旋其間刀耕而火種之十日不雨則卬天而呼一遇雨澤山水暴出則糞壊與禾蕩然一空葢地之勤民力者如此宣饒之田彌望數百畝民相與秔稌之歲纔一芸時雨既至禾稗相依以長而其人亦終歲飽食不待究其力歙之人芸以三四方夏五六月田水如湯父子袒跣膝行其中淈深泥抵隆日蚊蠅之所撲縁蟲蛭之所攻毒雖數苦有不得避其生勤矣而租挈又重葢特起於唐末偽刺史陶雅之所增異時去京師逺有司未及以為言今天子愍之數下恩詔收退絹省雜錢凡可以惠其人者將無所愛要以盡去百年之積弊夫達民瘼廣上恩不牽吏議良有司能之時之利害故備論其事稅則新安三壤之則歙休寧祁門績溪黟上田園每畝稅錢二百為夏稅紬四寸絹一尺三寸布一尺綿三錢見錢五十五鹽錢十二脚錢十二此三色雜錢者又折變為絹四尺三寸綿四錢五分麥一升二合秋苗則米二斗二升耗米四升四合鹽錢十二義倉二升二合中田園每畝稅錢百五十為夏稅紬三寸絹一尺二寸五分布五寸綿二錢見錢四十三文七分五釐鹽錢九文脚錢八文三色雜錢又折變為絹三尺四寸綿三錢麥九合秋苗則米一斗七升七合耗三升五合鹽錢九文義倉一升九合下田園稅錢每畝百文為夏稅紬一寸二分絹一尺五寸布二寸五分綿一錢見錢二十七文七分五釐鹽錢六文脚錢六文三色雜錢又折變為絹二尺二寸綿一錢五分麥六合秋苗則米一斗三升三合耗二升七合鹽錢六文義倉一升三合大率上田産米二石者田主之收什六七夏秋之稅度用錢二千八百自餘中田下田以次率之此其大凡也先是唐行兩稅法至昭宗景福中楊行宻逐唐刺史裴樞而使其偽將陶雅代之及田頵以宣州背行宻行宻破頵併收其家頵母辭曰門外之事妾未嘗與知也但聞歙州陶四常有私書往來今置不問而戮一老婦人何益頵與雅皆行宻里人以羣盗起合肥同功一體之人也行宻召雅至揚州久留不遣雅懼求歸郡斂羡餘以獻㑹左右亦為之請且曰歙州地陿而人富前日裴樞一書生守之而諸將不能下今南鄰錢鏐西備鍾傳又順義軍汪武介於其間不為吾用二鄙窺伺而因循乏守非計之得者也行宻亦悟雅始得還且欲實前言以固寵因增稅以取之於是此州之賦遂重天下矣此見於故老所傳與崇寧中鄉貢進士俞師覺上宰相之書以唐五代諸書考之雅以景福二年來守時錢鏐以杭睦扼其南鍾傳以饒州當其西汪武割婺源為順義軍鯁其側雅楊氏宿將獨以一州之力為之外蔽四封有警輒提其兵以出葢嘗西伐鍾傳執汪武南救睦州虜錢鎰攻婺州執刺史沈夏又因陳詢不能守睦州取之巳而諸州皆復為鏐所有既又襲饒信信州刺史危仔倡請降饒州刺史唐寳棄城走在郡二十餘年兵革數動舊賦之入不足以充軍此其勢必至於增賦不特為羡餘而巳今以宣饒池諸縣壤土相接者較之太平之接於歙縣者其田亦三等稅錢自十二至九文苗米自一斗三升九合至一斗有半浮梁之接祁門者稅錢自二十四至十四苗米自五升五合至三升三合旌德之接績溪者稅錢自六十至四十米自一斗八升八合至一斗四升開化之接休寧者稅錢自七文至四文八分米自四升四合至三升石埭之接黟者稅錢自十二至八文米自一斗一升七合至六升五合其與稅錢二百苗米二斗麥八合八龠加以雜錢二十四文展轉折變之者為不侔矣唯婺源稅則稍異或言婺源以汪武所據故陶雅不得有所增然雅以天復三年縛武於軍則是婺源終屬於雅矣雅在郡甚久勢不容獨有所略今以婺源稅則考之上田稅錢每畝四十二苗米四升二合中田四十米四升下田三十八米三升八合較之鄰境樂平鄱陽之屬樂平建節鄉稅錢自十三至九文米自三升八合至二升八合鄱陽稅錢自十文至七文米自四升至二升其輕於婺源亦數倍是雅巳嘗有所增矣又此縣米價尤賤故有田者亦不能多取贏焉凡六縣田産未經界前為百五十一萬六千三百畝半經界為三百萬餘畝今為二百九十一萬九千五百五十三畝有竒稅錢十一萬一千七百八貫二百三十九文雜錢雜錢凡三色皆起於五代割據時稱鹽錢者官據口給食鹽而斂其直稱麴錢者給民麴使得釀酒而歸其麴之直於官稱脚錢者每貫出錢五十以備解發至廣陵及南唐之末淮南産鹽之郡為周世宗所下無以給民因以舊所得之數紐為正稅但輸之及國家削平僭亂酒酤在官不復給麴而轉輸之費出於公上有司因循失於申請每稅錢一貫者輒存此三色為錢三貫九百五十總名曰雜錢别而言之則曰鹽錢麴錢脚錢亦曰鹽錢脚錢見錢凡為錢五萬緡有竒其後有司不直令輸錢從而折變之故於稅絹之外有折錢絹稅紬之外有折錢紬稅綿之外有折錢綿苗米之外有折錢米苗麥之外有折錢麥其多寡歲歲不同然舊制郡納紬絹每匹不過數兩故絹折錢七百七十紬折錢七百三十一布折錢三百五十綿每兩正耗折錢六十二文五分猶為相近自頃物帛益好價直益髙而所折之直猶如其故大率數倍於五萬緡之數紹興中推行經界尚書郎章侯為時相力言民病請因蠲減重賦不見聴至今上乾道六年郟侯任滿賜對乞將雜錢所折之絹減半而拘江東漕司歲所取本州寛剰絹六千匹折斛錢三萬緡并額外科往建康府絹五千匹歸大農補還減半之數天子以為然事下户部户部按律非法擅賦斂及科買折納而反覆折紐或别納錢物者具其科條行下約束而令江東諸司公共相度閱再期不報前江東安撫司主管機宜文字章謙言於朝以為安撫司巳相度乞減雜錢之半而拘漕司建康府絹各半折斛錢三之一還户部可以補還雜錢減半之數且牒諸司矣而至今未申部者由比年吏强官弱帥守監司雖欲奉承而吏不欲也願嚴立限趣令申上八年五月十一日朝㫖下諸司期以半月諸司即用此議上而戸部又請將折斛錢亦減其半大約通計減錢二萬一千六百餘貫乞紐充減落雜錢之數七月二十五日奏天子可之委漕臣取見均減雜錢等名額實數督責守令不得依前科擾務要恩惠及民是日又有㫖將徽州減免不盡雜錢盡數蠲免以寛民力其本州認發漕司絹三千匹折斛錢萬五千貫建康府絹二千五百匹亦與放免却令户部於沙田蘆場錢内撥還而郡以郟侯初指為歙休寧等五縣請故雜錢只三萬七千餘緡然合婺源計之實五萬四千餘緡今一切蠲免則郡計所失多乃審於户部而漕司又以折斛錢三萬緡通雜錢五萬緡合為八萬緡數目不同乃繼委部使者覈實於是以鹽脚錢一萬二千一百八十餘緡為雜錢其見錢四萬緡非也詔如其數免一萬二千一百八十餘緡而有司以為轉運司折斛錢三萬緡建康府絹五千匹者皆秋苗科折非雜錢之例下郡樁發如其故夏稅物帛夏稅紬二千九百九十六匹一尺八寸七分絹三萬四百一十三匹五尺四寸七分綿二十萬八千八百三十三兩四錢一分布五千六百八十五匹二丈四尺八寸五分而雜錢所折紬絹綿不在此數又有軍衫布三千一百五十匹亦楊氏時歲於民間以鹽博之每匹給鹽七斤半其後亦以無鹽直令輸納今自稅錢五貫以上科敷每貫納布三尺六寸有竒隨夏稅輸之此物帛之大數也本朝翰林學士沈括稱國初蠲正五代方鎮割據稅外多取之弊其有輕重未均處稍隨事均之福歙稅額太重故福州纔令以錢二百五十折納絹一匹歙州輸官之絹只重數兩後人往往疑浙絹太重葢不見當時之意此括之所載於其書可考者也至其後亦不能盡如國初數兩之制然令甲江東一路稅絹俱重十二兩獨歙州以咸平二年特㫖只以十兩為定并下庫務不得退剥每匹折錢七百三十一文元豐二年四月二十一日勅將歙州預買絹錢每匹作九百五十文至紹興十八年户部符每匹估時價錢二貫足而江東轉運司則每匹納一貫八百足葢大率如此而婺源所納紬絹歲差大戸自縣起發徑赴左帑乾道三年以疎怯見卻時守臣乞以所退每匹折省錢三千於其中豁除頭子朱墨等錢買輕齎解赴左帑天子愍之詔婺源絹如未給散人戸却解赴左藏庫交納或巳給散即依所乞權折錢一次而以守臣為擾鑴秩罷之故其謫詞曰不念繭絲之闕靡思杼柚之空然則聖意拳拳於歙民可知矣是月又奏以為近者戸部退剥徽絹又契勘袁州建昌軍不中物帛然皆有繼恩詔仰見聖意止欲戒其巳甚不務過求而諸處受納監官望風懼罪縱吏邀阻如十二兩者至更求十三兩止産黄絲者求其白絲年例屑絲者責其細絲如此非一遂使攬戸恣求常歳匹四千者增為六千猶不能中或髙價折錢分遣人於産絹去處買納豈不重擾欲望降㫖禁戢州縣不得矯枉過正及於常數外邀取詔復從之小麥小麥有稅錢及百文者輸五穀凡六千三十三石一斗五升六合或議以為紬絹者上三等所有而布與麥者第四等以下小戸所産故鄰郡往往等第分納之而新安不計等第每戸夏稅凡納十三色至乾道四五年以後第五等戸又認納雜錢名為四色其實稅紬稅絹正綿正麥錢紬錢絹錢綿錢麥而麥一斗者久有義麥凡九色矣秋稅糙米秋稅糙米合六縣為十五萬九千四百八十一石六斗一升七合租課糙米一千四十六石九斗八升九合五龠熟米九石九斗七升郡大率土壤薄不宜於秔故梁任昉為新安太守去郡唯有桃花米二十石今紅蝦秈是也秔既不多有故下戸有折解錢自苗米一石以下每斗折納見錢五十六文足貧民以為便自頃軍食日多乃增就附近三縣取米則三縣下戸得納錢者益少今自一斗九升以上皆輸米又有穤豆草錢紬米絹米之屬折帛錢上供折帛錢凡紬一萬六千一百九匹三丈絹二萬四千七百九十六匹每匹各折省錢六千綿萬七千二百二十七兩每兩折省錢三百凡為錢二十五萬六百一貫六百文先是州稅絹每匹為稅錢七百三十一而預買以元豐二年勅每匹作九百五十文逮折帛初行以兩浙上色紬絹為估每匹八千而徽則減二千為六千至紹興十八年江東西路例作六千其後兩浙路亦然而徽遂不復請乾道五年議臣奏曰折帛之起以浙絹定價故每匹估價錢六千而銀則每兩為價三千三百徽州係五季重稅去處咸平著令他州絹以十二兩為則而歙州但責十兩而已從來名為下色紬絹所以補除重稅也折帛之行以兩浙上色所估而責徽州下色亦同其直失先朝補恤之意然議者方主言郡吏折銀虧直聖上令部使者約束而折帛之價未有申論者進貢唐六典州貢白苧布太府卿以布之方土精麤為九等而歙之苧在第七通典貢苧十五端竹簟一合新唐書又有紙及黄連國朝貢表紙麥光白滑氷翼紙乾預藥臘牙茶細布景德四年閏五月詔特減放諸郡六十六處貢物而歙所貢七物在其數中且飭官吏後不得以土貢為名妄有配率熈寧中貢白滑紙千張大龍鳳墨十斤元豐中貢白苧十匹紙如熈寧而無墨今貢白苧十匹其天申節進奉有銀絹五百匹兩上供物帛上供紬歲四千五百九十八匹一丈六尺八寸絹八萬三千三百七十七匹九尺九寸綿十萬二千二百二十六兩七錢絲二百兩分四綱起發又有淮衣綱紬四十八匹八尺四寸絹萬三千一十匹一丈二尺六寸舊至揚州中興併送行在所其非上供應副本路及他路者建康府絹五千匹即前所奏免今復起發者也又有兩浙轉運司紬千四百匹絹萬六千四十九匹有奇綿六萬五千兩又别應副衢州嚴州紬各一百五十七匹半絹各千三百三十匹綿各二千二百七十五兩處州紬百七十五匹絹九百八十匹綿三千五百兩婺州紬七十匹絹千九百六十匹綿千五百兩四州歲各遣吏來請葢自紹興十四年四月江東轉運司始報兩浙運司以應副四州之數不知始於何年上供紙上供七色紙歲百四十四萬八千六百三十二張七色者常様降様大抄京運三抄京運小抄自三抄以下買奏紙是為七外有年額折錢紙用以折買大抄皆以上下限起發赴左藏庫又有學士院紙右漕紙鹽鈔茶引紙之屬不在其數中始大中祥符四年六月上以歙州歲供大紙數多頗勞民思有以寛之知樞宻院王欽若奏本院諸房所請歙州表紙自元年後置厯拘管今支使外剰十一萬八千三百張望下三司住支一年及於本州減造從之又遣中使就院宣諭副都承㫖張質巳下於太平興國寺賜御宴今供數不知何年所定酒課酒課按國朝㑹要舊在城及休寧祁門婺源績溪黟六務酒麴歲二萬九千八百七貫熈寧十年祖額二萬一千六百十四貫五百五十四文買撲一千八百六十三貫二百八十三文而不别每務所入之數今在城一務酒課用紹興二十年所收為額計三萬八百二十八貫一百八十七文巖寺鎮酒課并六縣坊塲五十三所其三年各課官錢凈利錢三萬六千七百六十九貫二百七文增添三分錢七千二百三十九貫五百五十一文課利錢五千一百八十七貫二百三十文隨界二分錢一百七十貫七十二文稅課稅課按㑹要舊在城及休寧祁門婺源績溪黟六縣歲萬三千五百三十七貫熈寧十年在城一萬三千二百五十八貫一百二十文今以紹興二十二年所收為額計六千一百一十貫八十七文河渡合歙縣婺源凡三處每界三年計淨利錢二百四貫二百九十一文茶課州舊買茶以熈寧十年為額歲買六萬一千二百六十四斤其片茶有華英先春來泉而散茶有茗茶並以折稅國家異時六𣙜貨務其在真州者受洪宣歙撫十五州之茶為額五十一萬有奇在無為軍者受洪宣歙饒十三州之茶為額四十三萬有奇用以給商人今於在京及𣙜務入納見錢筭請真州務賣歙茶勝金為錢五百四十三嫩桑五百八十八華英五百二十運合五百三十八來泉四百六十二先春四百八十八僊芝五百三十不及號四百四十六無為軍務賣先春四百七十一來泉嫩桑並四百六十二而州自賣折稅茗茶每斤二十七逮宣和改茶法招誘商販而不復科買人以為便歲額二百萬有奇茶租錢者起於嘉祐中宣州以此錢千八百七十四貫文均在本州今民戸自稅錢二貫省以上者每貫敷錢五十鹽課舊鹽額熈寧十年在城二萬七百九十貫二百五十七文休寧九千七百五十七貫六百二十文績溪二千七百九十四貫一百一十文黟縣五千九百五十四貫七百二十文祁門八千八百九十九貫三百八十五文婺源萬三千七百七十七貫七百三十五文自太平興國中三司建議以歙接近兩浙界令就般請兩浙鹽每斤為錢五十自宣和末變法歲遣衙校往請之今郡學廊廡乃故鹽塲地或言歙所以輸兩浙運司絹者以鹽故也鹽法既變不復般請今招誘亦歲二百萬有奇公用國朝典故三京及諸道州府軍監公用錢舊皆有常數其官髙及曾任中書樞宻院者臨時取㫖加給並凖宣定支計月均給知州通判或職官上厯支歲終支不盡者納州庫若大兩省横行使以上充此差遣有添賜錢數皆係特㫖熈寧中特增近其額而分四季支内歙州八百貫其公用酒太平興國六年九月定制河南應天以下六府曹鄆以下六十六州月各給一石歙州在其數中新安志巻二
